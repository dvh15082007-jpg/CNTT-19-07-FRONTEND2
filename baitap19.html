<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 19 - jQuery Ajax GET</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; }
        table { width: 100%; max-width: 700px; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #673ab7; color: white; }
        .loading-status { color: #666; font-style: italic; font-size: 1.1em; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 15px; border-radius: 4px; max-width: 670px; }
    </style>
</head>
<body>
    <h2>Danh Sách Nhóm Nhân Sự (Đồng Bộ Qua jQuery Ajax $.ajax)</h2>
    
    <div id="statusIndicator" class="loading-status">🔄 Vui lòng đợi trong giây lát, hệ thống đang nạp tài nguyên từ endpoint máy chủ API...</div>
    
    <table id="membersTable" style="display:none;">
        <thead>
            <tr><th>Mã Số</th><th>Họ và Tên</th><th>Chức Vụ</th><th>Email Liên Hệ</th></tr>
        </thead>
        <tbody id="ajaxTableBody"></tbody>
    </table>

    <script>
        $(document).ready(function() {
            const TARGET_ENDPOINT = "https://664bc752a346044336ca332e.mockapi.io/api/v1/users";

            // 1. Thực hiện khai báo cấu trúc cú pháp hàm $.ajax phiên bản chuyên sâu của thư viện jQuery
            $.ajax({
                url: TARGET_ENDPOINT,
                type: 'GET',
                dataType: 'json',
                success: function(responseList) {
                    // Tắt bỏ hộp thông báo chờ đợi, phơi bày giao diện bảng dữ liệu chính thức
                    $('#statusIndicator').hide();
                    $('#membersTable').show();
                    
                    let rowsHtml = '';
                    // Duyệt danh sách phần tử mảng dữ liệu nạp về thông qua hàm $.each cấu trúc vòng lặp jQuery
                    $.each(responseList, function(index, member) {
                        rowsHtml += `
                            <tr>
                                <td>${member.id}</td>
                                <td><strong>${member.name}</strong></td>
                                <td>${member.role || 'Chuyên viên Công nghệ'}</td>
                                <td>${member.email || 'info@domain.com'}</td>
                            </tr>
                        `;
                    });
                    
                    $('#ajaxTableBody').html(rowsHtml);
                },
                error: function(xhr, status, errorThrown) {
                    // Yêu cầu mở rộng: Xử lý tình huống lỗi kết nối mạng đường truyền API hoặc máy chủ chết đứng
                    $('#statusIndicator').hide();
                    $('body').append(`
                        <div class="alert-error">
                            <h3>⚠️ Khủng Hoảng Kết Nối Đồng Bộ Dữ Liệu Thất Bại!</h3>
                            <p>Chi tiết mã định danh lỗi hệ thống phản hồi: <strong>${status} - ${errorThrown}</strong></p>
                            <p>Vui lòng rà soát lại liên kết URL MockAPI Endpoint của bạn đảm bảo nó đang hoạt động bình thường!</p>
                        </div>
                    `);
                }
            });
        });
    </script>
</body>
</html>
