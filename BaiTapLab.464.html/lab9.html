<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Counter</title>
</head>
<body>

<h1 id="so">0</h1>

<button id="tang">+</button>
<button id="giam">-</button>
<button id="reset">Reset</button>

<script>
let dem = 0;

function render(){
    document.getElementById("so").innerText = dem;
}

document.getElementById("tang")
.addEventListener("click", function(){
    dem++;
    render();
});

document.getElementById("giam")
.addEventListener("click", function(){
    dem--;
    render();
});

document.getElementById("reset")
.addEventListener("click", function(){
    dem = 0;
    render();
});
</script>

</body>
</html>
