<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: #f4f6f9;
        }

        .card{
            transition: 0.3s;
            border: none;
            border-radius: 15px;
        }

        .card:hover{
            transform: translateY(-8px);
        }

        .card img{
            height: 220px;
            object-fit: cover;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h1 class="text-center mb-5">
        Danh Sách Sản Phẩm
    </h1>

    <div class="row g-4">

        <!-- Product -->
        <div class="col-md-4 col-sm-6">

            <div class="card shadow h-100">

                <img src="https://nghenhinvietnam.vn/uploads/global/tunglampv/2023/t11/02/laptopgaming/top_laptop_gaming_2023.jpg"
                     class="card-img-top">

                <div class="card-body">

                    <span class="badge bg-danger mb-2">
                        -20%
                    </span>

                    <h5 class="card-title">
                        Laptop Gaming
                    </h5>

                    <p class="text-danger fw-bold">
                        25.000.000đ
                    </p>

                    <button class="btn btn-primary w-100">
                        Mua ngay
                    </button>

                </div>

            </div>

        </div>


           <!-- Product -->
        <div class="col-md-4 col-sm-6">

            <div class="card shadow h-100">

                <img src="https://bizweb.dktcdn.net/thumb/1024x1024/100/625/402/products/ipad-pro-m1-12-9-inch-wifi-256gb-3.jpg?v=1776402295137"
                     class="card-img-top">

                <div class="card-body">

                    <span class="badge bg-danger mb-2">
                        -20%
                    </span>

                    <h5 class="card-title">
                        ipad Pro
                    </h5>

                    <p class="text-danger fw-bold">
                        25.000.000đ
                    </p>

                    <button class="btn btn-primary w-100">
                        Mua ngay
                    </button>

                </div>

            </div>

        </div>

        <!-- Product -->
        <div class="col-md-4 col-sm-6">

            <div class="card shadow h-100">

                <img src="https://images.samsung.com/is/image/samsung/p6pim/vn/sm-a576blbtxxv/gallery/vn-galaxy-a57-5g-sm-a576-sm-a576blbtxxv-551559695?$1164_776_PNG$"
                     class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">
                        Điện thoại Samsung
                    </h5>

                    <p class="text-danger fw-bold">
                        14.000.000đ
                    </p>

                    <button class="btn btn-success w-100">
                        Thêm giỏ hàng
                    </button>

                </div>

            </div>

        </div>

       

        <!-- Product -->
        <div class="col-md-4 col-sm-6">

            <div class="card shadow h-100">

                <img src="https://img.youtube.com/vi/3s49ddWEluo/maxresdefault.jpg"
                     class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">
                        Điện thoại iphone 17 Pro Max
                    </h5>

                    <p class="text-danger fw-bold">
                        45.000.000đ
                    </p>

                    <button class="btn btn-success w-100">
                        Thêm giỏ hàng
                    </button>

                </div>

            </div>

        </div>
        
        <!-- Product -->
        <div class="col-md-4 col-sm-6">

            <div class="card shadow h-100">

                <img src="https://www.techone.vn/wp-content/uploads/2025/10/0051346_silver_550.jpeg"
                     class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">
                        MacBook Pro 16 inch M5 Max 2026
                    </h5>

                    <p class="text-danger fw-bold">
                        115.000.000đ
                    </p>

                    <button class="btn btn-success w-100">
                        Thêm giỏ hàng
                    </button>

                </div>

            </div>

        </div>


        <!-- Product -->
        <div class="col-md-4 col-sm-6">

            <div class="card shadow h-100">

                <img src="https://baotinmobile.vn/images/tai-nghe-bluetooth-airpods-pro-2-magsafe-charge-apple-mqd83-trang-2.jpg"
                     class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">
                        Tai nghe AirPods Pro 2
                    </h5>

                    <p class="text-danger fw-bold">
                        4.000.000đ
                    </p>

                    <button class="btn btn-dark w-100">
                        Xem thêm
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
