<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Hello Kitty Shop</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #ffd8ec, #ffc5e6, #ffeef7);
        font-family: Arial, sans-serif;
      }

      .navbar {
        background: white;
        border-radius: 25px;
        margin-top: 20px;
      }

      .title {
        color: #ff4fa0;
        font-weight: bold;
      }

      .card {
        border: none;
        border-radius: 25px;
        overflow: hidden;
        transition: 0.5s;
      }

      .card:hover {
        transform: translateY(-10px);
      }

      .card img {
        height: 250px;
        object-fit: cover;
      }

      .price {
        color: #ff4fa0;
        font-size: 22px;
        font-weight: bold;
      }

      .btn-kitty {
        background: #ff69b4;
        color: white;
        border: none;
        border-radius: 20px;
        font-weight: bold;
      }

      .btn-kitty:hover {
        background: #ff4fa0;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <nav class="navbar shadow px-4">
        <h3 class="title">😺🎀 Hello Kitty Shop</h3>

        <div>
          <button
            class="btn btn-outline-danger me-2"
            data-bs-toggle="modal"
            data-bs-target="#loginModal"
          >
            Đăng nhập
          </button>

          <button class="btn btn-kitty">
            🛒 Giỏ hàng
            <span id="cartCount"> 0 </span>
          </button>
        </div>
      </nav>

      <div class="row g-4 mt-3">
        <!-- áo -->

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow">
            <span class="badge bg-danger position-absolute m-3"> -20% </span>

            <img
              src="https://images.unsplash.com/photo-1576566588028-4147f3842f27"
            />

            <div class="card-body text-center">
              <h5>Áo thun nữ</h5>

              <p class="price">150.000đ</p>

              <button class="btn btn-kitty w-100 mb-2">Mua ngay</button>

              <button class="btn btn-outline-danger w-100" onclick="addCart()">
                Thêm vào giỏ hàng
              </button>
            </div>
          </div>
        </div>

        <!-- giày -->

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow">
            <img
              src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
            />

            <div class="card-body text-center">
              <h5>Giày thể thao</h5>

              <p class="price">350.000đ</p>

              <button class="btn btn-kitty w-100 mb-2">Mua ngay</button>

              <button class="btn btn-outline-danger w-100" onclick="addCart()">
                Thêm vào giỏ hàng
              </button>
            </div>
          </div>
        </div>

        <!-- váy -->

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow">
            <img
              src="https://images.unsplash.com/photo-1496747611176-843222e1e57c"
            />

            <div class="card-body text-center">
              <h5>Váy nữ</h5>

              <p class="price">450.000đ</p>

              <button class="btn btn-kitty w-100 mb-2">Mua ngay</button>

              <button class="btn btn-outline-danger w-100" onclick="addCart()">
                Thêm vào giỏ hàng
              </button>
            </div>
          </div>
        </div>

        <!-- túi -->

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow">
            <img
              src="https://images.unsplash.com/photo-1584917865442-de89df76afd3"
            />

            <div class="card-body text-center">
              <h5>Túi xách</h5>

              <p class="price">220.000đ</p>

              <button class="btn btn-kitty w-100 mb-2">Mua ngay</button>

              <button class="btn btn-outline-danger w-100" onclick="addCart()">
                Thêm vào giỏ hàng
              </button>
            </div>
          </div>
        </div>

        <!-- nón -->

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow">
            <img
              src="https://images.unsplash.com/photo-1521369909029-2afed882baee"
            />

            <div class="card-body text-center">
              <h5>Nón thời trang</h5>

              <p class="price">99.000đ</p>

              <button class="btn btn-kitty w-100 mb-2">Mua ngay</button>

              <button class="btn btn-outline-danger w-100" onclick="addCart()">
                Thêm vào giỏ hàng
              </button>
            </div>
          </div>
        </div>

        <!-- gấu -->

        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow">
            <img
              src="https://images.unsplash.com/photo-1559454403-b8fb88521f11"
            />

            <div class="card-body text-center">
              <h5>Gấu bông</h5>

              <p class="price">299.000đ</p>

              <button class="btn btn-kitty w-100 mb-2">Mua ngay</button>

              <button class="btn btn-outline-danger w-100" onclick="addCart()">
                Thêm vào giỏ hàng
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- modal đăng nhập -->

    <div class="modal fade" id="loginModal">
      <div class="modal-dialog">
        <div class="modal-content rounded-5">
          <div class="modal-header">
            <h4>Đăng nhập 🎀</h4>

            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input id="email" class="form-control mb-3" placeholder="Email" />

            <input
              id="password"
              type="password"
              class="form-control mb-3"
              placeholder="Mật khẩu"
            />

            <button class="btn btn-kitty w-100" onclick="login()">
              Đăng nhập
            </button>

            <p id="msg" class="text-center mt-3"></p>
          </div>
        </div>
      </div>
    </div>

    <script>
      let cart = 0;

      function addCart() {
        cart++;

        document.getElementById("cartCount").innerHTML = cart;
      }

      function login() {
        let email = document.getElementById("email").value;

        let pass = document.getElementById("password").value;

        if (
          email === "ha.0967876149@gmail.com" &&
          pass === "thanhha@17032006"
        ) {
          msg.innerHTML = "🎉 Đăng nhập thành công";
        } else {
          msg.innerHTML = "❌ Sai mật khẩu";
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
