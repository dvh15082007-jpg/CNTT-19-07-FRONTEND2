<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 06 - Giỏ hàng Callback</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        padding: 20px;
        background: linear-gradient(135deg, #ffd6e7, #d6e7ff);
      }

      .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        color: #ff4f8d;
        margin-bottom: 20px;
      }

      .icon {
        font-size: 50px;
        text-align: center;
        margin-bottom: 10px;
      }

      select,
      input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 12px;
        border: 2px solid #ddd;
      }

      button {
        width: 100%;
        padding: 12px;
        margin-top: 12px;
        border: none;
        border-radius: 15px;
        background: #ff5d95;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #ff2c74;
      }

      .card {
        background: #fff5f8;
        padding: 12px;
        margin-top: 10px;
        border-radius: 12px;
        line-height: 1.6;
      }

      #ketQua {
        margin-top: 20px;
        padding: 15px;
        background: #eef8ff;
        border-radius: 15px;
        line-height: 2;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="icon">🛒💖</div>

      <h1>GIỎ HÀNG CALLBACK</h1>

      <!-- chọn sản phẩm -->
      <select id="sanPham">
        <option value="500000">Tai nghe - 500.000đ</option>
        <option value="1500000">Bàn phím cơ - 1.500.000đ</option>
        <option value="2500000">Màn hình - 2.500.000đ</option>
        <option value="15000000">Laptop - 15.000.000đ</option>
        <option value="25000000">MacBook - 25.000.000đ</option>
      </select>

      <input type="number" id="soLuong" value="1" placeholder="Số lượng" />

      <button onclick="them()">Thêm vào giỏ</button>

      <!-- mã giảm giá -->
      <select id="ma">
        <option value="">Không mã</option>
        <option value="SALE10">SALE10 -10%</option>
        <option value="SALE20">SALE20 -20%</option>
        <option value="SALE30">SALE30 -30%</option>
        <option value="SALE40">SALE40 -40%</option>
      </select>

      <div id="gioHang"></div>

      <button onclick="thanhToan()">Thanh toán</button>

      <div id="ketQua">Chưa có đơn hàng</div>
    </div>

    <script>
      let gioHang = [];

      /* =====================
   THÊM GIỎ HÀNG
===================== */
      function them() {
        let sp = document.getElementById("sanPham");
        let ten = sp.options[sp.selectedIndex].text;
        let gia = Number(sp.value);
        let sl = Number(document.getElementById("soLuong").value);

        if (sl <= 0) {
          alert("Số lượng không hợp lệ");
          return;
        }

        gioHang.push({ ten, gia, sl });
        render();
      }

      /* =====================
   HIỂN THỊ GIỎ
===================== */
      function render() {
        document.getElementById("gioHang").innerHTML = gioHang
          .map(
            (item) => `
<div class="card">
📦 ${item.ten}<br>
📊 SL: ${item.sl}<br>
💰 ${(item.gia * item.sl).toLocaleString()}đ
</div>
`
          )
          .join("");
      }

      /* =====================
   CALLBACK PIPELINE
===================== */

      function tinhGoc(cb) {
        let tong = 0;
        gioHang.forEach((i) => (tong += i.gia * i.sl));
        cb(tong);
      }

      function giamGia(tong, cb) {
        let rate = tong >= 10000000 ? 0.1 : 0.05;
        let giam = tong * rate;
        cb(tong - giam, giam);
      }

      function thue(tong, cb) {
        let vat = tong * 0.08;
        cb(tong + vat, vat);
      }

      function ship(tong, cb) {
        let fee = tong >= 3000000 ? 0 : 30000;
        cb(tong + fee, fee);
      }

      /* ===== SALE 10/20/30/40 ===== */
      function maGiam(tong, ma, cb) {
        let rate = 0;

        if (ma == "SALE10") rate = 0.1;
        else if (ma == "SALE20") rate = 0.2;
        else if (ma == "SALE30") rate = 0.3;
        else if (ma == "SALE40") rate = 0.4;

        let giam = tong * rate;

        cb(tong - giam, giam);
      }

      /* =====================
   THANH TOÁN
===================== */
      function thanhToan() {
        if (gioHang.length == 0) {
          alert("Giỏ hàng trống");
          return;
        }

        let ma = document.getElementById("ma").value;
        let kq = document.getElementById("ketQua");

        tinhGoc(function (tong) {
          giamGia(tong, function (s1, g1) {
            thue(s1, function (s2, v1) {
              ship(s2, function (s3, v2) {
                maGiam(s3, ma, function (final, v3) {
                  kq.innerHTML = `
<h3>🧾 HÓA ĐƠN</h3>

💰 Tiền gốc: ${tong.toLocaleString()}đ<br>
🏷 Giảm giá: ${g1.toLocaleString()}đ<br>
💸 Thuế: ${v1.toLocaleString()}đ<br>
🚚 Ship: ${v2.toLocaleString()}đ<br>
🎁 Mã giảm: ${v3.toLocaleString()}đ<br>

<hr>

<h2>💳 Tổng thanh toán: ${final.toLocaleString()}đ</h2>
`;
                });
              });
            });
          });
        });
      }
    </script>
  </body>
</html>
