<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cute Counter + History</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial;
        background: linear-gradient(135deg, #ffd6e7, #d6e7ff);
      }

      .box {
        width: 380px;
        background: white;
        padding: 20px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h1 {
        color: #ff4f8d;
      }

      /* SCORE */
      #value {
        font-size: 65px;
        margin: 10px 0;
        font-weight: bold;
        transition: 0.2s;
      }

      /* animation */
      .pop {
        transform: scale(1.3);
      }

      /* colors */
      .positive {
        color: green;
      }
      .negative {
        color: red;
      }
      .zero {
        color: #333;
      }

      /* buttons */
      button {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        border: none;
        border-radius: 12px;
        background: #ff5d95;
        color: white;
        cursor: pointer;
        font-size: 15px;
      }

      button:hover {
        background: #ff2d74;
        transform: scale(1.02);
      }

      .row {
        display: flex;
        gap: 8px;
      }

      .row button {
        width: 50%;
      }

      /* HISTORY */
      .history {
        margin-top: 15px;
        text-align: left;
        background: #fff5f8;
        padding: 10px;
        border-radius: 12px;
        max-height: 150px;
        overflow: auto;
        font-size: 13px;
      }

      .item {
        padding: 5px;
        border-bottom: 1px dashed #ddd;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h1>💖 Cute Counter</h1>

      <div id="value" class="zero">0</div>

      <button id="plus">➕ +1</button>

      <div class="row">
        <button id="minus">➖ -1</button>
        <button id="reset">🔄 Reset</button>
      </div>

      <button id="fast">⚡ +5</button>

      <!-- HISTORY -->
      <div class="history" id="history">📜 Lịch sử thay đổi:</div>
    </div>

    <script>
      /* =====================
   STATE
===================== */
      let count = Number(localStorage.getItem("count")) || 0;
      let history = JSON.parse(localStorage.getItem("history")) || [];

      const valueEl = document.getElementById("value");
      const historyEl = document.getElementById("history");

      /* =====================
   SAVE
===================== */
      function save() {
        localStorage.setItem("count", count);
        localStorage.setItem("history", JSON.stringify(history));
      }

      /* =====================
   ANIMATION
===================== */
      function animate() {
        valueEl.classList.add("pop");
        setTimeout(() => valueEl.classList.remove("pop"), 150);
      }

      /* =====================
   RENDER
===================== */
      function render() {
        valueEl.innerText = count;

        /* màu */
        valueEl.classList.remove("positive", "negative", "zero");

        if (count > 0) valueEl.classList.add("positive");
        else if (count < 0) valueEl.classList.add("negative");
        else valueEl.classList.add("zero");

        /* render history */
        historyEl.innerHTML = "📜 Lịch sử thay đổi:";

        history.forEach((item) => {
          historyEl.innerHTML += `
<div class="item">${item}</div>
`;
        });

        save();
        animate();
      }

      /* =====================
   ADD HISTORY
===================== */
      function addHistory(text) {
        history.unshift(text); // mới nhất lên đầu
        if (history.length > 20) history.pop(); // giới hạn 20 dòng
      }

      /* =====================
   EVENTS
===================== */

      document.getElementById("plus").addEventListener("click", () => {
        count++;
        addHistory("➕ +1 → " + count);
        render();
      });

      document.getElementById("minus").addEventListener("click", () => {
        count--;
        addHistory("➖ -1 → " + count);
        render();
      });

      document.getElementById("fast").addEventListener("click", () => {
        count += 5;
        addHistory("⚡ +5 → " + count);
        render();
      });

      document.getElementById("reset").addEventListener("click", () => {
        count = 0;
        addHistory("🔄 Reset → 0");
        render();
      });

      /* INIT */
      render();
    </script>
  </body>
</html>
