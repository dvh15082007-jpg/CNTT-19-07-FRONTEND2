    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(135deg, #ffd6e7, #d6e7ff);
        display: flex;
        justify-content: center;
        padding: 25px;
      }

      .box {
        width: 900px;
        background: white;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        color: #ff4f8d;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      input {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ddd;
        outline: none;
      }

      button {
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: #ff5d95;
        color: white;
        cursor: pointer;
        margin-top: 8px;
      }

      button:hover {
        background: #ff2d74;
      }

      .search {
        display: flex;
        gap: 8px;
        margin-top: 15px;
      }

      .search input {
        flex: 1;
      }

      .card {
        background: #fff5f8;
        padding: 10px;
        margin-top: 10px;
        border-radius: 12px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      }

      .small {
        color: #666;
        margin: 3px 0;
      }

      .status {
        margin-top: 10px;
        font-weight: bold;
        color: green;
      }
    </style>
  </head>

      /* RENDER */
      function render(data = students) {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach((s) => {
          list.innerHTML += `
<div class="card">
<h3>👤 ${s.name} (${s.id})</h3>
<p class="small">📚 Lớp: ${s.class}</p>
<p class="small">📧 Email: ${s.email}</p>
<button onclick="deleteStudent(${s.id})">🗑 Xóa</button>
</div>
`;
        });
      }

      /* ADD */
      function addStudent() {
        let id = document.getElementById("id").value.trim();
        let name = document.getElementById("name").value.trim();
        let cls = document.getElementById("class").value.trim();
        let email = document.getElementById("email").value.trim();

        if (!id || !name || !cls || !email) {
          alert("❌ Nhập đầy đủ thông tin!");
          return;
        }

        students.push({
          id: Number(id),
          name,
          class: cls,
          email,
        });

        /* RESET FORM */
        document.getElementById("id").value = "";
        document.getElementById("name").value = "";
        document.getElementById("class").value = "";
        document.getElementById("email").value = "";

        /* MESSAGE */
        let status = document.getElementById("status");
        status.innerText = "✔ Đã thêm sinh viên thành công!";

        setTimeout(() => (status.innerText = ""), 2000);

        render();
      }

      /* DELETE */
      function deleteStudent(id) {
        students = students.filter((s) => s.id !== id);
        render();
      }

      /* SEARCH */
      function search() {
        let key = document.getElementById("searchBox").value.toLowerCase();

        let result = students.filter(
          (s) =>
            s.id.toString().includes(key) ||
            s.name.toLowerCase().includes(key) ||
            s.class.toLowerCase().includes(key) ||
            s.email.toLowerCase().includes(key)
        );

        document.getElementById(
          "status"
        ).innerText = `🔎 Tìm thấy ${result.length} kết quả`;

        render(result);
      }

      /* CLEAR */
      function clearSearch() {
        document.getElementById("searchBox").value = "";
        document.getElementById("status").innerText = "";
        render();
      }

      /* SORT A-Z */
      function sortAZ() {
        students.sort((a, b) => a.name.localeCompare(b.name, "vi"));
        render();
      }

      render();
