<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài Lab 01 - Tính BMI</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        background: linear-gradient(135deg, #ffd6e7, #d6e7ff);
      }

      .container {
        width: 380px;
        background: white;

        padding: 30px;

        border-radius: 25px;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);

        text-align: center;

        transition: 0.3s;
      }

      .container:hover {
        transform: translateY(-5px);
      }

      h1 {
        color: #ff4f87;
        margin-bottom: 20px;
      }

      .icon {
        font-size: 50px;
        margin-bottom: 10px;
      }

      .input-group {
        text-align: left;
        margin-top: 15px;
      }

      label {
        font-weight: bold;
        color: #555;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-top: 6px;

        border-radius: 12px;

        border: 2px solid #ddd;

        outline: none;

        transition: 0.3s;
      }

      input:focus {
        border-color: #ff7ca8;
      }

      button {
        width: 100%;
        padding: 13px;

        margin-top: 20px;

        border: none;

        border-radius: 15px;

        background: #ff5c93;

        color: white;

        font-size: 17px;

        cursor: pointer;

        transition: 0.3s;
      }

      button:hover {
        background: #ff2f74;
        transform: scale(1.03);
      }

      button:active {
        transform: scale(0.95);
      }

      #ketQua {
        margin-top: 20px;

        padding: 10px;

        font-size: 18px;
        font-weight: bold;

        border-radius: 15px;
      }

      .gay {
        color: orange;
        background: #fff4dd;
      }

      .binhthuong {
        color: green;
        background: #e8ffe8;
      }

      .thuacan {
        color: #d2691e;
        background: #fff0df;
      }

      .beophi {
        color: red;
        background: #ffe6e6;
      }

      .loi {
        color: white;
        background: #ff4d4d;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="icon">💖</div>

      <h1>TÍNH CHỈ SỐ BMI</h1>

      <div class="input-group">
        <label> Chiều cao (m) </label>

        <input
          type="number"
          id="chieuCao"
          step="0.01"
          placeholder="Ví dụ: 1.70"
        />
      </div>

      <div class="input-group">
        <label> Cân nặng (kg) </label>

        <input type="number" id="canNang" placeholder="Ví dụ: 65" />
      </div>

      <button onclick="tinhBMI()">Tính ngay</button>

      <div id="ketQua"></div>
    </div>

    <script>
      function tinhBMI() {
        let chieuCao = Number(document.getElementById("chieuCao").value);

        let canNang = Number(document.getElementById("canNang").value);

        let ketQua = document.getElementById("ketQua");

        if (chieuCao == "" || canNang == "") {
          ketQua.innerHTML = "Vui lòng nhập dữ liệu";

          ketQua.className = "loi";

          return;
        }

        if (chieuCao <= 0 || canNang <= 0) {
          ketQua.innerHTML = "Dữ liệu không hợp lệ";

          ketQua.className = "loi";

          return;
        }

        let bmi = canNang / (chieuCao * chieuCao);

        let bmiHienThi = bmi.toFixed(2);

        let xepLoai = "";
        let mau = "";

        if (bmi < 18.5) {
          xepLoai = "Gầy";
          mau = "gay";
        } else if (bmi < 25) {
          xepLoai = "Bình thường";
          mau = "binhthuong";
        } else if (bmi < 30) {
          xepLoai = "Thừa cân";
          mau = "thuacan";
        } else {
          xepLoai = "Béo phì";
          mau = "beophi";
        }

        ketQua.innerHTML = `
BMI của bạn: ${bmiHienThi}
<br><br>
Phân loại: ${xepLoai}
`;

        ketQua.className = mau;
      }
    </script>
  </body>
</html>
