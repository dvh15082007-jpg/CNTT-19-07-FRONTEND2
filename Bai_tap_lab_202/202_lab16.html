<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 16 - Bộ Đếm Lượt Tương Tác</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .counter-container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        h2 {
            color: #333333;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .subtitle {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        /* Vùng hiển thị số đếm với hiệu ứng nổi bật */
        .display-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px dashed #ddd;
        }
        #counter-value {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
            transition: color 0.3s ease, transform 0.2s ease;
        }
        /* Grid các nút bấm gọn gàng */
        .button-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }
        .button-group-full {
            display: block;
        }
        /* Style chung cho các nút bấm hiện đại */
        button {
            font-size: 0.95rem;
            padding: 14px 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-increase { background: linear-gradient(135deg, #28a745, #218838); }
        .btn-decrease { background: linear-gradient(135deg, #dc3545, #c82333); }
        .btn-reset { background: linear-gradient(135deg, #6c757d, #5a6268); }
        .btn-fast { 
            background: linear-gradient(135deg, #007bff, #0069d9); 
            width: 100%;
            margin-top: 5px;
            padding: 14px;
}
        
        button:hover {
            filter: brightness(1.1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        
        /* Màu sắc số đếm thay đổi mượt mà */
        .text-positive { color: #28a745; transform: scale(1.05); }
        .text-negative { color: #dc3545; transform: scale(1.05); }
        .text-zero { color: #343a40; }

        /* Vùng chân trang chứa Link GitHub */
        .github-footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .github-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: #24292e;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .github-link:hover {
            background-color: #444;
        }
        .github-link svg {
            fill: currentColor;
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>

    <div class="counter-container">
        <h2>BÀI LAB 16</h2>
        <div class="subtitle">Bộ Đếm Lượt Tương Tác</div>
        
        <div class="display-box">
            <div id="counter-value" class="text-zero">0</div>
        </div>
        
        <div class="button-group">
            <button id="btn-decrease" class="btn-decrease">Giảm -1</button>
            <button id="btn-reset" class="btn-reset">Reset</button>
            <button id="btn-increase" class="btn-increase">Tăng +1</button>
        </div>
        
        <div class="button-group-full">
            <button id="btn-fast-increase" class="btn-fast">Tăng Nhanh +10</button>
        </div>

        <div class="github-footer">
            <a href="https://github.com/HaNgo-123/1871020202-bai-tap-lab-buoi-6.git" id="github-repo" target="_blank" class="github-link">
                <svg viewBox="0 0 16 16" version="1.1" aria-hidden="true"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                Xem Code Trên GitHub
            </a>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // 1. Biến lưu trạng thái bộ đếm
            let count = 0;
// 2. Hàm cập nhật giao diện
            function updateUI() {
                $('#counter-value').text(count);

                // Hiệu ứng thay đổi màu sắc và phóng to nhẹ khi thay đổi số
                $('#counter-value').removeClass('text-positive text-negative text-zero');
                
                if (count > 0) {
                    $('#counter-value').addClass('text-positive');
                } else if (count < 0) {
                    $('#counter-value').addClass('text-negative');
                } else {
                    $('#counter-value').addClass('text-zero');
                }
            }

            // 3. Xử lý các sự kiện click bằng jQuery
            $('#btn-increase').click(function() {
                count++;
                updateUI();
            });

            $('#btn-decrease').click(function() {
                count--;
                updateUI();
            });

            $('#btn-reset').click(function() {
                count = 0;
                updateUI();
            });

            $('#btn-fast-increase').click(function() {
                count += 10;
                updateUI();
            });
        });
    </script>
</body>
</html>
