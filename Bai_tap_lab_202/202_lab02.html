<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 02 - Tính khuyến mãi</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        background: linear-gradient(135deg, #ffd6e7, #d6e7ff);
      }

      .container {
        width: 450px;

        background: white;

        padding: 30px;

        border-radius: 25px;

        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .icon {
        font-size: 50px;

        text-align: center;

        margin-bottom: 10px;
      }

      h1 {
        text-align: center;

        color: #ff4f87;

        margin-bottom: 20px;
      }

      .group {
        margin-top: 15px;
      }

      label {
        font-weight: bold;

        display: block;

        margin-bottom: 5px;

        color: #555;
      }

      input,
      select {
        width: 100%;

        padding: 12px;

        border-radius: 12px;

        border: 2px solid #ddd;

        outline: none;
      }

      input:focus,
      select:focus {
        border-color: #ff6fa5;
      }

      button {
        width: 100%;

        padding: 13px;

        margin-top: 20px;

        border: none;

        border-radius: 15px;

        background: #ff5c93;

        color: white;

        font-size: 18px;

        cursor: pointer;

        transition: 0.3s;
      }

      button:hover {
        background: #ff2d74;

        transform: scale(1.03);
      }

      #ketQua {
        display: none;

        margin-top: 20px;

        padding: 15px;

        border-radius: 15px;

        background: #fff5f8;

        line-height: 2;
      }

      .loi {
        background: #ff4d4d !important;

        color: white;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="icon">🛒💖</div>

      <h1>TÍNH KHUYẾN MÃI</h1>

      <div class="group">
        <label> Giá trị đơn hàng (VNĐ) </label>

        <input type="number" id="donHang" placeholder="Ví dụ: 800000" />
      </div>

      <div class="group">
        <label> Hạng thành viên </label>

        <select id="thanhVien">
          <option value="thuong">Thường</option>

          <option value="bac">Bạc</option>

          <option value="vang">Vàng</option>

          <option value="kimcuong">Kim cương</option>
        </select>
      </div>

      <div class="group">
        <label> Mã giảm giá </label>

        <input type="text" id="ma" placeholder="Nhập SALE50" />
      </div>

      <button onclick="tinhKhuyenMai()">Tính thanh toán</button>

      <div id="ketQua"></div>
    </div>

    <script>
      function formatTien(tien) {
        return tien.toLocaleString("vi-VN") + " VNĐ";
      }

      function tinhKhuyenMai() {
        let donHang = Number(document.getElementById("donHang").value);

        let thanhVien = document.getElementById("thanhVien").value;

        let ma = document.getElementById("ma").value;

        let ketQua = document.getElementById("ketQua");

        if (donHang <= 0) {
          ketQua.style.display = "block";

          ketQua.className = "loi";

          ketQua.innerHTML = "❌ Vui lòng nhập giá trị hợp lệ";

          return;
        }

        let giamDon = 0;

        if (donHang < 300000) {
          giamDon = 5;
        } else if (donHang < 700000) {
          giamDon = 10;
        } else {
          giamDon = 15;
        }

        let giamTV = 0;

        let tenTV = "";

        if (thanhVien == "thuong") {
          tenTV = "Thường";
        } else if (thanhVien == "bac") {
          tenTV = "Bạc";

          giamTV = 2;
        } else if (thanhVien == "vang") {
          tenTV = "Vàng";

          giamTV = 5;
        } else {
          tenTV = "Kim cương";

          giamTV = 8;
        }

        let tongPhanTram = giamDon + giamTV;

        let tienGiam = (donHang * tongPhanTram) / 100;

        let maDaDung = "Không dùng";

        if (ma == "SALE50") {
          tienGiam += 50000;

          maDaDung = "SALE50 (-50.000 VNĐ)";
        }

        let phiShip = 30000;

        if (donHang >= 1000000) {
          phiShip = 0;
        }

        let thanhToan = donHang - tienGiam + phiShip;

        ketQua.className = "";

        ketQua.style.display = "block";

        ketQua.innerHTML = `

<h3>
📋 KẾT QUẢ
</h3>

Giá trị đơn:
<b>${formatTien(donHang)}</b>

<br>

Hạng thành viên:
<b>${tenTV}</b>

<br>

Khuyến mãi theo đơn:
<b>${giamDon}%</b>

<br>

Ưu đãi thành viên:
<b>${giamTV}%</b>

<br>

Tổng tỷ lệ giảm:
<b>${tongPhanTram}%</b>

<br>

Mã giảm:
<b>${maDaDung}</b>

<br>

Tiền giảm:
<b>${formatTien(tienGiam)}</b>

<br>

Phí vận chuyển:
<b>${formatTien(phiShip)}</b>

<hr>

<h2>

Tổng thanh toán:

${formatTien(thanhToan)}

</h2>

`;
      }
    </script>
  </body>
</html>
