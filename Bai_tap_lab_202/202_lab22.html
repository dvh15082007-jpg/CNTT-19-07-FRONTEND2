<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Hello Kitty Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #ffd8ec, #ffc5e6, #ffeef7);

        height: 100vh;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      .login-box {
        background: white;

        padding: 35px;

        border-radius: 35px;

        box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
      }

      .kitty {
        width: 120px;

        height: 120px;

        margin: auto;

        border-radius: 50%;

        background: #fff0f7;

        border: 5px solid pink;

        display: flex;

        justify-content: center;

        align-items: center;

        font-size: 55px;
      }

      .title {
        color: #ff4fa0;

        font-weight: bold;
      }

      .btn-kitty {
        background: #ff69b4;

        border: none;

        color: white;

        font-weight: bold;

        border-radius: 20px;

        padding: 10px;
      }

      .btn-kitty:hover {
        background: #ff4d9b;

        color: white;
      }

      .hidden {
        display: none;
      }

      .line {
        display: flex;

        align-items: center;

        margin: 15px 0;
      }

      .line::before,
      .line::after {
        content: "";

        height: 1px;

        background: #ddd;

        flex: 1;
      }

      .line span {
        padding: 0 10px;

        color: gray;
      }

      .social {
        border-radius: 20px;

        font-weight: bold;
      }

      #msg {
        font-weight: bold;

        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <div class="container h-100">
      <div class="row justify-content-center align-items-center h-100">
        <div class="col-11 col-sm-9 col-md-6 col-lg-4">
          <div class="login-box text-center">
            <div class="kitty">😺🎀</div>

            <h2 class="title mt-3">Hello Kitty</h2>

            <p>Welcome dễ thương 💖</p>

            <!-- Màn hình đầu -->

            <div id="home">
              <button class="btn btn-kitty w-100 mb-3" onclick="showLogin()">
                Đăng nhập
              </button>

              <button class="btn btn-outline-danger w-100">Đăng ký</button>
            </div>

            <!-- Form đăng nhập -->

            <div id="loginForm" class="hidden">
              <h4 class="mb-3">Đăng nhập ✨</h4>

              <input
                id="email"
                type="email"
                class="form-control mb-3"
                placeholder="Email"
              />

              <input
                id="password"
                type="password"
                class="form-control mb-2"
                placeholder="Mật khẩu"
              />

              <div class="form-check text-start mb-3">
                <input type="checkbox" class="form-check-input" id="remember" />

                <label class="form-check-label"> 💖 Ghi nhớ đăng nhập </label>
              </div>

              <button class="btn btn-kitty w-100" onclick="login()">
                Xác nhận
              </button>

              <div class="line">
                <span>hoặc</span>
              </div>

              <button
                class="btn btn-outline-primary social w-100 mb-2"
                onclick="facebookLogin()"
              >
                📘 Đăng nhập bằng Facebook
              </button>

              <button
                class="btn btn-outline-danger social w-100"
                onclick="googleLogin()"
              >
                🌈 Đăng nhập bằng Google
              </button>

              <p id="msg" class="mt-3"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function showLogin() {
        document.getElementById("home").style.display = "none";

        document.getElementById("loginForm").style.display = "block";

        loadRemember();
      }

      function login() {
        let userEmail = document.getElementById("email").value;

        let userPass = document.getElementById("password").value;

        let remember = document.getElementById("remember").checked;

        if (
          userEmail === "ha.0967876149@gmail.com" &&
          userPass === "thanhha@17032006"
        ) {
          if (remember) {
            localStorage.setItem("email", userEmail);

            localStorage.setItem("password", userPass);
          } else {
            localStorage.removeItem("email");

            localStorage.removeItem("password");
          }

          document.getElementById("msg").innerHTML =
            "🎉 Đăng nhập thành công 💖";
        } else {
          document.getElementById("msg").innerHTML = "❌ Sai mật khẩu";
        }
      }

      function loadRemember() {
        let e = localStorage.getItem("email");

        let p = localStorage.getItem("password");

        if (e && p) {
          document.getElementById("email").value = e;

          document.getElementById("password").value = p;

          document.getElementById("remember").checked = true;
        }
      }

      function googleLogin() {
        document.getElementById("msg").innerHTML =
          "🌈 Đăng nhập Google thành công";
      }

      function facebookLogin() {
        document.getElementById("msg").innerHTML =
          "📘 Đăng nhập Facebook thành công";
      }
    </script>
  </body>
</html>
