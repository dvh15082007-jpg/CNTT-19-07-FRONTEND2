<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài 08 – Bộ Đếm Tương Tác</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --card: #fff;
    --pos: #16a34a;
    --neg: #dc2626;
    --neu: #6b7280;
    --text: #111827;
    --muted: #9ca3af;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container { width: 100%; max-width: 420px; text-align: center; }
  .tag { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.5rem; }
  h1 { font-family: 'Nunito', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem; }

  .counter-card {
    background: var(--card);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    margin-bottom: 1.2rem;
    position: relative;
    overflow: hidden;
  }
  .counter-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: var(--bar-color, var(--neu));
    transition: background 0.4s;
  }

  .count-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 7rem;
    line-height: 1;
    color: var(--num-color, var(--text));
    transition: color 0.3s, transform 0.15s;
    user-select: none;
  }
  .count-display.pop { animation: pop 0.15s ease; }
  @keyframes pop {
    0% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .count-label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
  }

  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.7rem;
    margin-bottom: 0.7rem;
  }
  .btn-full { grid-column: span 2; }
  .ctrl-btn {
    padding: 0.9rem;
    border-radius: 14px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  .ctrl-btn:active { transform: scale(0.96); }
  .btn-plus  { background: #dcfce7; color: var(--pos); }
  .btn-minus { background: #fee2e2; color: var(--neg); }
  .btn-plus5 { background: #d1fae5; color: #059669; }
  .btn-minus5 { background: #fecaca; color: #b91c1c; }
  .btn-reset { background: #f3f4f6; color: var(--neu); }
  .btn-plus:hover  { background: #bbf7d0; }
  .btn-minus:hover { background: #fecaca; }
  .btn-reset:hover { background: #e5e7eb; }

  .history-panel {
    background: var(--card);
    border-radius: 16px;
    padding: 1.2rem 1.5rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }
  .hist-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.7rem; display: flex; justify-content: space-between; align-items: center; }
  .hist-list { display: flex; flex-wrap: wrap; gap: 0.4rem; min-height: 24px; }
  .hist-item {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    padding: 0.15rem 0.6rem;
    border-radius: 6px;
    background: #f3f4f6;
    color: var(--muted);
    animation: slideIn 0.2s ease;
  }
  .hist-item.pos { background: #dcfce7; color: var(--pos); }
  .hist-item.neg { background: #fee2e2; color: var(--neg); }
  @keyframes slideIn { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }
</style>
</head>
<body>
<div class="container">
  <div class="tag">Buổi 3 · Bài Lab 08</div>
  <h1>Bộ Đếm Tương Tác 🎛️</h1>

  <div class="counter-card" id="counterCard">
    <div class="count-display" id="display">0</div>
    <div class="count-label" id="statusLabel">Trạng thái: Không</div>
    <div class="btn-grid">
      <button class="ctrl-btn btn-plus" onclick="change(1)">＋ 1</button>
      <button class="ctrl-btn btn-minus" onclick="change(-1)">－ 1</button>
      <button class="ctrl-btn btn-plus5" onclick="change(5)">＋ 5 nhanh</button>
      <button class="ctrl-btn btn-minus5" onclick="change(-5)">－ 5 nhanh</button>
      <button class="ctrl-btn btn-reset btn-full" onclick="reset()">↺ Đặt lại về 0</button>
    </div>
  </div>

  <div class="history-panel">
    <div class="hist-label">
      <span>Lịch sử thay đổi</span>
      <span id="histCount" style="font-weight:700;color:var(--text)">0 bước</span>
    </div>
    <div class="hist-list" id="histList"><span style="color:var(--muted);font-size:0.8rem">Chưa có thao tác nào</span></div>
  </div>
</div>

<script>
let count = 0;
const history = [];

function render() {
  const disp = document.getElementById('display');
  const card = document.getElementById('counterCard');
  const label = document.getElementById('statusLabel');

  disp.textContent = count;
  disp.classList.remove('pop');
  void disp.offsetWidth;
  disp.classList.add('pop');

  if (count > 0) {
    disp.style.color = '#16a34a';
    card.style.setProperty('--bar-color', '#16a34a');
    label.textContent = '📈 Trạng thái: Dương';
  } else if (count < 0) {
    disp.style.color = '#dc2626';
    card.style.setProperty('--bar-color', '#dc2626');
    label.textContent = '📉 Trạng thái: Âm';
  } else {
    disp.style.color = '#111827';
    card.style.setProperty('--bar-color', '#9ca3af');
    label.textContent = '⚖️ Trạng thái: Không';
  }
}

function change(n) {
  count += n;
  history.unshift(count);
  if (history.length > 12) history.pop();
  render();
  renderHistory();
}

function reset() {
  count = 0;
  history.unshift(0);
  if (history.length > 12) history.pop();
  render();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('histList');
  if (history.length === 0) {
    list.innerHTML = '<span style="color:var(--muted);font-size:0.8rem">Chưa có thao tác nào</span>';
    return;
  }
  list.innerHTML = history.map(v =>
    `<div class="hist-item ${v > 0 ? 'pos' : v < 0 ? 'neg' : ''}">${v > 0 ? '+' : ''}${v}</div>`
  ).join('');
  document.getElementById('histCount').textContent = history.length + ' bước';
}
</script>
</body>
</html>
