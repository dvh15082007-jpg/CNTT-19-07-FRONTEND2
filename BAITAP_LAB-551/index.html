<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LAB Front-End</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background:
                linear-gradient(rgba(0, 0, 0, 0.78),
                    rgba(0, 0, 0, 0.9)),
                url('https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: white;
            font-family: 'Orbitron', sans-serif;
        }

        .overlay {
            width: 100%;
            min-height: 100vh;
            backdrop-filter: blur(2px);
            padding: 40px 20px;
        }

        .main-title {
            text-align: center;
            margin-top: 10px;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 0 10px #00d9ff;
        }

        .sub-title {
            text-align: center;
            margin-top: 10px;
            color: #cfcfcf;
            font-style: italic;
            font-size: 1rem;
        }

        .sub-title b {
            color: #00d9ff;
        }

        .session-container {
            margin-top: 40px;
        }

        .session-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #00d9ff;
            text-shadow: 0 0 12px #00d9ff;
        }

        .theme-image {
            width: 100%;
            max-width: 650px;
            height: 320px;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid rgba(0, 217, 255, 0.4);
            box-shadow:
                0 0 15px rgba(0, 217, 255, 0.4),
                0 0 30px rgba(0, 217, 255, 0.15);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            padding: 10px 15px;
        }

        .nav-btn:hover {
            color: #00d9ff;
            transform: scale(1.1);
        }

        .lab-grid {
            margin-top: 35px;
        }

        .lab-card {
            position: relative;
            background: rgba(12, 25, 40, 0.75);
            border: 1px solid rgba(0, 217, 255, 0.4);
            padding: 25px;
            min-height: 170px;
            clip-path: polygon(
                    10px 0%,
                    calc(100% - 10px) 0%,
                    100% 10px,
                    100% calc(100% - 10px),
                    calc(100% - 10px) 100%,
                    10px 100%,
                    0% calc(100% - 10px),
                    0% 10px);
            transition: 0.3s;
            overflow: hidden;
        }

        .lab-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 1px solid rgba(0, 217, 255, 0.2);
            margin: 6px;
            clip-path: inherit;
            pointer-events: none;
        }

        .lab-card:hover {
            transform: translateY(-8px);
            box-shadow:
                0 0 15px rgba(0, 217, 255, 0.5),
                0 0 30px rgba(0, 217, 255, 0.2);
        }

        .lab-number {
            color: #00d9ff;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .lab-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .open-btn {
            text-decoration: none;
            color: white;
            border: 1px solid #00d9ff;
            padding: 8px 18px;
            display: inline-block;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .open-btn:hover {
            background: #00d9ff;
            color: black;
            box-shadow: 0 0 15px #00d9ff;
        }

        .bottom-nav {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .session-dot {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            transition: 0.3s;
        }

        .session-dot.active {
            background: #00d9ff;
            color: black;
            font-weight: bold;
            box-shadow: 0 0 15px #00d9ff;
        }

        .session-dot:hover {
            transform: scale(1.1);
        }

        @media(max-width: 768px) {
            body {
                overflow-y: auto;
            }

            .theme-image {
                height: 220px;
            }

            .main-title {
                font-size: 1.5rem;
            }

            .session-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>

    <div class="overlay container">

        <!-- TITLE -->
        <h1 class="main-title">
            TRẦN LÊ NHẬT THÀNH - CNTT 19-07
        </h1>

        <p class="sub-title">
            <i>
                Hân hạnh giới thiệu:
                <b>Bài tập lập trình Front-End</b>
            </i>
        </p>

        <!-- CONTENT -->
        <div class="session-container">

            <div class="row align-items-center">

                <div class="col-md-2 text-center">
                    <button class="nav-btn" onclick="prevSession()">
                        ← PREVIOUS
                    </button>
                </div>

                <div class="col-md-8 text-center">

                    <h2 class="session-title" id="sessionTitle">
                        BUỔI 1
                    </h2>

                    <img id="themeImage"
                        class="theme-image"
                        src=""
                        alt="Theme">

                </div>

                <div class="col-md-2 text-center">
                    <button class="nav-btn" onclick="nextSession()">
                        NEXT →
                    </button>
                </div>

            </div>

            <!-- LABS -->
            <div class="row lab-grid g-4" id="labContainer"></div>

            <!-- SESSION NAV -->
            <div class="bottom-nav" id="sessionNav"></div>

        </div>

    </div>

    <script>

        const sessions = [
            {
                title: "BUỔI 1 - JAVASCRIPT NHẬP MÔN",
                image: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?q=80&w=1200&auto=format&fit=crop",
                labs: [
                    { id: 1, name: "Tính chỉ số BMI" },
                    { id: 2, name: "Tính toán khuyến mãi" },
                    { id: 3, name: "Trò chơi dự đoán số" }
                ]
            },

            {
                title: "BUỔI 2 - MẢNG & CALLBACK",
                image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop",
                labs: [
                    { id: 4, name: "Xử lý điểm sinh viên" },
                    { id: 5, name: "Quản lý sản phẩm" },
                    { id: 6, name: "Tính toán callback" }
                ]
            },

            {
                title: "BUỔI 3 - HTML DOM",
                image: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop",
                labs: [
                    { id: 7, name: "DOM cơ bản" },
                    { id: 8, name: "Bộ đếm tương tác" },
                    { id: 9, name: "To-do List" }
                ]
            },

            {
                title: "BUỔI 4 - FETCH API",
                image: "https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop",
                labs: [
                    { id: 10, name: "Hiển thị JSON/API" },
                    { id: 11, name: "Tra cứu dữ liệu" },
                    { id: 12, name: "CRUD sinh viên" }
                ]
            },

            {
                title: "BUỔI 5 - JQUERY CƠ BẢN",
                image: "https://images.unsplash.com/photo-1504639725590-34d0984388bd?q=80&w=1200&auto=format&fit=crop",
                labs: [
                    { id: 13, name: "Ẩn hiện nội dung" },
                    { id: 14, name: "Hiệu ứng jQuery" },
                    { id: 15, name: "Validate Form" }
                ]
            },

            {
                title: "BUỔI 6 - JQUERY UI",
                image: "https://images.unsplash.com/photo-1517430816045-df4b7de11d1d?q=80&w=1200&auto=format&fit=crop",
                labs: [
                    { id: 16, name: "Counter jQuery" },
                    { id: 17, name: "Giỏ hàng" },
                    { id: 18, name: "CRUD giao diện" }
                ]
            },

            {
                title: "BUỔI 7 - AJAX & API",
                image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1200&auto=format&fit=crop",
                labs: [
                    { id: 19, name: "Ajax GET" },
                    { id: 20, name: "Ajax POST" },
                    { id: 21, name: "CRUD Ajax" }
                ]
            },

            {
                title: "BUỔI 8 - BOOTSTRAP",
                image: "https://images.unsplash.com/photo-1526379095098-d400fd0bf935?q=80&w=1200&auto=format&fit=crop",
                labs: [
                    { id: 22, name: "Login Responsive" },
                    { id: 23, name: "Product Grid" },
                    { id: 24, name: "Landing Page" }
                ]
            }
        ];

        let current = 0;

        function renderSession() {

            const session = sessions[current];

            document.getElementById("sessionTitle").innerText = session.title;

            document.getElementById("themeImage").src = session.image;

            // LABS
            const labContainer = document.getElementById("labContainer");

            labContainer.innerHTML = "";

            session.labs.forEach(lab => {

                labContainer.innerHTML += `
                    <div class="col-md-4">
                        <div class="lab-card">

                            <div class="lab-number">
                                LAB ${lab.id}
                            </div>

                            <div class="lab-title">
                                ${lab.name}
                            </div>

                            <a class="open-btn"
                               href="Bai${lab.id}/index.html">
                                OPEN LAB
                            </a>

                        </div>
                    </div>
                `;
            });

            // DOTS
            const nav = document.getElementById("sessionNav");

            nav.innerHTML = "";

            sessions.forEach((s, index) => {

                nav.innerHTML += `
                    <button
                        class="session-dot ${index === current ? "active" : ""}"
                        onclick="goToSession(${index})">

                        ${index + 1}

                    </button>
                `;
            });
        }

        function nextSession() {
            current = (current + 1) % sessions.length;
            renderSession();
        }

        function prevSession() {
            current = (current - 1 + sessions.length) % sessions.length;
            renderSession();
        }

        function goToSession(index) {
            current = index;
            renderSession();
        }

        renderSession();

    </script>

</body>

</html>
