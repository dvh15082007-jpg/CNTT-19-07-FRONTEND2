<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 23 - Product Grid</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>

        body {

            background:
                linear-gradient(135deg,
                #020617,
                #111827);

            min-height: 100vh;

            color: white;

            padding: 50px 20px;
        }

        .product-card {

            transition: 0.3s;

            border: none;

            overflow: hidden;
        }

        .product-card:hover {

            transform: translateY(-8px);

            box-shadow:
                0 0 20px rgba(56,189,248,0.25);
        }

        .product-image {

            height: 230px;

            object-fit: cover;
        }

        .modal-content {

            background:
                linear-gradient(135deg,
                #0f172a,
                #111827);

            color: white;

            border-radius: 20px;
        }

        .modal-image {

            width: 100%;

            border-radius: 15px;

            max-height: 300px;

            object-fit: cover;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1 class="text-center mb-5">
            Bootstrap Product Grid
        </h1>

        <div class="row g-4"
             id="productContainer"></div>

    </div>

    <!-- MODAL -->

    <div class="modal fade"
         id="productModal">

        <div class="modal-dialog modal-lg">

            <div class="modal-content">

                <div class="modal-header border-0">

                    <h3 class="modal-title"
                        id="modalTitle">

                        Product Detail

                    </h3>

                    <button class="btn-close btn-close-white"
                            data-bs-dismiss="modal">

                    </button>

                </div>

                <div class="modal-body">

                    <div class="row g-4 align-items-center">

                        <div class="col-md-6">

                            <img id="modalImage"
                                 class="modal-image">

                        </div>

                        <div class="col-md-6">

                            <div id="modalBadge"></div>

                            <h2 id="modalName"
                                class="mt-3"></h2>

                            <h3 id="modalPrice"
                                class="text-warning mt-3"></h3>

                            <p class="mt-3">

                                <b>Nhà sản xuất:</b>

                                <span id="modalBrand"></span>

                            </p>

                            <p>

                                <b>Khuyến mãi:</b>

                                <span id="modalSale"></span>

                            </p>

                            <hr>

                            <p id="modalDesc"
                               class="text-light"></p>

                            <button class="btn btn-info w-100 mt-3">

                                🛒 Thêm vào giỏ hàng

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        const products = [

            {

                name: "MacBook Pro",

                price: "32,000,000 VNĐ",

                badge: "SALE -20%",

                badgeClass: "bg-danger",

                brand: "Apple",

                sale:
                "Tặng kèm balo + giảm thêm 2 triệu khi thanh toán online.",

                image:
                "https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=1200&auto=format&fit=crop",

                desc:
                "Anh/chị đang tìm một chiếc laptop vừa mạnh vừa sang để code Front-End, edit video hay làm việc chuyên nghiệp đúng không ạ? MacBook Pro là lựa chọn cực kỳ đáng tiền với hiệu năng cực ổn định và màn hình Retina siêu đẹp."

            },

            {

                name: "Mechanical Keyboard",

                price: "1,500,000 VNĐ",

                badge: "NEW",

                badgeClass: "bg-success",

                brand: "Akko",

                sale:
                "Miễn phí switch puller + keycap custom.",

                image:
                "https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?q=80&w=1200&auto=format&fit=crop",

                desc:
                "Nếu anh/chị thích cảm giác gõ phím đã tay và setup góc máy đẹp thì chiếc bàn phím cơ này rất phù hợp. LED RGB cực đẹp, switch gõ êm và cực kỳ phù hợp cho coder."

            },

            {

                name: "Headphone",

                price: "2,000,000 VNĐ",

                badge: "HOT",

                badgeClass: "bg-primary",

                brand: "Sony",

                sale:
                "Tặng túi chống sốc cao cấp.",

                image:
                "https://images.unsplash.com/photo-1546435770-a3e426bf472b?q=80&w=1200&auto=format&fit=crop",

                desc:
                "Chiếc headphone này hiện đang rất được dân văn phòng và game thủ ưa chuộng vì chống ồn tốt, bass mạnh và đeo lâu không đau tai."

            },

            {

                name: "Monitor 27 inch",

                price: "6,500,000 VNĐ",

                badge: "BEST SELLER",

                badgeClass: "bg-warning",

                brand: "LG",

                sale:
                "Tặng HDMI cao cấp + freeship toàn quốc.",

                image:
                "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?q=80&w=1200&auto=format&fit=crop",

                desc:
                "Màn hình 27 inch chuẩn dành cho dân thiết kế UI/UX và lập trình Front-End. Màu sắc cực đẹp, không gian làm việc rộng rãi."

            },

            {

                name: "Gaming Mouse",

                price: "800,000 VNĐ",

                badge: "SALE",

                badgeClass: "bg-danger",

                brand: "Logitech",

                sale:
                "Giảm thêm 10% khi mua cùng keyboard.",

                image:
                "https://images.unsplash.com/photo-1527814050087-3793815479db?q=80&w=1200&auto=format&fit=crop",

                desc:
                "Chuột gaming siêu nhẹ, click cực nhạy và cầm rất ôm tay. Đây là mẫu bán rất chạy cho các bạn thích chơi game và làm việc tốc độ cao."

            },

            {

                name: "WiFi Router",

                price: "900,000 VNĐ",

                badge: "NEW",

                badgeClass: "bg-success",

                brand: "TP-Link",

                sale:
                "Bảo hành chính hãng 24 tháng.",

                image:
                "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop",

                desc:
                "Router tốc độ cao cực kỳ phù hợp cho phòng trọ sinh viên hoặc gia đình nhỏ. Học online, gaming hay stream đều rất ổn định."

            }

        ];

        const container =
            document.getElementById(
                "productContainer"
            );

        products.forEach(product => {

            container.innerHTML += `

                <div class="col-md-6 col-lg-4">

                    <div class="
                        card
                        product-card
                        shadow-lg
                        h-100
                    ">

                        <img class="
                            card-img-top
                            product-image
                        "
                        src="${product.image}">

                        <div class="card-body">

                            <span class="
                                badge
                                ${product.badgeClass}
                                mb-2
                            ">

                                ${product.badge}

                            </span>

                            <h4 class="card-title">

                                ${product.name}

                            </h4>

                            <h5 class="text-warning mt-3">

                                ${product.price}

                            </h5>

                            <button class="
                                btn btn-dark
                                w-100
                                mt-3
                            "

                            onclick='showProduct(
                                ${JSON.stringify(product)}
                            )'

                            data-bs-toggle="modal"
                            data-bs-target="#productModal">

                                Quick View

                            </button>

                        </div>

                    </div>

                </div>

            `;
        });

        function showProduct(product) {

            document.getElementById(
                "modalTitle"
            ).innerText = product.name;

            document.getElementById(
                "modalName"
            ).innerText = product.name;

            document.getElementById(
                "modalPrice"
            ).innerText = product.price;

            document.getElementById(
                "modalBrand"
            ).innerText = product.brand;

            document.getElementById(
                "modalSale"
            ).innerText = product.sale;

            document.getElementById(
                "modalDesc"
            ).innerText = product.desc;

            document.getElementById(
                "modalImage"
            ).src = product.image;

            document.getElementById(
                "modalBadge"
            ).innerHTML = `

                <span class="
                    badge
                    ${product.badgeClass}
                ">

                    ${product.badge}

                </span>

            `;
        }

    </script>

</body>

</html>
