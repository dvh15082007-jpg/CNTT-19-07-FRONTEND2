<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 7 - DOM Cơ Bản</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #020617, #111827);
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .box {
            width: 700px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
        }

        img {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
            border-radius: 15px;
            margin-top: 20px;
            transition: 0.5s;
        }

        .dark-mode {
            background: linear-gradient(135deg, #000, #1f2937);
        }

        .light-mode {
            background: linear-gradient(135deg, #dbeafe, #f8fafc);
            color: black;
        }
    </style>
</head>

<body id="body">

    <div class="box">

        <h1 id="title">
            Welcome To Front-End World
        </h1>

        <p id="description">
            JavaScript có thể thay đổi nội dung HTML cực kỳ mạnh mẽ.
        </p>

        <img id="image"
            src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop">

        <div class="mt-4 d-flex gap-3 justify-content-center flex-wrap">

            <button class="btn btn-info"
                    onclick="changeContent()">

                Đổi Nội Dung

            </button>

            <button class="btn btn-warning"
                    onclick="changeTheme()">

                Đổi Theme

            </button>

            <button class="btn btn-danger"
                    onclick="resetContent()">

                Reset

            </button>

        </div>

    </div>

    <script>

        let changed = false;

        function changeContent() {

            document.getElementById("title").innerText =
                "DOM Manipulation Success!";

            document.getElementById("description").innerText =
                "Bạn vừa thao tác DOM bằng JavaScript.";

            document.getElementById("image").src =
                "https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1200&auto=format&fit=crop";

            changed = true;
        }

        function changeTheme() {

            const body = document.getElementById("body");

            if(body.classList.contains("light-mode")) {

                body.classList.remove("light-mode");
                body.classList.add("dark-mode");
            }
            else {

                body.classList.remove("dark-mode");
                body.classList.add("light-mode");
            }
        }

        function resetContent() {

            document.getElementById("title").innerText =
                "Welcome To Front-End World";

            document.getElementById("description").innerText =
                "JavaScript có thể thay đổi nội dung HTML cực kỳ mạnh mẽ.";

            document.getElementById("image").src =
                "https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop";

            document.getElementById("body").className = "";

            changed = false;
        }

    </script>

</body>

</html>
