<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 18 - Member Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body {
            background: linear-gradient(135deg, #020617, #111827);
            min-height: 100vh;
            color: white;
            padding: 50px 20px;
        }

        .box {
            max-width: 900px;
            margin: auto;
            background: rgba(255,255,255,0.05);
            padding: 35px;
            border-radius: 20px;
        }

        .member-item {
            background: rgba(255,255,255,0.08);
            padding: 18px;
            border-radius: 12px;
            margin-top: 15px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1 class="text-center mb-4">
            Member Manager
        </h1>

        <!-- INPUT -->

        <div class="d-flex gap-2 mb-4">

            <input type="text"
                   id="memberInput"
                   class="form-control"
                   placeholder="Nhập tên thành viên">

            <button class="btn btn-success"
                    id="addBtn">

                Thêm

            </button>

        </div>

        <!-- SEARCH -->

        <div class="mb-4">

            <input type="text"
                   id="searchInput"
                   class="form-control"
                   placeholder="Tìm kiếm thành viên...">

        </div>

        <!-- LIST -->

        <div id="memberList"></div>

    </div>

    <script>

        let members = [];

        function render(keyword = "") {

            $("#memberList").html("");

            const filtered =
                members.filter(member =>
                    member
                    .toLowerCase()
                    .includes(
                        keyword.toLowerCase()
                    )
                );

            if(filtered.length === 0) {

                $("#memberList").html(`
                    <div class="alert alert-secondary">
                        Không có thành viên nào.
                    </div>
                `);

                return;
            }

            filtered.forEach((member, index) => {

                const realIndex =
                    members.indexOf(member);

                $("#memberList").append(`

                    <div class="
                        member-item
                        d-flex
                        justify-content-between
                        align-items-center
                    ">

                        <div>

                            <b>#${index + 1}</b>

                            ${member}

                        </div>

                        <div class="d-flex gap-2">

                            <button class="
                                btn btn-warning btn-sm editBtn
                            "
                            data-index="${realIndex}">

                                Sửa

                            </button>

                            <button class="
                                btn btn-danger btn-sm deleteBtn
                            "
                            data-index="${realIndex}">

                                Xóa

                            </button>

                        </div>

                    </div>

                `);
            });
        }

        // ADD

        $("#addBtn").click(function() {

            const name =
                $("#memberInput")
                .val()
                .trim();

            if(name === "") {

                alert("Không được để trống!");
                return;
            }

            members.push(name);

            $("#memberInput").val("");

            render(
                $("#searchInput").val()
            );
        });

        // DELETE

        $(document).on(
            "click",
            ".deleteBtn",
            function() {

                const index =
                    $(this).data("index");

                members.splice(index, 1);

                render(
                    $("#searchInput").val()
                );
            }
        );

        // EDIT

        $(document).on(
            "click",
            ".editBtn",
            function() {

                const index =
                    $(this).data("index");

                const newName =
                    prompt(
                        "Nhập tên mới:",
                        members[index]
                    );

                if(
                    newName &&
                    newName.trim() !== ""
                ) {

                    members[index] =
                        newName.trim();

                    render(
                        $("#searchInput").val()
                    );
                }
            }
        );

        // SEARCH

        $("#searchInput").on(
            "keyup",
            function() {

                render($(this).val());
            }
        );

        render();

    </script>

</body>

</html>
