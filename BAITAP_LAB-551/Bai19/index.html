<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 19 - Ajax GET</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- jQuery -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body {

            background:
                linear-gradient(135deg,
                #020617,
                #111827);

            min-height: 100vh;

            color: white;

            padding: 50px 20px;
        }

        .table-box {

            background:
                rgba(255,255,255,0.05);

            padding: 30px;

            border-radius: 20px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1 class="text-center mb-5">
            Ajax GET Users
        </h1>

        <div class="text-center mb-4">

            <button class="btn btn-info"
                    id="loadBtn">

                Tải dữ liệu

            </button>

        </div>

        <div id="status"></div>

        <div class="table-box">

            <table class="table table-dark table-hover">

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>

                    </tr>

                </thead>

                <tbody id="userTable"></tbody>

            </table>

        </div>

    </div>

    <script>

        $("#loadBtn").click(function() {

            $("#status").html(`
                <div class="alert alert-warning">
                    Đang tải dữ liệu...
                </div>
            `);

            $.ajax({

                url:
                "https://jsonplaceholder.typicode.com/users",

                method: "GET",

                success: function(users) {

                    $("#status").html("");

                    $("#userTable").html("");

                    users.forEach(user => {

                        $("#userTable").append(`

                            <tr>

                                <td>${user.id}</td>

                                <td>${user.name}</td>

                                <td>${user.email}</td>

                                <td>${user.phone}</td>

                            </tr>

                        `);
                    });
                },

                error: function() {

                    $("#status").html(`
                        <div class="alert alert-danger">
                            API lỗi hoặc không thể tải dữ liệu!
                        </div>
                    `);
                }

            });

        });

    </script>

</body>

</html>
