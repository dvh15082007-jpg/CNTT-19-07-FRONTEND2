<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 10 - Fetch API</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #020617, #111827);
            min-height: 100vh;
            color: white;
            padding: 50px 20px;
        }

        .box {
            max-width: 1100px;
            margin: auto;
        }

        .user-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            height: 100%;
            transition: 0.3s;
        }

        .user-card:hover {
            transform: translateY(-5px);
        }

    </style>

</head>

<body>

    <div class="box">

        <h1 class="text-center mb-5">
            Fetch API - Danh Sách Người Dùng
        </h1>

        <div class="text-center mb-4">

            <button class="btn btn-info"
                    onclick="loadUsers()">

                Tải Dữ Liệu

            </button>

        </div>

        <div id="loading"></div>

        <div class="row g-4"
             id="userList"></div>

    </div>

    <script>

        async function loadUsers() {

            const userList =
                document.getElementById("userList");

            const loading =
                document.getElementById("loading");

            userList.innerHTML = "";

            loading.innerHTML = `
                <div class="alert alert-warning">
                    Đang tải dữ liệu...
                </div>
            `;

            try {

                const response =
                    await fetch(
                        "https://jsonplaceholder.typicode.com/users"
                    );

                if(!response.ok) {

                    throw new Error(
                        "Không thể tải dữ liệu!"
                    );
                }

                const users =
                    await response.json();

                loading.innerHTML = "";

                users.forEach(user => {

                    userList.innerHTML += `

                        <div class="col-md-4">

                            <div class="user-card">

                                <h4 class="text-info">
                                    ${user.name}
                                </h4>

                                <p>
                                    📧 ${user.email}
                                </p>

                                <p>
                                    📱 ${user.phone}
                                </p>

                                <p>
                                    🌐 ${user.website}
                                </p>

                            </div>

                        </div>

                    `;
                });

            }
            catch(error) {

                loading.innerHTML = `
                    <div class="alert alert-danger">
                        ${error.message}
                    </div>
                `;
            }
        }

    </script>

</body>

</html>
