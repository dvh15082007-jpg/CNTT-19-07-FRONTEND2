<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 20 - Ajax POST</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- jQuery -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body {

            background:
                linear-gradient(135deg,
                #020617,
                #111827);

            min-height: 100vh;

            color: white;

            padding: 50px 20px;
        }

        .box {

            max-width: 800px;

            margin: auto;

            background:
                rgba(255,255,255,0.05);

            padding: 35px;

            border-radius: 20px;
        }

        .post-item {

            background:
                rgba(255,255,255,0.08);

            padding: 20px;

            border-radius: 15px;

            margin-top: 20px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1 class="text-center mb-4">
            Ajax POST Form
        </h1>

        <form id="postForm">

            <div class="mb-3">

                <label>Title</label>

                <input type="text"
                       id="title"
                       class="form-control">

            </div>

            <div class="mb-3">

                <label>Body</label>

                <textarea id="body"
                          class="form-control"></textarea>

            </div>

            <div class="mb-3">

                <label>User ID</label>

                <input type="number"
                       id="userId"
                       class="form-control">

            </div>

            <button class="btn btn-success w-100">

                Submit Post

            </button>

        </form>

        <div id="status"></div>

        <div id="postList"></div>

    </div>

    <script>

        $("#postForm").submit(function(event) {

            event.preventDefault();

            const title =
                $("#title").val().trim();

            const body =
                $("#body").val().trim();

            const userId =
                $("#userId").val().trim();

            if(
                title === "" ||
                body === "" ||
                userId === ""
            ) {

                $("#status").html(`
                    <div class="alert alert-danger mt-3">
                        Vui lòng nhập đầy đủ dữ liệu!
                    </div>
                `);

                return;
            }

            $("#status").html(`
                <div class="alert alert-warning mt-3">
                    Đang gửi dữ liệu...
                </div>
            `);

            $.ajax({

                url:
                "https://jsonplaceholder.typicode.com/posts",

                method: "POST",

                data: {

                    title,
                    body,
                    userId

                },

                success: function(post) {

                    $("#status").html(`
                        <div class="alert alert-success mt-3">
                            Gửi dữ liệu thành công!
                        </div>
                    `);

                    $("#postList").prepend(`

                        <div class="post-item">

                            <h4 class="text-info">
                                ${post.title}
                            </h4>

                            <p>
                                ${post.body}
                            </p>

                            <p>
                                User ID:
                                <b>${post.userId}</b>
                            </p>

                        </div>

                    `);

                    $("#postForm")[0].reset();
                },

                error: function() {

                    $("#status").html(`
                        <div class="alert alert-danger mt-3">
                            Gửi dữ liệu thất bại!
                        </div>
                    `);
                }

            });

        });

    </script>

</body>

</html>
