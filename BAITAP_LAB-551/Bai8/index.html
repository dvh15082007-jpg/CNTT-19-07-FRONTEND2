<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 8 - Counter App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #020617, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .counter-box {
            width: 500px;
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        .counter {
            font-size: 5rem;
            font-weight: bold;
            margin: 30px 0;
            transition: 0.3s;
        }

        .positive {
            color: #22c55e;
        }

        .negative {
            color: #ef4444;
        }

        .zero {
            color: white;
        }

    </style>

</head>

<body>

    <div class="counter-box">

        <h1 class="mb-4">
            Interactive Counter
        </h1>

        <div id="counter"
             class="counter zero">

            0

        </div>

        <div class="d-flex flex-wrap gap-3 justify-content-center">

            <button class="btn btn-success"
                    id="increaseBtn">

                +1

            </button>

            <button class="btn btn-info"
                    id="increase5Btn">

                +5

            </button>

            <button class="btn btn-warning"
                    id="decreaseBtn">

                -1

            </button>

            <button class="btn btn-danger"
                    id="resetBtn">

                RESET

            </button>

        </div>

    </div>

    <script>

        let count = 0;

        const counter =
            document.getElementById("counter");

        document.getElementById("increaseBtn")
            .addEventListener("click", function() {

                count++;
                render();
            });

        document.getElementById("increase5Btn")
            .addEventListener("click", function() {

                count += 5;
                render();
            });

        document.getElementById("decreaseBtn")
            .addEventListener("click", function() {

                count--;
                render();
            });

        document.getElementById("resetBtn")
            .addEventListener("click", function() {

                count = 0;
                render();
            });

        function render() {

            counter.innerText = count;

            counter.classList.remove(
                "positive",
                "negative",
                "zero"
            );

            if(count > 0) {

                counter.classList.add("positive");
            }
            else if(count < 0) {

                counter.classList.add("negative");
            }
            else {

                counter.classList.add("zero");
            }
        }

    </script>

</body>

</html>
