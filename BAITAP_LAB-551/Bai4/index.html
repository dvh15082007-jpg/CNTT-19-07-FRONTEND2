<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 4 - Điểm Sinh Viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #020617, #111827);
            min-height: 100vh;
            color: white;
            padding: 40px;
        }

        .box {
            max-width: 700px;
            margin: auto;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
        }

        .score-item {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2 class="text-center mb-4">
            Xử Lý Điểm Sinh Viên
        </h2>

        <div class="mb-3">
            <label>Nhập điểm mới</label>

            <div class="d-flex gap-2">
                <input type="number"
                       id="newScore"
                       class="form-control">

                <button class="btn btn-success"
                        onclick="addScore()">
                    Thêm
                </button>
            </div>
        </div>

        <div id="scoreList"></div>

        <hr>

        <div id="result"></div>

    </div>

    <script>

        let scores = [7.5, 8, 9, 6.5, 7];

        function render() {

            const scoreList = document.getElementById("scoreList");

            scoreList.innerHTML = "";

            scores.forEach((score, index) => {

                scoreList.innerHTML += `
                    <div class="score-item">
                        Điểm ${index + 1}: <b>${score}</b>
                    </div>
                `;
            });

            const total = scores.reduce((sum, score) => sum + score, 0);

            const avg = (total / scores.length).toFixed(2);

            let rank = "";

            if(avg < 5) rank = "Yếu";
            else if(avg < 6.5) rank = "Trung bình";
            else if(avg < 8) rank = "Khá";
            else rank = "Giỏi";

            document.getElementById("result").innerHTML = `
                <h4>Tổng điểm: ${total}</h4>
                <h4>Điểm trung bình: ${avg}</h4>
                <h4>Xếp loại:
                    <span class="text-info">${rank}</span>
                </h4>
            `;
        }

        function addScore() {

            const score = Number(document.getElementById("newScore").value);

            if(score < 0 || score > 10 || isNaN(score)) {
                alert("Điểm không hợp lệ!");
                return;
            }

            scores.push(score);

            document.getElementById("newScore").value = "";

            render();
        }

        render();

    </script>

</body>

</html>
