<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 13 - jQuery Hide Show</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body {
            background: linear-gradient(135deg, #020617, #111827);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .box {
            width: 700px;
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        .content-box {
            margin-top: 30px;
            padding: 25px;
            border-radius: 15px;
            background: rgba(255,255,255,0.08);
        }

        img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 15px;
            margin-top: 20px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1 class="mb-4">
            jQuery Hide / Show
        </h1>

        <div class="d-flex gap-3 justify-content-center flex-wrap">

            <button class="btn btn-danger"
                    id="hideBtn">

                Ẩn

            </button>

            <button class="btn btn-success"
                    id="showBtn">

                Hiện

            </button>

            <button class="btn btn-warning"
                    id="toggleBtn">

                Toggle

            </button>

            <button class="btn btn-info"
                    id="statusBtn">

                Kiểm tra trạng thái

            </button>

        </div>

        <div class="content-box"
             id="contentBox">

            <h3>
                Front-End Development
            </h3>

            <p>
                jQuery giúp thao tác DOM nhanh chóng và dễ dàng hơn.
            </p>

            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop">

        </div>

        <div id="status"
             class="mt-4"></div>

    </div>

    <script>

        $("#hideBtn").click(function() {

            $("#contentBox").hide(400);
        });

        $("#showBtn").click(function() {

            $("#contentBox").show(400);
        });

        $("#toggleBtn").click(function() {

            $("#contentBox").toggle(400);
        });

        $("#statusBtn").click(function() {

            if($("#contentBox").is(":visible")) {

                $("#status").html(`
                    <div class="alert alert-success mt-3">
                        Nội dung đang HIỂN THỊ
                    </div>
                `);
            }
            else {

                $("#status").html(`
                    <div class="alert alert-danger mt-3">
                        Nội dung đang BỊ ẨN
                    </div>
                `);
            }
        });

    </script>

</body>

</html>
