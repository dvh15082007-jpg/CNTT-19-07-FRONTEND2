<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 11 - Tra cứu dữ liệu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #020617, #0f172a);
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 650px;
            background: rgba(255,255,255,0.05);
            padding: 35px;
            border-radius: 20px;
        }

        .result {
            margin-top: 25px;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1 class="text-center mb-4">
            Tra Cứu Người Dùng
        </h1>

        <div class="d-flex gap-2">

            <input type="number"
                   id="userId"
                   class="form-control"
                   placeholder="Nhập ID từ 1 - 10">

            <button class="btn btn-info"
                    onclick="searchUser()">

                Tra cứu

            </button>

            <button class="btn btn-danger"
                    onclick="clearResult()">

                Xóa

            </button>

        </div>

        <div id="result"></div>

    </div>

    <script>

        async function searchUser() {

            const id =
                document.getElementById("userId").value;

            const result =
                document.getElementById("result");

            if(id === "") {

                result.innerHTML = `
                    <div class="alert alert-warning mt-3">
                        Vui lòng nhập ID!
                    </div>
                `;

                return;
            }

            result.innerHTML = `
                <div class="alert alert-info mt-3">
                    Đang tìm kiếm...
                </div>
            `;

            try {

                const response =
                    await fetch(
                        `https://jsonplaceholder.typicode.com/users/${id}`
                    );

                if(!response.ok) {

                    throw new Error(
                        "Không tìm thấy dữ liệu!"
                    );
                }

                const user =
                    await response.json();

                if(!user.id) {

                    throw new Error(
                        "Không tìm thấy người dùng!"
                    );
                }

                result.innerHTML = `

                    <div class="result">

                        <h3 class="text-info">
                            ${user.name}
                        </h3>

                        <p>
                            📧 Email:
                            <b>${user.email}</b>
                        </p>

                        <p>
                            📱 Phone:
                            <b>${user.phone}</b>
                        </p>

                        <p>
                            🌐 Website:
                            <b>${user.website}</b>
                        </p>

                        <p>
                            🏢 Company:
                            <b>${user.company.name}</b>
                        </p>

                    </div>

                `;

            }
            catch(error) {

                result.innerHTML = `
                    <div class="alert alert-danger mt-3">
                        ${error.message}
                    </div>
                `;
            }
        }

        function clearResult() {

            document.getElementById("userId").value = "";

            document.getElementById("result").innerHTML = "";
        }

    </script>

</body>

</html>
