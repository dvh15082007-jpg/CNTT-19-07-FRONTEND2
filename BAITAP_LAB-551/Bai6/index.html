<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 6 - Callback Đơn Hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #020617, #1e293b);
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 550px;
            background: rgba(255,255,255,0.05);
            padding: 35px;
            border-radius: 20px;
        }

        .step {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            margin-top: 15px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2 class="text-center mb-4">
            Callback Tính Đơn Hàng
        </h2>

        <div class="mb-3">
            <label>Giá trị đơn hàng</label>

            <input type="number"
                   id="price"
                   class="form-control">
        </div>

        <button class="btn btn-info w-100"
                onclick="startProcess()">

            Bắt đầu xử lý

        </button>

        <div id="result"></div>

    </div>

    <script>

        function calculateBase(price, callback) {

            callback(price);
        }

        function applyDiscount(price, callback) {

            let discount = 0;

            if(price >= 1000000) {
                discount = 0.1;
            }

            const finalPrice =
                price - (price * discount);

            callback(finalPrice, discount);
        }

        function addShipping(price, callback) {

            const shipping = 30000;

            const total = price + shipping;

            callback(total, shipping);
        }

        function startProcess() {

            const price =
                Number(document.getElementById("price").value);

            const result =
                document.getElementById("result");

            if(price <= 0) {

                result.innerHTML = `
                    <div class="alert alert-danger mt-3">
                        Dữ liệu không hợp lệ!
                    </div>
                `;

                return;
            }

            result.innerHTML = "";

            calculateBase(price, function(basePrice) {

                result.innerHTML += `
                    <div class="step">
                        💰 Tiền gốc:
                        <b>${basePrice.toLocaleString()} VNĐ</b>
                    </div>
                `;

                applyDiscount(basePrice, function(discountPrice, discount) {

                    result.innerHTML += `
                        <div class="step">
                            🎯 Giảm giá:
                            <b>${discount * 100}%</b>
                        </div>

                        <div class="step">
                            💵 Sau giảm:
                            <b>${discountPrice.toLocaleString()} VNĐ</b>
                        </div>
                    `;

                    addShipping(discountPrice, function(total, shipping) {

                        result.innerHTML += `
                            <div class="step">
                                🚚 Phí ship:
                                <b>${shipping.toLocaleString()} VNĐ</b>
                            </div>

                            <div class="step">
                                ✅ Tổng thanh toán:
                                <b class="text-warning">
                                    ${total.toLocaleString()} VNĐ
                                </b>
                            </div>
                        `;
                    });
                });
            });
        }

    </script>

</body>

</html>
