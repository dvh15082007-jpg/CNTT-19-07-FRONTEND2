<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 16 - jQuery Counter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body {
            background: linear-gradient(135deg, #020617, #111827);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .counter-box {
            width: 550px;
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        .counter {
            font-size: 5rem;
            font-weight: bold;
            margin: 30px 0;
            transition: 0.3s;
        }

        .positive {
            color: #22c55e;
        }

        .negative {
            color: #ef4444;
        }

        .zero {
            color: white;
        }

    </style>

</head>

<body>

    <div class="counter-box">

        <h1 class="mb-4">
            jQuery Counter
        </h1>

        <div id="counter"
             class="counter zero">

            0

        </div>

        <div class="d-flex gap-3
                    justify-content-center
                    flex-wrap">

            <button class="btn btn-success"
                    id="increaseBtn">

                +1

            </button>

            <button class="btn btn-info"
                    id="increase10Btn">

                +10

            </button>

            <button class="btn btn-warning"
                    id="decreaseBtn">

                -1

            </button>

            <button class="btn btn-danger"
                    id="resetBtn">

                RESET

            </button>

        </div>

    </div>

    <script>

        let count = 0;

        function render() {

            $("#counter")
                .text(count)
                .removeClass(
                    "positive negative zero"
                );

            if(count > 0) {

                $("#counter")
                    .addClass("positive");
            }
            else if(count < 0) {

                $("#counter")
                    .addClass("negative");
            }
            else {

                $("#counter")
                    .addClass("zero");
            }
        }

        $("#increaseBtn").click(function() {

            count++;
            render();
        });

        $("#increase10Btn").click(function() {

            count += 10;
            render();
        });

        $("#decreaseBtn").click(function() {

            count--;
            render();
        });

        $("#resetBtn").click(function() {

            count = 0;
            render();
        });

    </script>

</body>

</html>
