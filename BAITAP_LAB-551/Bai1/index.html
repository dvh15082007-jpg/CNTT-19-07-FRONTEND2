<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 1 - BMI Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        .card-box {
            width: 420px;
            background: rgba(255,255,255,0.05);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        .thin { background: #0ea5e9; }
        .normal { background: #16a34a; }
        .fat { background: #f59e0b; }
        .obese { background: #dc2626; }
    </style>
</head>

<body>

    <div class="card-box">

        <h2 class="text-center mb-4">BMI Calculator</h2>

        <div class="mb-3">
            <label>Chiều cao (m)</label>
            <input type="number" id="height" class="form-control" step="0.01">
        </div>

        <div class="mb-3">
            <label>Cân nặng (kg)</label>
            <input type="number" id="weight" class="form-control">
        </div>

        <button class="btn btn-info w-100" onclick="calculateBMI()">
            Tính BMI
        </button>

        <div id="result"></div>

    </div>

    <script>

        function calculateBMI() {

            const height = Number(document.getElementById("height").value);
            const weight = Number(document.getElementById("weight").value);

            const result = document.getElementById("result");

            if(height <= 0 || weight <= 0) {
                result.innerHTML = `
                    <div class="result bg-danger">
                        Vui lòng nhập dữ liệu hợp lệ!
                    </div>
                `;
                return;
            }

            const bmi = (weight / (height * height)).toFixed(2);

            let type = "";
            let className = "";

            if(bmi < 18.5) {
                type = "Gầy";
                className = "thin";
            }
            else if(bmi < 25) {
                type = "Bình thường";
                className = "normal";
            }
            else if(bmi < 30) {
                type = "Thừa cân";
                className = "fat";
            }
            else {
                type = "Béo phì";
                className = "obese";
            }

            result.innerHTML = `
                <div class="result ${className}">
                    BMI: ${bmi} <br>
                    Phân loại: ${type}
                </div>
            `;
        }

    </script>

</body>

</html>
