<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 21 - CRUD Ajax</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- jQuery -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body {

            background:
                linear-gradient(135deg,
                #020617,
                #111827);

            min-height: 100vh;

            color: white;

            padding: 50px 20px;
        }

        .box {

            max-width: 1100px;

            margin: auto;
        }

        .student-card {

            background:
                rgba(255,255,255,0.05);

            padding: 25px;

            border-radius: 20px;

            height: 100%;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1 class="text-center mb-5">
            CRUD Ajax Students
        </h1>

        <!-- FORM -->

        <div class="card bg-dark text-white p-4 mb-5">

            <h4 class="mb-4">
                Student Form
            </h4>

            <form id="studentForm">

                <div class="row g-3">

                    <div class="col-md-4">

                        <input type="text"
                               id="name"
                               class="form-control"
                               placeholder="Student Name">

                    </div>

                    <div class="col-md-4">

                        <input type="email"
                               id="email"
                               class="form-control"
                               placeholder="Email">

                    </div>

                    <div class="col-md-4">

                        <input type="text"
                               id="major"
                               class="form-control"
                               placeholder="Major">

                    </div>

                </div>

                <button class="btn btn-success mt-4"
                        id="submitBtn">

                    Add Student

                </button>

            </form>

        </div>

        <!-- SEARCH -->

        <div class="mb-4">

            <input type="text"
                   id="searchInput"
                   class="form-control"
                   placeholder="Search student...">

        </div>

        <!-- LIST -->

        <div class="row g-4"
             id="studentList"></div>

    </div>

    <script>

        const API =
            "https://jsonplaceholder.typicode.com/users";

        let students = [];

        let editId = null;

        // LOAD DATA

        function loadStudents() {

            $.ajax({

                url: API,

                method: "GET",

                success: function(data) {

                    students = data.slice(0, 8);

                    renderStudents(students);
                }

            });
        }

        // RENDER

        function renderStudents(list) {

            $("#studentList").html("");

            list.forEach(student => {

                $("#studentList").append(`

                    <div class="col-md-4">

                        <div class="student-card">

                            <h4 class="text-info">
                                ${student.name}
                            </h4>

                            <p>
                                📧 ${student.email}
                            </p>

                            <p>
                                🎓 ${student.company?.name || student.major}
                            </p>

                            <div class="d-flex gap-2">

                                <button class="
                                    btn btn-warning btn-sm editBtn
                                "
                                data-id="${student.id}">

                                    Edit

                                </button>

                                <button class="
                                    btn btn-danger btn-sm deleteBtn
                                "
                                data-id="${student.id}">

                                    Delete

                                </button>

                            </div>

                        </div>

                    </div>

                `);
            });
        }

        // ADD / UPDATE

        $("#studentForm").submit(function(event) {

            event.preventDefault();

            const name =
                $("#name").val().trim();

            const email =
                $("#email").val().trim();

            const major =
                $("#major").val().trim();

            if(
                name === "" ||
                email === "" ||
                major === ""
            ) {

                alert("Vui lòng nhập đầy đủ!");
                return;
            }

            const studentData = {

                name,
                email,
                major

            };

            // UPDATE

            if(editId) {

                $.ajax({

                    url: `${API}/${editId}`,

                    method: "PUT",

                    data: studentData,

                    success: function() {

                        students =
                            students.map(student => {

                                if(student.id == editId) {

                                    return {

                                        ...student,
                                        ...studentData

                                    };
                                }

                                return student;
                            });

                        renderStudents(students);

                        $("#studentForm")[0].reset();

                        editId = null;

                        $("#submitBtn")
                            .text("Add Student");
                    }

                });
            }

            // ADD

            else {

                $.ajax({

                    url: API,

                    method: "POST",

                    data: studentData,

                    success: function(student) {

                        students.unshift({

                            ...student,

                            id: Date.now()

                        });

                        renderStudents(students);

                        $("#studentForm")[0].reset();
                    }

                });
            }

        });

        // DELETE

        $(document).on(
            "click",
            ".deleteBtn",
            function() {

                const id =
                    $(this).data("id");

                $.ajax({

                    url: `${API}/${id}`,

                    method: "DELETE",

                    success: function() {

                        students =
                            students.filter(student =>
                                student.id != id
                            );

                        renderStudents(students);
                    }

                });

            }
        );

        // EDIT

        $(document).on(
            "click",
            ".editBtn",
            function() {

                const id =
                    $(this).data("id");

                const student =
                    students.find(student =>
                        student.id == id
                    );

                $("#name")
                    .val(student.name);

                $("#email")
                    .val(student.email);

                $("#major")
                    .val(
                        student.major ||
                        student.company?.name
                    );

                editId = id;

                $("#submitBtn")
                    .text("Update Student");
            }
        );

        // SEARCH

        $("#searchInput").on(
            "keyup",
            function() {

                const keyword =
                    $(this)
                    .val()
                    .toLowerCase();

                const filtered =
                    students.filter(student =>

                        student.name
                        .toLowerCase()
                        .includes(keyword)

                    );

                renderStudents(filtered);
            }
        );

        loadStudents();

    </script>

</body>

</html>
