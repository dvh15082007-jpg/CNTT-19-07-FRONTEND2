<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 3 - Guess Number</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #020617, #111827);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .game-box {
            width: 450px;
            background: rgba(255,255,255,0.05);
            padding: 35px;
            border-radius: 20px;
            text-align: center;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="game-box">

        <h2 class="mb-4">Guess The Number</h2>

        <p>
            Hãy đoán số từ 1 → 100
        </p>

        <input type="number"
               id="guess"
               class="form-control mb-3">

        <button class="btn btn-primary w-100 mb-2"
                onclick="checkGuess()">
            Đoán
        </button>

        <button class="btn btn-danger w-100"
                onclick="resetGame()">
            Chơi lại
        </button>

        <div id="message"></div>

    </div>

    <script>

        let secret = Math.floor(Math.random() * 100) + 1;

        let count = 0;

        function checkGuess() {

            const guess = Number(document.getElementById("guess").value);

            const message = document.getElementById("message");

            count++;

            if(guess < secret) {

                message.innerHTML = `
                    <div class="message bg-warning text-dark">
                        Số bí mật lớn hơn!
                    </div>
                `;
            }
            else if(guess > secret) {

                message.innerHTML = `
                    <div class="message bg-info">
                        Số bí mật nhỏ hơn!
                    </div>
                `;
            }
            else {

                message.innerHTML = `
                    <div class="message bg-success">
                        🎉 Chính xác! <br>
                        Bạn đã đoán đúng sau ${count} lượt.
                    </div>
                `;
            }
        }

        function resetGame() {

            secret = Math.floor(Math.random() * 100) + 1;

            count = 0;

            document.getElementById("guess").value = "";

            document.getElementById("message").innerHTML = `
                <div class="message bg-secondary">
                    Game đã reset!
                </div>
            `;
        }

    </script>

</body>

</html>
