<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 15 - Validate Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body {
            background: linear-gradient(135deg, #020617, #111827);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .form-box {
            width: 550px;
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
        }

        .error {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .success {
            color: #22c55e;
            font-size: 1rem;
            margin-top: 20px;
        }

        .valid {
            border: 2px solid #22c55e !important;
        }

        .invalid {
            border: 2px solid #ef4444 !important;
        }

    </style>

</head>

<body>

    <div class="form-box">

        <h1 class="text-center mb-4">
            Register Form
        </h1>

        <form id="registerForm">

            <!-- FULL NAME -->

            <div class="mb-3">

                <label>Họ tên</label>

                <input type="text"
                       id="fullname"
                       class="form-control">

                <div class="error"
                     id="fullnameError"></div>

            </div>

            <!-- EMAIL -->

            <div class="mb-3">

                <label>Email</label>

                <input type="text"
                       id="email"
                       class="form-control">

                <div class="error"
                     id="emailError"></div>

            </div>

            <!-- PHONE -->

            <div class="mb-3">

                <label>Số điện thoại</label>

                <input type="text"
                       id="phone"
                       class="form-control">

                <div class="error"
                     id="phoneError"></div>

            </div>

            <!-- PASSWORD -->

            <div class="mb-3">

                <label>Mật khẩu</label>

                <input type="password"
                       id="password"
                       class="form-control">

                <div class="error"
                     id="passwordError"></div>

            </div>

            <!-- CONFIRM -->

            <div class="mb-3">

                <label>Xác nhận mật khẩu</label>

                <input type="password"
                       id="confirmPassword"
                       class="form-control">

                <div class="error"
                     id="confirmError"></div>

            </div>

            <button class="btn btn-info w-100">
                Đăng ký
            </button>

        </form>

        <div id="successMessage"></div>

    </div>

    <script>

        $("#registerForm").submit(function(event) {

            event.preventDefault();

            $(".error").text("");

            $("input")
                .removeClass("valid invalid");

            $("#successMessage").html("");

            let isValid = true;

            // FULL NAME

            const fullname =
                $("#fullname").val().trim();

            if(fullname === "") {

                $("#fullnameError")
                    .text("Họ tên không được để trống");

                $("#fullname")
                    .addClass("invalid");

                isValid = false;
            }
            else {

                $("#fullname")
                    .addClass("valid");
            }

            // EMAIL

            const email =
                $("#email").val().trim();

            const emailRegex =
                /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if(!emailRegex.test(email)) {

                $("#emailError")
                    .text("Email không hợp lệ");

                $("#email")
                    .addClass("invalid");

                isValid = false;
            }
            else {

                $("#email")
                    .addClass("valid");
            }

            // PHONE

            const phone =
                $("#phone").val().trim();

            const phoneRegex =
                /^[0-9]{10}$/;

            if(!phoneRegex.test(phone)) {

                $("#phoneError")
                    .text("Số điện thoại phải gồm 10 số");

                $("#phone")
                    .addClass("invalid");

                isValid = false;
            }
            else {

                $("#phone")
                    .addClass("valid");
            }

            // PASSWORD

            const password =
                $("#password").val();

            if(password.length < 6) {

                $("#passwordError")
                    .text("Mật khẩu tối thiểu 6 ký tự");

                $("#password")
                    .addClass("invalid");

                isValid = false;
            }
            else {

                $("#password")
                    .addClass("valid");
            }

            // CONFIRM PASSWORD

            const confirmPassword =
                $("#confirmPassword").val();

            if(confirmPassword !== password) {

                $("#confirmError")
                    .text("Mật khẩu xác nhận không khớp");

                $("#confirmPassword")
                    .addClass("invalid");

                isValid = false;
            }
            else {

                $("#confirmPassword")
                    .addClass("valid");
            }

            // SUCCESS

            if(isValid) {

                $("#successMessage").html(`
                    <div class="success">
                        🎉 Đăng ký thành công!
                    </div>
                `);

                $("#registerForm")[0].reset();

                $("input")
                    .removeClass("valid");
            }

        });

    </script>

</body>

</html>
