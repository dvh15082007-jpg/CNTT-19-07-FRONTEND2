<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 2 - Khuyến mãi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 500px;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
        }

        .result {
            margin-top: 20px;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2 class="text-center mb-4">
            Tính Khuyến Mãi
        </h2>

        <div class="mb-3">
            <label>Giá trị đơn hàng</label>
            <input type="number" id="amount" class="form-control">
        </div>

        <div class="mb-3">
            <label>Hạng thành viên</label>

            <select id="member" class="form-select">
                <option value="normal">Thường</option>
                <option value="silver">Silver</option>
                <option value="gold">Gold</option>
            </select>
        </div>

        <button class="btn btn-warning w-100" onclick="calculate()">
            Tính toán
        </button>

        <div id="result"></div>

    </div>

    <script>

        function calculate() {

            const amount = Number(document.getElementById("amount").value);
            const member = document.getElementById("member").value;

            const result = document.getElementById("result");

            if(amount <= 0) {
                result.innerHTML = `
                    <div class="alert alert-danger mt-3">
                        Giá trị đơn hàng không hợp lệ!
                    </div>
                `;
                return;
            }

            let discount = 0;

            if(amount >= 1000000) {
                discount = 15;
            }
            else if(amount >= 500000) {
                discount = 10;
            }
            else {
                discount = 5;
            }

            if(member === "silver") {
                discount += 3;
            }
            else if(member === "gold") {
                discount += 5;
            }

            const discountMoney = amount * discount / 100;
            const finalMoney = amount - discountMoney;

            result.innerHTML = `
                <div class="result">

                    <p>Tiền gốc:
                        <b>${amount.toLocaleString()} VNĐ</b>
                    </p>

                    <p>Tỷ lệ giảm:
                        <b>${discount}%</b>
                    </p>

                    <p>Số tiền giảm:
                        <b>${discountMoney.toLocaleString()} VNĐ</b>
                    </p>

                    <hr>

                    <h4>
                        Tổng thanh toán:
                        <span class="text-warning">
                            ${finalMoney.toLocaleString()} VNĐ
                        </span>
                    </h4>

                </div>
            `;
        }

    </script>

</body>

</html>
