<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 22 - Login Form</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {

            min-height: 100vh;

            background:
                linear-gradient(135deg,
                #020617,
                #111827);

            display: flex;

            justify-content: center;

            align-items: center;
        }

        .login-box {

            width: 100%;

            max-width: 450px;

            background:
                rgba(255,255,255,0.05);

            padding: 40px;

            border-radius: 25px;

            backdrop-filter: blur(10px);

            color: white;

            box-shadow:
                0 0 25px rgba(56,189,248,0.2);
        }

        .logo {

            font-size: 3rem;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-6 col-lg-5">

                <div class="login-box">

                    <div class="text-center mb-4">

                        <div class="logo">
                            🔐
                        </div>

                        <h1 class="mt-3">
                            Login
                        </h1>

                        <p class="text-secondary">
                            Front-End Bootstrap Form
                        </p>

                    </div>

                    <form>

                        <!-- EMAIL -->

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   class="form-control"
                                   placeholder="Enter email">

                        </div>

                        <!-- PASSWORD -->

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   class="form-control"
                                   placeholder="Enter password">

                        </div>

                        <!-- CHECKBOX -->

                        <div class="form-check mb-4">

                            <input type="checkbox"
                                   class="form-check-input"
                                   id="remember">

                            <label class="form-check-label"
                                   for="remember">

                                Remember me

                            </label>

                        </div>

                        <!-- BUTTON -->

                        <button class="btn btn-info w-100">

                            Login

                        </button>

                    </form>

                    <div class="text-center mt-4">

                        <a href="#"
                           class="text-decoration-none text-info">

                            Forgot password?

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
