<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LAB 12 - CRUD Sinh Viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #020617, #111827);
            min-height: 100vh;
            color: white;
            padding: 50px 20px;
        }

        .box {
            max-width: 1100px;
            margin: auto;
        }

        .student-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            height: 100%;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1 class="text-center mb-5">
            CRUD Sinh Viên
        </h1>

        <!-- FORM -->

        <div class="card bg-dark text-white p-4 mb-5">

            <h4 class="mb-4">
                Thêm Sinh Viên
            </h4>

            <div class="row g-3">

                <div class="col-md-4">

                    <input type="text"
                           id="name"
                           class="form-control"
                           placeholder="Tên sinh viên">

                </div>

                <div class="col-md-4">

                    <input type="email"
                           id="email"
                           class="form-control"
                           placeholder="Email">

                </div>

                <div class="col-md-4">

                    <input type="text"
                           id="major"
                           class="form-control"
                           placeholder="Chuyên ngành">

                </div>

            </div>

            <button class="btn btn-success mt-4"
                    onclick="addStudent()">

                Thêm Sinh Viên

            </button>

        </div>

        <!-- STUDENT LIST -->

        <div class="row g-4"
             id="studentList"></div>

    </div>

    <script>

        const API =
            "https://jsonplaceholder.typicode.com/users";

        let students = [];

        async function loadStudents() {

            const response =
                await fetch(API);

            const data =
                await response.json();

            students = data.slice(0, 6);

            renderStudents();
        }

        function renderStudents() {

            const studentList =
                document.getElementById("studentList");

            studentList.innerHTML = "";

            students.forEach(student => {

                studentList.innerHTML += `

                    <div class="col-md-4">

                        <div class="student-card">

                            <h4 class="text-info">
                                ${student.name}
                            </h4>

                            <p>
                                📧 ${student.email}
                            </p>

                            <p>
                                🎓 ${student.company?.name || "CNTT"}
                            </p>

                            <button class="btn btn-danger btn-sm"
                                    onclick="deleteStudent(${student.id})">

                                Xóa

                            </button>

                        </div>

                    </div>

                `;
            });
        }

        async function addStudent() {

            const name =
                document.getElementById("name").value;

            const email =
                document.getElementById("email").value;

            const major =
                document.getElementById("major").value;

            if(
                name.trim() === "" ||
                email.trim() === "" ||
                major.trim() === ""
            ) {

                alert("Vui lòng nhập đầy đủ dữ liệu!");

                return;
            }

            const newStudent = {

                name,
                email,
                company: {
                    name: major
                }

            };

            try {

                const response =
                    await fetch(API, {

                        method: "POST",

                        headers: {
                            "Content-Type":
                            "application/json"
                        },

                        body:
                            JSON.stringify(newStudent)

                    });

                const data =
                    await response.json();

                students.unshift({

                    ...data,

                    id: Date.now()
                });

                renderStudents();

                document.getElementById("name").value = "";
                document.getElementById("email").value = "";
                document.getElementById("major").value = "";

                alert("Thêm sinh viên thành công!");

            }
            catch(error) {

                alert("Có lỗi xảy ra!");
            }
        }

        async function deleteStudent(id) {

            const confirmDelete =
                confirm("Bạn có chắc muốn xóa?");

            if(!confirmDelete) return;

            try {

                await fetch(`${API}/${id}`, {

                    method: "DELETE"

                });

                students =
                    students.filter(student =>
                        student.id !== id
                    );

                renderStudents();

            }
            catch(error) {

                alert("Xóa thất bại!");
            }
        }

        loadStudents();

    </script>

</body>

</html>
