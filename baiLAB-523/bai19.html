<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 19 - jQuery Ajax GET</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial; text-align: center; }
        table { margin: 20px auto; border-collapse: collapse; width: 80%; }
        th, td { padding: 12px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Danh sách Sinh viên (Ajax)</h1>
    <button onclick="loadStudents()">Tải danh sách</button>
    <table id="studentTable"></table>

    <script>
        function loadStudents() {
            // Giả lập API response
            const mockData = [
                {id:1, name:"Nguyễn Văn A", age:20, class:"CNTT1"},
                {id:2, name:"Trần Thị B", age:21, class:"CNTT2"},
                {id:3, name:"Lê Văn C", age:19, class:"CNTT1"},
                {id:4, name:"Phạm Thị D", age:22, class:"CNTT3"}
            ];

            let html = `<tr><th>ID</th><th>Họ tên</th><th>Tuổi</th><th>Lớp</th></tr>`;
            mockData.forEach(student => {
                html += `<tr>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.age}</td>
                    <td>${student.class}</td>
                </tr>`;
            });
            $("#studentTable").html(html);
        }
    </script>
</body>
</html>
