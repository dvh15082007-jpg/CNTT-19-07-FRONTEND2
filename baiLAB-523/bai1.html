<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính BMI</title>

    <style>
        body{
            font-family: Arial;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box{
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }

        button{
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
        }

        #result{
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Tính chỉ số BMI</h2>

        <input type="text" id="height" placeholder="Nhập chiều cao (m)">
        <input type="text" id="weight" placeholder="Nhập cân nặng (kg)">

        <button onclick="calculateBMI()">Tính BMI</button>

        <div id="result"></div>
    </div>

    <script>

        function calculateBMI(){

            let height = Number(document.getElementById("height").value);
            let weight = Number(document.getElementById("weight").value);

            let result = document.getElementById("result");

            // Kiểm tra dữ liệu
            if(height <= 0 || weight <= 0 || isNaN(height) || isNaN(weight)){

                result.innerHTML = "Vui lòng nhập đúng dữ liệu!";
                result.style.color = "red";
                return;
            }

            // Tính BMI
            let bmi = weight / (height * height);

            let category = "";

            if(bmi < 18.5){
                category = "Gầy";
            }
            else if(bmi < 25){
                category = "Bình thường";
            }
            else if(bmi < 30){
                category = "Thừa cân";
            }
            else{
                category = "Béo phì";
            }

            result.innerHTML =
                "BMI = " + bmi.toFixed(2) +
                "<br>Phân loại: " + category;

            result.style.color = "green";
        }

    </script>

</body>
</html>
