<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 4 - Điểm sinh viên</title>
    <style> body { font-family: Arial; text-align: center; margin: 50px; } </style>
</head>
<body>
    <h1>Xử lý điểm sinh viên</h1>
    <div id="result"></div>

    <script>
        const scores = [7.5, 8.0, 6.5, 9.0, 5.5, 8.5];

        function calculateAverage() {
            let sum = 0;
            scores.forEach(score => sum += score);
            const avg = (sum / scores.length).toFixed(2);

            let classification = '';
            if (avg >= 9) classification = 'Xuất sắc';
            else if (avg >= 8) classification = 'Giỏi';
            else if (avg >= 7) classification = 'Khá';
            else if (avg >= 5) classification = 'Trung bình';
            else classification = 'Yếu';

            let html = `<h2>Danh sách điểm: ${scores.join(', ')}</h2>`;
            html += `<h3>Điểm trung bình: ${avg}</h3>`;
            html += `<h3>Phân loại: ${classification}</h3>`;
            
            document.getElementById('result').innerHTML = html;
        }

        calculateAverage();
    </script>
</body>
</html>
