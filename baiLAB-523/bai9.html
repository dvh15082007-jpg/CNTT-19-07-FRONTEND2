<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 9 - To-do List</title>
    <style>
        body { font-family: Arial; text-align: center; margin: 30px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px; }
        ul { list-style: none; padding: 0; max-width: 500px; margin: 20px auto; }
        li { padding: 10px; margin: 5px 0; background: #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .done { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <h1>Quản lý công việc</h1>
    <input type="text" id="taskInput" placeholder="Nhập công việc mới...">
    <button onclick="addTask()">Thêm</button>
    <ul id="taskList"></ul>

    <script>
        let tasks = [];

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span onclick="toggleDone(${index})" class="${task.done ? 'done' : ''}">${task.text}</span>
                    <button onclick="deleteTask(${index})">Xóa</button>
                `;
                list.appendChild(li);
            });
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            if (input.value.trim() === '') return;
            tasks.push({ text: input.value, done: false });
            input.value = '';
            renderTasks();
        }

        function toggleDone(index) {
            tasks[index].done = !tasks[index].done;
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            renderTasks();
        }

        renderTasks();
    </script>
</body>
</html>
