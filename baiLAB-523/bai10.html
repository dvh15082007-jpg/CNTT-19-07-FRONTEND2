<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 10 - Fetch JSON</title>
    <style> body { font-family: Arial; text-align: center; } table { margin: 20px auto; border-collapse: collapse; } th, td { padding: 10px; border: 1px solid #ddd; } </style>
</head>
<body>
    <h1>Danh sách Users</h1>
    <button onclick="loadUsers()">Tải dữ liệu</button>
    <table id="userTable"></table>

    <script>
        const users = [
            {id:1, name:"Nguyễn Văn A", email:"a@gmail.com", age:20},
            {id:2, name:"Trần Thị B", email:"b@gmail.com", age:22},
            {id:3, name:"Lê Văn C", email:"c@gmail.com", age:19}
        ];

        function loadUsers() {
            let html = `<tr><th>ID</th><th>Họ tên</th><th>Email</th><th>Tuổi</th></tr>`;
            users.forEach(user => {
                html += `<tr><td>${user.id}</td><td>${user.name}</td><td>${user.email}</td><td>${user.age}</td></tr>`;
            });
            document.getElementById('userTable').innerHTML = html;
        }
    </script>
</body>
</html>
