<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 04 - Quản Lý Điểm Sinh Viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%); }
        .grade-card { transition: all 0.3s ease; }
        .grade-card:hover { transform: scale(1.03); }
    </style>
</head>
<body class="min-h-screen py-12 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-700 to-cyan-600 p-10 text-white">
                <div class="flex items-center gap-4">
                    <i class="fas fa-chart-bar text-5xl"></i>
                    <div>
                        <h1 class="text-4xl font-bold">Quản Lý Điểm Sinh Viên</h1>
                        <p class="text-blue-100 mt-2">Tính toán & Phân loại học lực</p>
                    </div>
                </div>
            </div>

            <div class="p-10">
                <!-- Input Section -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Nhập điểm mới</label>
                        <div class="flex gap-3">
                            <input type="number" id="newScore" step="0.1" min="0" max="10" 
                                   class="flex-1 px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 text-xl"
                                   placeholder="8.5">
                            <button onclick="addScore()" 
                                    class="bg-blue-600 hover:bg-blue-700 text-white px-8 rounded-2xl font-medium">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-end gap-3">
                        <button onclick="removeLowestScore()" 
                                class="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-2">
                            <i class="fas fa-trash"></i> Xóa Điểm Thấp Nhất
                        </button>
                        <button onclick="resetData()" 
                                class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-4 rounded-2xl font-medium">
                            Reset
                        </button>
                    </div>
                </div>

                <!-- Danh sách điểm -->
                <div class="mb-10">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fas fa-list"></i> Danh sách điểm
                    </h3>
                    <div id="scoreList" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                        <!-- JS render -->
                    </div>
                </div>

                <!-- Kết quả -->
                <div class="bg-slate-50 rounded-3xl p-8 border border-slate-200">
                    <h3 class="text-2xl font-bold text-gray-800 mb-6 text-center">KẾT QUẢ THỐNG KÊ</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="grade-card bg-white p-6 rounded-2xl shadow text-center border border-gray-100">
                            <p class="text-gray-500 text-sm">Tổng điểm</p>
                            <p id="totalScore" class="text-4xl font-bold text-blue-600 mt-2">0</p>
                        </div>
                        <div class="grade-card bg-white p-6 rounded-2xl shadow text-center border border-gray-100">
                            <p class="text-gray-500 text-sm">Điểm trung bình</p>
                            <p id="averageScore" class="text-4xl font-bold text-emerald-600 mt-2">0.00</p>
                        </div>
                        <div class="grade-card bg-white p-6 rounded-2xl shadow text-center border border-gray-100">
                            <p class="text-gray-500 text-sm">Học lực</p>
                            <p id="classification" class="text-3xl font-bold mt-2"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-center text-gray-500 mt-8">FIT4015 - Lab 04 • Xử lý mảng & Phân loại</p>
    </div>

    <script>
        let scores = [7.5, 8.0, 9.5, 6.5, 8.5, 7.0]; // Dữ liệu mẫu

        function renderScores() {
            const container = document.getElementById('scoreList');
            container.innerHTML = scores.map((score, index) => `
                <div class="bg-white border border-gray-200 rounded-2xl p-5 text-center grade-card">
                    <div class="text-3xl font-bold text-gray-800">${score}</div>
                    <div class="text-xs text-gray-400 mt-1">Điểm ${index + 1}</div>
                </div>
            `).join('');
        }

        function calculateResults() {
            const total = scores.reduce((sum, score) => sum + score, 0);
            const average = scores.length ? (total / scores.length).toFixed(2) : 0;
            
            let classification = "";
            let colorClass = "";

            if (average >= 9.0) {
                classification = "Xuất sắc";
                colorClass = "text-purple-600";
            } else if (average >= 8.0) {
                classification = "Giỏi";
                colorClass = "text-emerald-600";
            } else if (average >= 7.0) {
                classification = "Khá";
                colorClass = "text-blue-600";
            } else if (average >= 5.0) {
                classification = "Trung bình";
                colorClass = "text-amber-600";
            } else {
                classification = "Yếu";
                colorClass = "text-red-600";
            }

            document.getElementById('totalScore').textContent = total.toFixed(1);
            document.getElementById('averageScore').textContent = average;
            document.getElementById('classification').innerHTML = `<span class="${colorClass}">${classification}</span>`;
        }

        function addScore() {
            const input = document.getElementById('newScore');
            const value = parseFloat(input.value);
            
            if (!isNaN(value) && value >= 0 && value <= 10) {
                scores.push(value);
                input.value = '';
                renderScores();
                calculateResults();
            } else {
                alert("Vui lòng nhập điểm hợp lệ (0 - 10)!");
            }
        }

        function removeLowestScore() {
            if (scores.length === 0) return;
            const minScore = Math.min(...scores);
            scores = scores.filter(score => score !== minScore);
            renderScores();
            calculateResults();
        }

        function resetData() {
            if (confirm("Bạn có chắc muốn reset toàn bộ dữ liệu?")) {
                scores = [7.5, 8.0, 9.5, 6.5, 8.5, 7.0];
                renderScores();
                calculateResults();
            }
        }

        // Khởi tạo
        window.onload = () => {
            renderScores();
            calculateResults();
        };
    </script>
</body>
</html>
