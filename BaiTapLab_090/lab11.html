<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu User</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-5">

    <div class="bg-white w-full max-w-xl rounded-3xl shadow-xl p-8">

        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">
            <i class="fas fa-search text-blue-500"></i>
            Tra Cứu Theo ID
        </h1>

        <!-- Search -->
        <div class="flex gap-3 mb-6">

            <input type="number"
                   id="searchId"
                   placeholder="Nhập ID từ 1 - 10"
                   class="flex-1 border rounded-2xl px-5 py-3 outline-none focus:border-blue-500">

            <button onclick="searchUser()"
                    class="bg-blue-500 hover:bg-blue-600 text-white px-6 rounded-2xl">
                Tìm
            </button>

        </div>

        <!-- Result -->
        <div id="result"></div>

    </div>

    <script>
        async function searchUser() {

            const id = document.getElementById("searchId").value;
            const result = document.getElementById("result");

            if (id === "") {
                result.innerHTML = `
                    <p class="text-red-500 text-center">
                        Vui lòng nhập ID!
                    </p>
                `;
                return;
            }

            result.innerHTML = `
                <p class="text-center text-gray-400">
                    Đang tìm kiếm...
                </p>
            `;

            try {

                const res = await fetch(
                    `https://jsonplaceholder.typicode.com/users/${id}`
                );

                if (!res.ok) throw new Error();

                const user = await res.json();

                result.innerHTML = `
                    <div class="border rounded-3xl p-6 shadow-sm">

                        <div class="text-center mb-5">
                            <div class="w-20 h-20 bg-blue-100 rounded-full mx-auto flex items-center justify-center text-3xl text-blue-500 mb-3">
                                <i class="fas fa-user"></i>
                            </div>

                            <h2 class="text-2xl font-bold text-gray-800">
                                ${user.name}
                            </h2>

                            <p class="text-gray-500">
                                ${user.email}
                            </p>
                        </div>

                        <div class="space-y-3 text-gray-700">

                            <p>
                                <i class="fas fa-building text-blue-500"></i>
                                ${user.company.name}
                            </p>

                            <p>
                                <i class="fas fa-phone text-blue-500"></i>
                                ${user.phone}
                            </p>

                            <p>
                                <i class="fas fa-location-dot text-blue-500"></i>
                                ${user.address.city}
                            </p>

                            <p>
                                <i class="fas fa-globe text-blue-500"></i>
                                ${user.website}
                            </p>

                        </div>

                    </div>
                `;

            } catch {

                result.innerHTML = `
                    <p class="text-red-500 text-center">
                        Không tìm thấy user!
                    </p>
                `;
            }
        }
    </script>

</body>
</html>
