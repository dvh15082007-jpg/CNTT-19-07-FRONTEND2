<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 17 - Giỏ Hàng</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-950 min-h-screen py-12 text-white">
    <div class="max-w-4xl mx-auto px-4">
        <h1 class="text-4xl font-bold text-center mb-10">🛒 Giỏ Hàng Của Bạn</h1>
        
        <div id="cart" class="space-y-6"></div>
        
        <div class="mt-12 bg-zinc-900 rounded-3xl p-8 flex justify-between items-center">
            <div>
                <p class="text-slate-400">Tổng thanh toán</p>
                <p id="totalPrice" class="text-4xl font-bold text-emerald-400">0 ₫</p>
            </div>
            <button onclick="alert('Đặt hàng thành công! 🎉')" 
                    class="bg-emerald-500 hover:bg-emerald-600 px-12 py-6 rounded-2xl text-xl font-bold">
                Thanh Toán
            </button>
        </div>
    </div>

    <script>
        let cart = [
            { id: 1, name: "MacBook Air M2", price: 28990000, qty: 1 },
            { id: 2, name: "AirPods Pro 2", price: 5990000, qty: 2 }
        ];

        function renderCart() {
            let html = '';
            let total = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                html += `
                    <div class="bg-zinc-900 rounded-3xl p-6 flex items-center gap-6">
                        <div class="flex-1">
                            <h3 class="font-bold">${item.name}</h3>
                            <p class="text-emerald-400">${item.price.toLocaleString('vi-VN')} ₫</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="changeQty(${item.id}, -1)" class="w-10 h-10 bg-zinc-800 hover:bg-zinc-700 rounded-xl">-</button>
                            <span class="w-8 text-center font-bold">${item.qty}</span>
                            <button onclick="changeQty(${item.id}, 1)" class="w-10 h-10 bg-zinc-800 hover:bg-zinc-700 rounded-xl">+</button>
                        </div>
                        <div class="w-32 text-right font-bold">${itemTotal.toLocaleString('vi-VN')} ₫</div>
                        <button onclick="removeItem(${item.id})" class="text-red-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>`;
            });

            $("#cart").html(html);
            $("#totalPrice").text(total.toLocaleString('vi-VN') + ' ₫');
        }

        function changeQty(id, change) {
            cart = cart.map(item => {
                if (item.id === id) {
                    item.qty = Math.max(1, item.qty + change);
                }
                return item;
            });
            renderCart();
        }

        function removeItem(id) {
            cart = cart.filter(item => item.id !== id);
            renderCart();
        }

        $(document).ready(renderCart);
    </script>
</body>
</html>
