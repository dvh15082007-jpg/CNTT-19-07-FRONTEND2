<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 07 - Thao Tác DOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen py-12">
    <div class="max-w-2xl mx-auto px-4">
        <div class="bg-zinc-900 rounded-3xl p-10 shadow-2xl">
            <h1 class="text-4xl font-bold text-center mb-10">🎨 Thao Tác Với DOM</h1>

            <div class="space-y-10">
                <!-- Demo Content -->
                <div class="bg-zinc-800 rounded-2xl p-8 text-center" id="demoBox">
                    <h2 id="title" class="text-3xl font-bold mb-4">Chào mừng bạn!</h2>
                    <p id="description" class="text-zinc-400 text-lg">Đây là nội dung có thể thay đổi bằng JavaScript DOM.</p>
                    <img id="demoImage" src="https://picsum.photos/400/200" class="mt-6 rounded-2xl mx-auto">
                </div>

                <!-- Controls -->
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="changeContent()" class="bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-medium">Thay Đổi Nội Dung</button>
                    <button onclick="changeImage()" class="bg-purple-600 hover:bg-purple-700 py-5 rounded-2xl font-medium">Đổi Hình Ảnh</button>
                    <button onclick="changeColor()" class="bg-pink-600 hover:bg-pink-700 py-5 rounded-2xl font-medium">Đổi Màu</button>
                    <button onclick="resetAll()" class="bg-zinc-700 hover:bg-zinc-600 py-5 rounded-2xl font-medium">Khôi Phục</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function changeContent() {
            document.getElementById('title').textContent = "DOM Manipulation Siêu Đẹp!";
            document.getElementById('description').textContent = "Bạn vừa thay đổi nội dung thành công bằng JavaScript thuần.";
        }

        function changeImage() {
            const images = [
                "https://picsum.photos/id/1015/400/200",
                "https://picsum.photos/id/237/400/200",
                "https://picsum.photos/id/180/400/200"
            ];
            const random = images[Math.floor(Math.random() * images.length)];
            document.getElementById('demoImage').src = random;
        }

        function changeColor() {
            const colors = ['#22d3ee', '#a855f7', '#f472b6', '#4ade80'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('demoBox').style.backgroundColor = randomColor;
        }

        function resetAll() {
            document.getElementById('title').textContent = "Chào mừng bạn!";
            document.getElementById('description').textContent = "Đây là nội dung có thể thay đổi bằng JavaScript DOM.";
            document.getElementById('demoImage').src = "https://picsum.photos/400/200";
            document.getElementById('demoBox').style.backgroundColor = '';
        }
    </script>
</body>
</html>
