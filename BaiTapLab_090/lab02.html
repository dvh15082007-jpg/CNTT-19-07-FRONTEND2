<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 02 - Tính Khuyến Mãi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .card {
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="min-h-screen py-12 px-4">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden card">
            <!-- Header -->
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-10 text-white text-center">
                <i class="fas fa-tags text-5xl mb-4"></i>
                <h1 class="text-4xl font-bold">Tính Khuyến Mãi Đơn Hàng</h1>
                <p class="mt-3 opacity-90 text-lg">Nhanh chóng - Chính xác - Chuyên nghiệp</p>
            </div>

            <div class="p-10 space-y-8">
                <!-- Input -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">
                        <i class="fas fa-dollar-sign mr-2"></i>Giá trị đơn hàng (VNĐ)
                    </label>
                    <input type="number" id="orderValue" 
                           class="w-full px-6 py-5 text-2xl border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100"
                           placeholder="2,500,000" onkeypress="if(event.key === 'Enter') calculateDiscount()">
                </div>

                <!-- Hạng thành viên -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">
                        <i class="fas fa-user-tag mr-2"></i>Hạng thành viên
                    </label>
                    <div class="grid grid-cols-3 gap-4" id="membershipLevels">
                        <!-- JS sẽ render -->
                    </div>
                </div>

                <!-- Button -->
                <button onclick="calculateDiscount()" 
                        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold text-xl py-6 rounded-2xl transition-all duration-300 flex items-center justify-center gap-3 shadow-lg">
                    <i class="fas fa-calculator"></i>
                    TÍNH KHUYẾN MÃI
                </button>

                <!-- Result -->
                <div id="result" class="hidden mt-8 p-8 bg-gray-50 rounded-3xl border border-gray-100"></div>
            </div>
        </div>

        <!-- Footer Info -->
        <p class="text-center text-gray-500 mt-8 text-sm">
            FIT4015 - JavaScript • Lab 02 • Được thiết kế chuyên nghiệp
        </p>
    </div>

    <script>
        // Dữ liệu hạng thành viên
        const tiers = [
            { name: "Đồng", rate: 0.05, color: "bg-amber-100 text-amber-700" },
            { name: "Bạc", rate: 0.08, color: "bg-gray-200 text-gray-700" },
            { name: "Vàng", rate: 0.12, color: "bg-yellow-400 text-yellow-900" }
        ];

        let selectedTier = 0;

        // Render hạng thành viên
        function renderTiers() {
            const container = document.getElementById('membershipLevels');
            container.innerHTML = tiers.map((tier, index) => `
                <div onclick="selectTier(${index})" 
                     class="cursor-pointer p-6 rounded-2xl text-center transition-all ${selectedTier === index ? 'ring-4 ring-indigo-500 bg-indigo-50' : 'hover:bg-gray-50'}">
                    <div class="text-2xl font-bold ${tier.color} py-2 rounded-xl">${tier.name}</div>
                    <div class="text-sm text-gray-500 mt-1">Giảm ${tier.rate * 100}%</div>
                </div>
            `).join('');
        }

        function selectTier(index) {
            selectedTier = index;
            renderTiers();
        }

        // Hàm tính khuyến mãi
        function calculateDiscount() {
            const valueInput = document.getElementById('orderValue');
            const value = parseFloat(valueInput.value);
            const resultDiv = document.getElementById('result');

            if (!value || value <= 0) {
                resultDiv.className = "mt-8 p-8 bg-red-50 border border-red-200 rounded-3xl text-center";
                resultDiv.innerHTML = `<p class="text-red-600 text-xl font-medium">Vui lòng nhập giá trị đơn hàng hợp lệ!</p>`;
                resultDiv.classList.remove('hidden');
                return;
            }

            const tier = tiers[selectedTier];
            let discountRate = tier.rate;

            // Mức khuyến mãi theo giá trị đơn hàng (mở rộng)
            if (value >= 10000000) discountRate += 0.05;      // >10tr
            else if (value >= 5000000) discountRate += 0.03;  // 5-10tr
            else if (value >= 2000000) discountRate += 0.02;  // 2-5tr

            const discountAmount = Math.round(value * discountRate);
            const finalAmount = value - discountAmount;

            resultDiv.className = "mt-8 p-8 bg-white border border-green-200 rounded-3xl shadow-inner";
            resultDiv.innerHTML = `
                <h3 class="text-2xl font-bold text-gray-800 mb-6 text-center">Kết Quả Thanh Toán</h3>
                
                <div class="space-y-5">
                    <div class="flex justify-between items-center py-3 border-b">
                        <span class="text-gray-600">Giá trị đơn hàng</span>
                        <span class="font-semibold text-xl">${value.toLocaleString('vi-VN')} ₫</span>
                    </div>
                    <div class="flex justify-between items-center py-3 border-b">
                        <span class="text-gray-600">Hạng thành viên</span>
                        <span class="font-bold text-lg">${tier.name}</span>
                    </div>
                    <div class="flex justify-between items-center py-3 border-b">
                        <span class="text-gray-600">Tỷ lệ giảm</span>
                        <span class="font-bold text-xl text-green-600">${(discountRate * 100).toFixed(1)}%</span>
                    </div>
                    <div class="flex justify-between items-center py-3 border-b bg-green-50 rounded-xl px-4">
                        <span class="text-gray-700 font-medium">Số tiền được giảm</span>
                        <span class="font-bold text-2xl text-green-600">-${discountAmount.toLocaleString('vi-VN')} ₫</span>
                    </div>
                    <div class="flex justify-between items-center py-4 text-3xl font-bold border-t pt-6">
                        <span class="text-gray-800">Tổng thanh toán</span>
                        <span class="text-green-600">${finalAmount.toLocaleString('vi-VN')} ₫</span>
                    </div>
                </div>

                <div class="text-center mt-8 text-sm text-gray-500">
                    Cảm ơn bạn đã mua sắm! 🎉
                </div>
            `;
            resultDiv.classList.remove('hidden');
        }

        // Khởi tạo
        window.onload = () => {
            renderTiers();
        };
    </script>
</body>
</html>
