<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 05 - Quản Lý Sản Phẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #f1f5f9 0%, #e0f2fe 100%); }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="min-h-screen py-12 px-4">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            
            <!-- Header -->
            <div class="bg-gradient-to-r from-violet-600 to-indigo-600 p-10 text-white">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-4xl font-bold">📦 Quản Lý Sản Phẩm</h1>
                        <p class="text-violet-100 mt-2">Tìm kiếm • Lọc • Sắp xếp • Thống kê</p>
                    </div>
                    <i class="fas fa-boxes-stacked text-6xl opacity-75"></i>
                </div>
            </div>

            <div class="p-10">
                <!-- Controls -->
                <div class="flex flex-wrap gap-4 mb-8">
                    <div class="flex-1">
                        <input type="text" id="searchInput" 
                               onkeyup="filterProducts()"
                               placeholder="🔍 Tìm theo tên sản phẩm..." 
                               class="w-full px-6 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-violet-500 text-lg">
                    </div>
                    <div class="flex gap-3">
                        <select id="priceFilter" onchange="filterProducts()" 
                                class="px-6 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-violet-500">
                            <option value="">Tất cả giá</option>
                            <option value="500000">Dưới 500.000 ₫</option>
                            <option value="1000000">Dưới 1.000.000 ₫</option>
                            <option value="2000000">Dưới 2.000.000 ₫</option>
                        </select>
                        <select id="sortSelect" onchange="filterProducts()" 
                                class="px-6 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-violet-500">
                            <option value="default">Sắp xếp mặc định</option>
                            <option value="price-asc">Giá tăng dần</option>
                            <option value="price-desc">Giá giảm dần</option>
                            <option value="name">Theo tên A-Z</option>
                        </select>
                    </div>
                </div>

                <!-- Danh sách sản phẩm -->
                <div id="productList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- JS sẽ render -->
                </div>

                <!-- Thống kê -->
                <div class="mt-12 bg-slate-50 rounded-3xl p-8">
                    <h3 class="text-2xl font-bold text-gray-800 mb-6">📊 THỐNG KÊ TỒN KHO</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-2xl text-center shadow">
                            <p class="text-gray-500">Tổng số sản phẩm</p>
                            <p id="totalProducts" class="text-5xl font-bold text-violet-600 mt-2">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl text-center shadow">
                            <p class="text-gray-500">Tổng giá trị tồn kho</p>
                            <p id="totalValue" class="text-5xl font-bold text-emerald-600 mt-2">0 ₫</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl text-center shadow">
                            <p class="text-gray-500">Sản phẩm đắt nhất</p>
                            <p id="maxPrice" class="text-3xl font-bold text-amber-600 mt-2">0 ₫</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-center text-gray-500 mt-8">FIT4015 - Lab 05 • Mảng đối tượng • Filter • Sort</p>
    </div>

    <script>
        let products = [
            { id: 1, name: "MacBook Air M2", price: 28990000, quantity: 12 },
            { id: 2, name: "iPhone 15 Pro", price: 28990000, quantity: 8 },
            { id: 3, name: "Tai nghe AirPods Pro 2", price: 5990000, quantity: 25 },
            { id: 4, name: "Samsung Galaxy Watch 6", price: 8990000, quantity: 15 },
            { id: 5, name: "Bàn phím cơ Keychron K2", price: 1890000, quantity: 30 },
            { id: 6, name: "Chuột Logitech MX Master 3S", price: 2490000, quantity: 18 }
        ];

        function renderProducts(filteredProducts) {
            const container = document.getElementById('productList');
            container.innerHTML = filteredProducts.map(product => `
                <div class="product-card bg-white border border-gray-200 rounded-3xl p-6 hover:border-violet-300">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-xl text-gray-800">${product.name}</h3>
                            <p class="text-emerald-600 font-semibold text-2xl mt-3">
                                ${(product.price).toLocaleString('vi-VN')} ₫
                            </p>
                        </div>
                        <div class="text-right">
                            <span class="inline-block px-4 py-1 bg-violet-100 text-violet-700 text-sm font-medium rounded-full">
                                SL: ${product.quantity}
                            </span>
                        </div>
                    </div>
                    <div class="mt-6 pt-6 border-t text-sm text-gray-500">
                        Giá trị tồn kho: <span class="font-semibold text-gray-700">${(product.price * product.quantity).toLocaleString('vi-VN')} ₫</span>
                    </div>
                </div>
            `).join('');
        }

        function calculateStats(filteredProducts) {
            const totalProducts = filteredProducts.length;
            const totalValue = filteredProducts.reduce((sum, p) => sum + (p.price * p.quantity), 0);
            const maxPrice = filteredProducts.length ? Math.max(...filteredProducts.map(p => p.price)) : 0;

            document.getElementById('totalProducts').textContent = totalProducts;
            document.getElementById('totalValue').textContent = totalValue.toLocaleString('vi-VN') + ' ₫';
            document.getElementById('maxPrice').textContent = maxPrice.toLocaleString('vi-VN') + ' ₫';
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const priceLimit = parseInt(document.getElementById('priceFilter').value) || Infinity;
            const sortMode = document.getElementById('sortSelect').value;

            let filtered = products.filter(product => {
                const matchName = product.name.toLowerCase().includes(searchTerm);
                const matchPrice = product.price <= priceLimit;
                return matchName && matchPrice;
            });

            // Sắp xếp
            if (sortMode === 'price-asc') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (sortMode === 'price-desc') {
                filtered.sort((a, b) => b.price - a.price);
            } else if (sortMode === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            }

            renderProducts(filtered);
            calculateStats(filtered);
        }

        // Khởi tạo
        window.onload = () => {
            renderProducts(products);
            calculateStats(products);
        };
    </script>
</body>
</html>
