<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 01 - Tính BMI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-8 text-white text-center">
            <h1 class="text-3xl font-bold">📏 Tính Chỉ Số BMI</h1>
            <p class="mt-2 opacity-90">Xác định thể trạng của bạn</p>
        </div>
        
        <div class="p-8 space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Chiều cao (m)</label>
                <input type="number" id="height" step="0.01" placeholder="1.75" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Cân nặng (kg)</label>
                <input type="number" id="weight" step="0.1" placeholder="70" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500">
            </div>
            
            <button onclick="calculateBMI()" 
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-4 rounded-2xl hover:scale-105 transition">
                <i class="fas fa-calculator mr-2"></i>TÍNH BMI
            </button>
            
            <div id="result" class="hidden mt-6 p-6 rounded-2xl text-center"></div>
        </div>
    </div>

    <script>
        function calculateBMI() {
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const resultDiv = document.getElementById('result');

            if (!height || !weight || height <= 0 || weight <= 0) {
                resultDiv.className = "mt-6 p-6 bg-red-50 border border-red-200 rounded-2xl text-center";
                resultDiv.innerHTML = `<p class="text-red-600 font-medium">Vui lòng nhập dữ liệu hợp lệ!</p>`;
                resultDiv.classList.remove('hidden');
                return;
            }

            const bmi = (weight / (height * height)).toFixed(2);
            let category = "";
            let color = "";

            if (bmi < 18.5) {
                category = "Gầy";
                color = "text-blue-600";
            } else if (bmi < 25) {
                category = "Bình thường";
                color = "text-green-600";
            } else if (bmi < 30) {
                category = "Thừa cân";
                color = "text-orange-600";
            } else {
                category = "Béo phì";
                color = "text-red-600";
            }

            resultDiv.className = `mt-6 p-8 rounded-3xl text-center border ${color.includes('green') ? 'border-green-200 bg-green-50' : color.includes('blue') ? 'border-blue-200 bg-blue-50' : color.includes('orange') ? 'border-orange-200 bg-orange-50' : 'border-red-200 bg-red-50'}`;
            resultDiv.innerHTML = `
                <h2 class="text-5xl font-bold ${color}">${bmi}</h2>
                <p class="text-xl mt-2 font-semibold ${color}">${category}</p>
                <p class="text-sm text-gray-500 mt-4">Chúc bạn luôn khỏe mạnh ❤️</p>
            `;
            resultDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
