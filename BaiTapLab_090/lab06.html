<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 06 - Tính Toán Đơn Hàng (Callback)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-900 to-zinc-900 min-h-screen text-white py-12">
    <div class="max-w-3xl mx-auto px-4">
        <div class="bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-white/10">
            <h1 class="text-4xl font-bold text-center mb-2">💰 Quy Trình Tính Đơn Hàng</h1>
            <p class="text-center text-slate-400 mb-10">Sử dụng Callback Pattern</p>

            <div class="space-y-8">
                <input type="number" id="amount" placeholder="Giá trị đơn hàng (VNĐ)" 
                       class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-5 text-xl focus:outline-none focus:border-cyan-400">

                <button onclick="startCalculation()" 
                        class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 py-6 rounded-2xl font-bold text-xl hover:scale-105 transition">
                    BẮT ĐẦU TÍNH TOÁN
                </button>

                <div id="process" class="hidden space-y-6 bg-black/30 p-8 rounded-2xl">
                    <!-- Steps will be added by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateSubtotal(amount, callback) {
            document.getElementById('process').innerHTML += `
                <div class="flex items-center gap-4 text-emerald-400">
                    <i class="fas fa-check-circle"></i>
                    <span>1. Tính tiền hàng gốc: <strong>${amount.toLocaleString()} ₫</strong></span>
                </div>`;
            setTimeout(() => callback(amount), 800);
        }

        function applyDiscount(subtotal, callback) {
            const discount = subtotal > 5000000 ? subtotal * 0.15 : subtotal * 0.08;
            document.getElementById('process').innerHTML += `
                <div class="flex items-center gap-4 text-orange-400">
                    <i class="fas fa-tags"></i>
                    <span>2. Áp dụng giảm giá: <strong>-${discount.toLocaleString()} ₫</strong></span>
                </div>`;
            setTimeout(() => callback(subtotal - discount), 800);
        }

        function addShipping(finalAmount, callback) {
            const shipping = finalAmount > 3000000 ? 0 : 50000;
            document.getElementById('process').innerHTML += `
                <div class="flex items-center gap-4 text-sky-400">
                    <i class="fas fa-truck"></i>
                    <span>3. Phí vận chuyển: <strong>${shipping.toLocaleString()} ₫</strong></span>
                </div>`;
            setTimeout(() => callback(finalAmount + shipping), 800);
        }

        function startCalculation() {
            const amount = parseFloat(document.getElementById('amount').value);
            if (!amount) return alert("Vui lòng nhập giá trị đơn hàng!");

            const processDiv = document.getElementById('process');
            processDiv.classList.remove('hidden');
            processDiv.innerHTML = `<h3 class="text-xl font-bold mb-6">🔄 Đang xử lý đơn hàng...</h3>`;

            calculateSubtotal(amount, (subtotal) => {
                applyDiscount(subtotal, (afterDiscount) => {
                    addShipping(afterDiscount, (total) => {
                        processDiv.innerHTML += `
                            <div class="mt-8 p-6 bg-gradient-to-r from-emerald-500/20 to-cyan-500/20 rounded-2xl text-center">
                                <p class="text-3xl font-bold text-white">TỔNG THANH TOÁN</p>
                                <p class="text-5xl font-bold text-emerald-400 mt-4">${total.toLocaleString()} ₫</p>
                            </div>`;
                    });
                });
            });
        }
    </script>
</body>
</html>
