<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 20 - Thêm Dữ Liệu Bằng Ajax POST</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; display: flex; gap: 40px; }
        .form-box { background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-radius: 6px; width: 280px; }
        .input-item { margin-bottom: 12px; }
        .input-item label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-item input { width: 100%; padding: 8px; box-sizing: border-box; }
        .display-panel { flex: 1; }
        ul { padding: 0; list-style-type: none; }
        li { padding: 8px; background: #eef1f6; margin-bottom: 5px; border-left: 4px solid #009688; }
    </style>
</head>
<body>
    <div class="form-box">
        <h3>Thêm Dự Án Mới</h3>
        <form id="projectForm">
            <div class="input-item">
                <label>Tên Dự Án:</label>
                <input type="text" id="projName">
            </div>
            <div class="input-item">
                <label>Trưởng Nhóm (Leader):</label>
                <input type="text" id="projLeader">
            </div>
            <button type="submit" style="width:100%; padding:10px; background:#009688; color:white; border:none; cursor:pointer; font-weight:bold;">Đẩy Lên Server (POST)</button>
        </form>
    </div>

    <div class="display-panel">
        <h3>Danh Sách Dự Án Thực Tế Trên Server</h3>
        <ul id="projectListContainer"></ul>
    </div>

    <script>
        $(document).ready(function() {
            const API_ENDPOINT = "https://664bc752a346044336ca332e.mockapi.io/api/v1/projects";

            // Hàm chịu trách nhiệm lấy dữ liệu danh sách để hiển thị cập nhật trạng thái
            function fetchProjects() {
                $.get(API_ENDPOINT, function(data) {
                    let items = "";
                    $.each(data, function(i, proj) {
                        items += `<li><strong>[ID ${proj.id}] ${proj.name}</strong> - Người phụ trách: ${proj.leader}</li>`;
                    });
                    $('#projectListContainer').html(items);
                });
            }

            // Xử lý sự kiện Submit gửi Form bằng phương thức Ajax POST dữ liệu
            $('#projectForm').submit(function(e) {
                e.preventDefault(); // Ngăn hành vi reload nguyên thủy

                const name = $('#projName').val().trim();
                const leader = $('#projLeader').val().trim();

                // Yêu cầu mở rộng: Xác thực thắt chặt kiểm tra dữ liệu trống trước khi cho phép gửi
                if (name === "" || leader === "") {
                    alert("Vui lòng nhập điền đầy đủ thông tin vào tất cả các trường dữ liệu bắt buộc!");
                    return;
                }

                // Cấu trúc gói tin payload đối tượng gửi đi
                const payload = { name: name, leader: leader };

                $.ajax({
                    url: API_ENDPOINT,
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(payload),
                    success: function(createdRecord) {
                        alert(`🎉 Thành công! Dự án "${createdRecord.name}" đã được ghi nhận vào cơ sở dữ liệu server đám mây.`);
                        
                        // Yêu cầu mở rộng: Khôi phục dọn dẹp Form và tái kích hoạt nạp danh sách trực quan tức thời
                        $('#projectForm')[0].reset();
                        fetchProjects();
                    },
                    error: function() {
                        alert("Lỗi! Không thể thực hiện truyền tải dữ liệu POST lên máy chủ.");
                    }
                });
            });

            // Lệnh khởi phát chạy nạp danh sách ban đầu lúc ứng dụng vừa lên sàn
            fetchProjects();
        });
    </script>
</body>
</html>
