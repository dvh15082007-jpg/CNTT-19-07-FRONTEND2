<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 22 - Bootstrap Login Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4 p-4 bg-white">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary">ĐĂNG NHẬP</h2>
                        <p class="text-muted font-monospace" style="font-size:0.85em;">Hệ Thống Xác Thực Học Viên Portal</p>
                    </div>
                    
                    <form action="#" method="POST">
                        <div class="mb-3">
                            <label for="txtEmail" class="form-label fw-semibold">Địa chỉ Email</label>
                            <input type="email" class="form-control form-control-lg" id="txtEmail" placeholder="name@example.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="txtPassword" class="form-label fw-semibold">Mật mã bảo mật</label>
                            <input type="password" class="form-control form-control-lg" id="txtPassword" placeholder="••••••••" required>
                        </div>

                        <div class="mb-4 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="chkRemember">
                                <label class="form-check-label text-secondary" for="chkRemember" style="font-size: 0.9em; cursor:pointer;">Ghi nhớ đăng nhập</label>
                            </div>
                            <a href="#" class="text-decoration-none text-primary fw-medium" style="font-size: 0.9em;">Quên mật khẩu?</a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 shadow-sm fw-bold">Xác Nhận Đăng Nhập</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
