<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 21 - Full CRUD jQuery Ajax</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f4f6f9; }
        .app-container { display: flex; gap: 30px; }
        .form-section { background: white; padding: 20px; border-radius: 6px; width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: fit-content; }
        .table-section { flex: 1; background: white; padding: 20px; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eef2f3; text-align: left; }
        th { background: #1e293b; color: white; }
        .btn { padding: 6px 12px; border: none; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-add { background: #10b981; color: white; width: 100%; padding: 10px; }
        .btn-edit { background: #3b82f6; color: white; margin-right: 5px; }
        .btn-del { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <h2>Hệ Thống Quản Trị Kho Dữ Liệu Thành Viên (Chu Trình CRUD Bất Đồng Bộ)</h2>
    
    <div class="app-container">
        <div class="form-section">
            <h3 id="formTitle">Tạo Tài Khoản Mới</h3>
            <input type="hidden" id="editingId" value="">
            
            <div class="input-group">
                <label>Họ và Tên:</label>
                <input type="text" id="targetName" placeholder="Nhập tên thành viên...">
            </div>
            <div class="input-group">
                <label>Quyền Hạn Hệ Thống:</label>
                <input type="text" id="targetRole" placeholder="Ví dụ: Admin, Editor...">
            </div>
            
            <button id="btnSubmitForm" class="btn btn-add">Lưu Thông Tin</button>
            <button id="btnCancelEdit" class="btn" style="background:#64748b; color:white; width:100%; margin-top:5px; display:none;">Hủy Chế Độ Sửa</button>
        </div>

        <div class="table-section">
            <h3>Bảng Đồng Bộ Nhân Sự Dữ Liệu</h3>
            <table>
                <thead>
                    <tr><th>Mã ID</th><th>Tên Thành Viên</th><th>Quyền Hạn Phân Cấp</th><th>Thao Tác Hệ Thống</th></tr>
                </thead>
                <tbody id="crudTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            const CRUD_API = "https://664bc752a346044336ca332e.mockapi.io/api/v1/users";

            // 1. READ CHỨC NĂNG: Lấy dữ liệu (GET) hiển thị bảng biểu lên màn hình
            function loadDataGrid() {
                $('#crudTableBody').html("<tr><td colspan='4'>Đang kết nối cơ sở dữ liệu server...</td></tr>");
                $.get(CRUD_API, function(dataList) {
                    let htmlRows = "";
                    $.each(dataList, function(i, item) {
                        htmlRows += `
                            <tr>
                                <td>${item.id}</td>
                                <td><strong>${item.name}</strong></td>
                                <td>${item.role}</td>
                                <td>
                                    <button class="btn btn-edit" onclick="triggerEditMode(${item.id}, '${item.name}', '${item.role}')">Sửa</button>
                                    <button class="btn btn-del" onclick="executeDelete(${item.id})">Xóa</button>
                                </td>
                            </tr>
                        `;
                    });
                    $('#crudTableBody').html(htmlRows);
                });
            }

            // 2. CREATE & UPDATE CHỨC NĂNG PHỐI HỢP BIÊN DỊCH BIẾN CỜ HIỆU
            $('#btnSubmitForm').click(function() {
                const id = $('#editingId').val();
                const name = $('#targetName').val().trim();
                const role = $('#targetRole').val().trim();

                if (name === "" || role === "") {
                    alert("Yêu cầu nhập điền thông tin đầy đủ vào các ô trống!");
                    return;
                }

                const payload = { name: name, role: role };

                if (id === "") {
                    // Kịch bản THÊM MỚI (POST): Thao tác đẩy bản ghi mới tinh lên server
                    $.ajax({
                        url: CRUD_API,
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(payload),
                        success: function() {
                            clearFormState();
                            loadDataGrid();
                        }
                    });
                } else {
                    // Kịch bản CẬP NHẬT HIỆU CHỈNH (PUT): Thực hiện đẩy đè dữ liệu sửa đổi theo mã ID đích danh
                    $.ajax({
                        url: `${CRUD_API}/${id}`,
                        type: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify(payload),
                        success: function() {
                            clearFormState();
                            loadDataGrid();
                        }
                    });
                }
            });

            // Hàm chuyển đổi trạng thái giao diện Form sang chế độ Hiệu Chỉnh Đọc Dữ Liệu
            window.triggerEditMode = function(id, name, role) {
                $('#editingId').val(id);
                $('#targetName').val(name);
                $('#targetRole').val(role);
                
                $('#formTitle').text(`Hiệu Chỉnh Thành Viên #${id}`);
                $('#btnSubmitForm').text("Cập Nhật Ngay").css('background', '#3b82f6');
                $('#btnCancelEdit').show();
            };

            // 3. DELETE CHỨC NĂNG: Tiêu hủy dữ liệu máy chủ bất đồng bộ qua ID liên kết truyền vào
            window.executeDelete = function(id) {
                if (!confirm(`Hệ thống cảnh báo! Bạn muốn xóa vĩnh viễn thành viên mã số #${id}?`)) return;
                
                $.ajax({
                    url: `${CRUD_API}/${id}`,
                    type: 'DELETE',
                    success: function() {
                        loadDataGrid();
                    }
                });
            };

            function clearFormState() {
                $('#editingId').val("");
                $('#targetName').val("");
                $('#targetRole').val("");
                $('#formTitle').text("Tạo Tài Khoản Mới");
                $('#btnSubmitForm').text("Lưu Thông Tin").css('background', '#10b981');
                $('#btnCancelEdit').hide();
            }

            $('#btnCancelEdit').click(clearFormState);

            // Kích hoạt nạp cơ sở dữ liệu lưới bảng ngay lúc ứng dụng lên sàn
            loadDataGrid();
        });
    </script>
</body>
</html>
