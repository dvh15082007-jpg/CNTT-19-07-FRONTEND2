<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter Đẹp</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .counter-box{
        background: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 320px;
    }

    .title{
        font-size: 28px;
        margin-bottom: 20px;
        color: #333;
    }

    #so{
        font-size: 70px;
        color: #4facfe;
        margin-bottom: 30px;
        transition: 0.2s;
    }

    .buttons{
        display: flex;
        justify-content: center;
        gap: 15px;
    }

    button{
        border: none;
        padding: 12px 20px;
        font-size: 20px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
        color: white;
        font-weight: bold;
    }

    #tang{
        background: #28a745;
    }

    #tang:hover{
        background: #218838;
        transform: scale(1.1);
    }

    #giam{
        background: #dc3545;
    }

    #giam:hover{
        background: #c82333;
        transform: scale(1.1);
    }

    #reset{
        background: #007bff;
    }

    #reset:hover{
        background: #0069d9;
        transform: scale(1.1);
    }
</style>
</head>

<body>

<div class="counter-box">
    <h2 class="title">Counter App</h2>

    <h1 id="so">0</h1>

    <div class="buttons">
        <button id="tang">+</button>
        <button id="giam">-</button>
        <button id="reset">Reset</button>
    </div>
</div>

<script>
let dem = 0;

function render(){
    document.getElementById("so").innerText = dem;
}

document.getElementById("tang")
.addEventListener("click", function(){
    dem++;
    render();
});

document.getElementById("giam")
.addEventListener("click", function(){
    dem--;
    render();
});

document.getElementById("reset")
.addEventListener("click", function(){
    dem = 0;
    render();
});
</script>

</body>
</html>
