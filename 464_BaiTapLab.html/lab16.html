<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lab 16</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
    text-align:center;
    font-family:Arial;
    margin-top:100px;
}

h1{
    font-size:80px;
}

button{
    padding:15px 20px;
    font-size:20px;
}

</style>

</head>
<body>

<h1 id="so">0</h1>

<button id="tang">+</button>
<button id="giam">-</button>
<button id="reset">Reset</button>

<script>

let dem = 0;

$("#tang").click(function(){

    dem++;

    $("#so").text(dem);

});

$("#giam").click(function(){

    dem--;

    $("#so").text(dem);

});

$("#reset").click(function(){

    dem = 0;

    $("#so").text(dem);

});

</script>

</body>
</html>
