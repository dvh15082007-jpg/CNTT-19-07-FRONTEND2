<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lab 17 - Giỏ Hàng</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
    font-family: Arial;
    padding: 30px;
}

.box{
    width: 300px;
    border: 1px solid #ccc;
    padding: 20px;
    border-radius: 10px;
}

button{
    padding: 8px 15px;
    cursor: pointer;
}

#soLuong{
    margin: 0 15px;
    font-size: 20px;
}

</style>

</head>
<body>

<div class="box">

<h2>Laptop Gaming</h2>

<p>Đơn giá: <b>15.000.000 VNĐ</b></p>

<button id="giam">-</button>

<span id="soLuong">1</span>

<button id="tang">+</button>

<h3>
Tổng tiền:
<span id="tong">15000000</span> VNĐ
</h3>

</div>

<script>

let gia = 15000000;

let soLuong = 1;

function capNhat(){

    $("#soLuong").text(soLuong);

    $("#tong").text(gia * soLuong);

}

$("#tang").click(function(){

    soLuong++;

    capNhat();

});

$("#giam").click(function(){

    if(soLuong > 1){

        soLuong--;

    }

    capNhat();

});

</script>

</body>
</html>
