<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Bài Lab 2: Tính Toán Khuyến Mãi Đơn Hàng</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 30px;
        background-color: #f4f7f6;
      }
      .container {
        max-width: 500px;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input,
      select {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        background: #2980b9;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
      }
      button:hover {
        background: #2471a3;
      }
      .invoice {
        margin-top: 20px;
        border-top: 2px dashed #ccc;
        padding-top: 15px;
        display: none;
      }
      .invoice-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .total-row {
        font-weight: bold;
        color: #c0392b;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Tính Toán Hóa Đơn Khuyến Mãi</h2>
      <div class="form-group">
        <label for="orderValue">Giá trị đơn hàng (VND):</label>
        <input type="number" id="orderValue" placeholder="Nhập số tiền..." />
      </div>
      <div class="form-group">
        <label for="memberRank">Hạng thành viên:</label>
        <select id="memberRank">
          <option value="Bronze">Đồng (Bronze)</option>
          <option value="Silver">Bạc (Silver)</option>
          <option value="Gold">Vàng (Gold)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="couponCode">Mã giảm giá (Nếu có):</label>
        <input
          type="text"
          id="couponCode"
          placeholder="Nhập mã DNU50K để được giảm 50.000đ"
        />
      </div>
      <button onclick="processInvoice()">Tính toán thanh toán</button>

      <div class="invoice" id="invoice">
        <div class="invoice-row">
          <span>Tiền gốc:</span> <span id="lblOriginal">0đ</span>
        </div>
        <div class="invoice-row">
          <span>Tỷ lệ chiết khấu:</span> <span id="lblRate">0%</span>
        </div>
        <div class="invoice-row">
          <span>Tiền giảm theo hạng:</span> <span id="lblDiscountRank">0đ</span>
        </div>
        <div class="invoice-row">
          <span>Mã quà tặng cố định:</span> <span id="lblCoupon">0đ</span>
        </div>
        <div class="invoice-row">
          <span>Phí vận chuyển:</span> <span id="lblShipping">0đ</span>
        </div>
        <div class="invoice-row total-row">
          <span>Tổng thanh toán:</span> <span id="lblTotal">0đ</span>
        </div>
      </div>
    </div>

    <script>
      function formatCurrency(amount) {
        return amount.toLocaleString("vi-VN", {
          style: "currency",
          currency: "VND",
        });
      }

      function calculateDiscountRate(value, rank) {
        let rate = 0;
        // Áp dụng tối thiểu 3 mức khuyến mãi theo khoảng tiền phối hợp hạng thành viên
        if (value >= 2000000) {
          rate = rank === "Gold" ? 0.15 : rank === "Silver" ? 0.12 : 0.1;
        } else if (value >= 1000000) {
          rate = rank === "Gold" ? 0.1 : rank === "Silver" ? 0.08 : 0.05;
        } else if (value >= 500000) {
          rate = rank === "Gold" ? 0.05 : rank === "Silver" ? 0.03 : 0.02;
        }
        return rate;
      }

      function processInvoice() {
        const originalValue = Number(
          document.getElementById("orderValue").value,
        );
        const rank = document.getElementById("memberRank").value;
        const coupon = document.getElementById("couponCode").value.trim();

        if (originalValue <= 0 || isNaN(originalValue)) {
          alert("Vui lòng nhập giá trị đơn hàng hợp lệ!");
          return;
        }

        // Tính tiền giảm giá theo hạng
        const discountRate = calculateDiscountRate(originalValue, rank);
        const discountAmount = originalValue * discountRate;

        // Yêu cầu mở rộng: Bổ sung mã cố định & miễn phí vận chuyển
        let couponDiscount = 0;
        if (coupon === "DNU50K") {
          couponDiscount = 20000;
        }

        let shippingFee = 30000;
        if (originalValue >= 1500000) {
          shippingFee = 0;
        }

        let finalTotal =
          originalValue - discountAmount - couponDiscount + shippingFee;
        if (finalTotal < 0) finalTotal = 0;

        // Hiển thị ra màn hình
        document.getElementById("lblOriginal").innerText =
          formatCurrency(originalValue);
        document.getElementById("lblRate").innerText = discountRate * 100 + "%";
        document.getElementById("lblDiscountRank").innerText =
          "-" + formatCurrency(discountAmount);
        document.getElementById("lblCoupon").innerText =
          "-" + formatCurrency(couponDiscount);
        document.getElementById("lblShipping").innerText =
          formatCurrency(shippingFee);
        document.getElementById("lblTotal").innerText =
          formatCurrency(finalTotal);

        document.getElementById("invoice").style.display = "block";
      }
    </script>
  </body>
</html>
