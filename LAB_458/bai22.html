<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài Lab 22: Form Đăng Nhập Bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light d-flex align-items-center" style="height: 100vh">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
          <div class="card shadow border-0 p-4 rounded-3">
            <div class="text-center mb-4">
              <h3 class="fw-bold text-primary">ĐĂNG NHẬP HỆ THỐNG</h3>
              <small class="text-muted"
                >Cổng thông tin sinh viên Đại Học Đại Nam</small
              >
            </div>
            <form action="#" method="POST">
              <div class="mb-3">
                <label class="form-label fw-semibold">Địa chỉ Email:</label>
                <input
                  type="email"
                  class="form-control"
                  placeholder="name@dnu.edu.vn"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Mật khẩu:</label>
                <input
                  type="password"
                  class="form-control"
                  placeholder="••••••••"
                  required
                />
              </div>
              <div class="mb-3 form-check d-flex justify-content-between">
                <div>
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="rememberCheck"
                  />
                  <label class="form-check-label" for="rememberCheck"
                    ><small>Ghi nhớ mật khẩu</small></label
                  >
                </div>
                <a href="#" class="text-decoration-none"
                  ><small>Quên mật khẩu?</small></a
                >
              </div>
              <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                ĐĂNG NHẬP
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
