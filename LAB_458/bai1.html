<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bài Lab 1: Tính Chỉ Số BMI</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 30px;
        background-color: #f4f7f6;
      }
      .container {
        max-width: 400px;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        background: #27ae60;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
      }
      button:hover {
        background: #219150;
      }
      #result {
        margin-top: 20px;
        padding: 15px;
        border-radius: 4px;
        font-weight: bold;
        text-align: center;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Tính Chỉ Số BMI</h2>
      <div class="form-group">
        <label for="height">Chiều cao (m):</label>
        <input
          type="number"
          id="height"
          step="0.01"
          placeholder="Ví dụ: 1.72"
        />
      </div>
      <div class="form-group">
        <label for="weight">Cân nặng (kg):</label>
        <input type="number" id="weight" step="0.1" placeholder="Ví dụ: 65" />
      </div>
      <button onclick="calculateBMI()">Tính toán BMI</button>
      <div id="result"></div>
    </div>

    <script>
      function calculateBMI() {
        const hInput = document.getElementById("height").value;
        const wInput = document.getElementById("weight").value;
        const resultDiv = document.getElementById("result");

        // Yêu cầu mở rộng: Kiểm tra dữ liệu rỗng, âm hoặc chiều cao bằng 0
        if (!hInput || !wInput) {
          showResult("Vui lòng điền đầy đủ chiều cao và cân nặng!", "#e74c3c");
          return;
        }

        const height = Number(hInput);
        const weight = Number(wInput);

        if (height <= 0 || weight <= 0) {
          showResult("Chiều cao và cân nặng phải lớn hơn 0!", "#e74c3c");
          return;
        }

        const bmi = (weight / (height * height)).toFixed(2);
        let classification = "";
        let color = "";

        if (bmi < 18.5) {
          classification = "Gầy 🦴";
          color = "#3498db";
        } else if (bmi < 24.9) {
          classification = "Bình thường 🌱";
          color = "#2ecc71";
        } else if (bmi < 29.9) {
          classification = "Thừa cân ⚖️";
          color = "#e67e22";
        } else {
          classification = "Béo phì ⚠️";
          color = "#e74c3c";
        }

        showResult(
          `Chỉ số BMI của bạn: ${bmi}<br>Thể trạng: ${classification}`,
          color,
        );
      }

      function showResult(text, color) {
        const resultDiv = document.getElementById("result");
        resultDiv.style.display = "block";
        resultDiv.style.backgroundColor = color + "22";
        resultDiv.style.color = color;
        resultDiv.style.border = `1px solid ${color}`;
        resultDiv.innerHTML = text;
      }
    </script>
  </body>
</html>
