<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lab 10</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
}

.item{
    border:1px solid #ddd;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

button{
    padding:10px 20px;
    margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Danh sách người dùng</h2>

<button onclick="loadData()">
Tải dữ liệu
</button>

<div id="list"></div>

</div>

<script>

async function loadData(){

    list.innerHTML="Đang tải...";

    let response=
        await fetch(
            "https://jsonplaceholder.typicode.com/users"
        );

    let data=
        await response.json();

    let html="";

    data.forEach(function(user){

        html+=`
        <div class="item">

            <h3>${user.name}</h3>

            <p>Email: ${user.email}</p>

            <p>Phone: ${user.phone}</p>

        </div>
        `;

    });

    list.innerHTML=html;
}

</script>

</body>
</html>
