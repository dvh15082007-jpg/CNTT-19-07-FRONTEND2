<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lab 14</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
    font-family:Arial;
    text-align:center;
    margin-top:50px;
    background:#eee;
}

.box{
    width:550px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
}

.demo{
    background:#ffe7b5;
    padding:25px;
    border-radius:10px;
    margin-top:20px;
}

button{
    padding:10px;
    margin:5px;
}

</style>
</head>

<body>

<div class="box">

<h2>Hiệu ứng jQuery</h2>

<button id="fadeIn">
Fade In
</button>

<button id="fadeOut">
Fade Out
</button>

<button id="slide">
Slide Toggle
</button>

<div class="demo" id="demoBox">

Khối nội dung demo hiệu ứng

</div>

</div>

<script>

$(function(){

    $("#fadeIn").click(function(){

        $("#demoBox").fadeIn();

    });

    $("#fadeOut").click(function(){

        $("#demoBox").fadeOut();

    });

    $("#slide").click(function(){

        $("#demoBox").slideToggle();

    });

});

</script>

</body>
</html>
