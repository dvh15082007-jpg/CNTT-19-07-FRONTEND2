<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Lab 22</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background:linear-gradient(
                135deg,
                #0d6efd,
                #6ea8fe
            );

            min-height:100vh;

            display:flex;

            align-items:center;
        }

        .login-box{

            background:white;

            border-radius:20px;

            padding:35px;

            box-shadow:
                0 10px 25px rgba(0,0,0,.15);
        }

        .logo{
            font-size:30px;
            font-weight:bold;
            color:#0d6efd;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7 col-sm-10">

            <div class="login-box">

                <div class="text-center mb-4">

                    <div class="logo">

                        FIT DNU

                    </div>

                    <h3 class="mt-2">

                        Đăng nhập hệ thống

                    </h3>

                    <p class="text-muted">

                        Nhập tài khoản để tiếp tục

                    </p>

                </div>

                <form>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            class="form-control"
                            placeholder="example@gmail.com"
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Mật khẩu

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            placeholder="Nhập mật khẩu"
                        >

                    </div>

                    <div
                        class="
                            d-flex
                            justify-content-between
                            mb-3
                        "
                    >

                        <div
                            class="form-check"
                        >

                            <input
                                class="form-check-input"
                                type="checkbox"
                            >

                            <label
                                class="form-check-label"
                            >

                                Ghi nhớ

                            </label>

                        </div>

                        <a href="#">

                            Quên mật khẩu?

                        </a>

                    </div>

                    <button
                        class="
                            btn
                            btn-primary
                            w-100
                        "
                    >

                        Đăng nhập

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
