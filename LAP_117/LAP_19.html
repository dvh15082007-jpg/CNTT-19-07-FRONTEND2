<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lab 18</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    width:650px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:12px;
    margin-top:40px;
}

input{
    padding:10px;
    width:300px;
}

button{
    padding:10px;
}

li{
    margin:10px 0;
}

</style>
</head>

<body>

<div class="container">

<h2>Danh sách thành viên</h2>

<input
id="name"
placeholder="Nhập tên">

<button id="addBtn">
Thêm
</button>

<ul id="list"></ul>

</div>

<script>

let members=[];

function render(){

    let html="";

    members.forEach(function(item,index){

        html+=`

        <li>

            ${item}

            <button
            onclick="editMember(${index})">

                Sửa

            </button>

            <button
            onclick="deleteMember(${index})">

                Xóa

            </button>

        </li>

        `;
    });

    $("#list").html(html);

}

$("#addBtn").click(function(){

    let ten=$("#name")
        .val()
        .trim();

    if(ten==="") return;

    members.push(ten);

    $("#name").val("");

    render();

});

function deleteMember(index){

    members.splice(index,1);

    render();

}

function editMember(index){

    let newName=
        prompt(
            "Nhập tên mới",
            members[index]
        );

    if(newName){

        members[index]=newName;

        render();

    }

}

</script>

</body>
</html>
