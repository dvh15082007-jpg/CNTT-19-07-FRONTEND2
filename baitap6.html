<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài 06 – Quy Trình Tính Đơn Hàng (Callback)</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8fafc;
    --card: #fff;
    --accent: #0f766e;
    --accent2: #0891b2;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --step1: #6366f1;
    --step2: #f59e0b;
    --step3: #10b981;
    --step4: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 2rem; }
  .container { max-width: 760px; margin: 0 auto; }
  .tag { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-bottom: 0.5rem; }
  h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.3rem; }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

  .input-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .section-title {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }
  .product-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 0.6rem;
    align-items: center;
    margin-bottom: 0.6rem;
  }
  .product-row span { font-weight: 600; font-size: 0.95rem; }
  .product-row input[type="number"] {
    width: 70px;
    padding: 0.4rem 0.6rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    text-align: center;
    outline: none;
  }
  .product-row .price { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--muted); width: 110px; text-align: right; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
  .form-group label { display: block; font-size: 0.78rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--muted); }
  .form-group select, .form-group input {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    outline: none;
    background: #f8fafc;
    transition: border-color 0.2s;
  }
  .form-group select:focus, .form-group input:focus { border-color: var(--accent); }

  .run-btn {
    display: block;
    margin: 1.2rem auto 0;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0.9rem 3rem;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .run-btn:hover { opacity: 0.85; }

  /* Pipeline visualization */
  .pipeline { display: none; margin-bottom: 1.5rem; }
  .pipeline.show { display: block; }
  .pipe-steps { display: flex; align-items: center; gap: 0; flex-wrap: wrap; margin-bottom: 1.2rem; }
  .pipe-step {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 1rem;
    font-size: 0.82rem;
    font-weight: 500;
    opacity: 0;
    transform: translateX(-10px);
    transition: all 0.4s ease;
  }
  .pipe-step.done { opacity: 1; transform: none; }
  .pipe-step .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pipe-arrow { color: var(--muted); padding: 0 0.4rem; font-size: 1.1rem; }

  .receipt-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .receipt-header {
    background: var(--accent);
    color: #fff;
    padding: 1rem 1.5rem;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .receipt-body { padding: 1.5rem; }
  .r-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px dashed var(--border);
    font-size: 0.95rem;
  }
  .r-row:last-child { border-bottom: none; }
  .r-row.total-row {
    padding-top: 1rem;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .r-row .r-label { color: var(--muted); font-size: 0.85rem; }
  .r-row .r-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .r-row.discount-row .r-val { color: #ef4444; }
  .r-row.total-row .r-val { font-size: 1.3rem; color: var(--accent); }

  .cb-log {
    margin-top: 1.2rem;
    background: #1e1e2e;
    border-radius: 10px;
    padding: 1rem 1.2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.8;
    color: #a0a0c0;
  }
  .cb-log .log-line { animation: fadeIn 0.3s ease both; }
  .cb-fn { color: #82aaff; }
  .cb-arrow { color: #c792ea; }
  .cb-val { color: #c3e88d; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
</style>
</head>
<body>
<div class="container">
  <div class="tag">// Buổi 2 · Bài Lab 06 — Callback Chain</div>
  <h1>Quy Trình Tính <span>Đơn Hàng</span></h1>
  <p class="sub">Mô phỏng chuỗi callback: tiền gốc → giảm giá → phí ship → thuế → tổng</p>

  <div class="input-section">
    <div class="section-title">Sản phẩm trong đơn</div>
    <div id="productList">
      <div class="product-row">
        <span>📱 Điện thoại Samsung</span>
        <input type="number" class="qty" value="1" min="0">
        <div class="price" data-price="8500000">8,500,000₫</div>
      </div>
      <div class="product-row">
        <span>🎧 Tai nghe Sony</span>
        <input type="number" class="qty" value="2" min="0">
        <div class="price" data-price="890000">890,000₫</div>
      </div>
      <div class="product-row">
        <span>🖱️ Chuột Logitech</span>
        <input type="number" class="qty" value="1" min="0">
        <div class="price" data-price="450000">450,000₫</div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Mã khuyến mãi</label>
        <input type="text" id="promoCode" placeholder="SALE10 / VIP20 / FREESHIP">
      </div>
      <div class="form-group">
        <label>Địa chỉ giao hàng</label>
        <select id="province">
          <option value="30000">Hà Nội / TP.HCM</option>
          <option value="50000">Tỉnh khác (trong nước)</option>
          <option value="150000">Đảo xa</option>
        </select>
      </div>
    </div>
    <button class="run-btn" onclick="runPipeline()">▶ Chạy Pipeline →</button>
  </div>

  <div class="pipeline" id="pipeline">
    <div class="pipe-steps" id="pipeSteps"></div>
    <div class="receipt-card">
      <div class="receipt-header">📋 Hoá Đơn Chi Tiết</div>
      <div class="receipt-body" id="receiptBody"></div>
    </div>
    <div class="cb-log" id="cbLog"></div>
  </div>
</div>

<script>
function fmt(n) { return n.toLocaleString('vi-VN') + '₫'; }

// ── Callback Functions ──────────────────────────────
function tinhTienGoc(items, callback) {
  const total = items.reduce((s, item) => s + item.price * item.qty, 0);
  callback(null, total);
}

function apDungGiamGia(tienGoc, promoCode, callback) {
  const promos = { SALE10: 10, VIP20: 20, STUDENT: 15 };
  const pct = promos[promoCode.toUpperCase()] || 0;
  const discount = tienGoc * pct / 100;
  callback(null, { tienGoc, discount, pct, tienSauGiam: tienGoc - discount });
}

function congPhiVanChuyen(data, shipFee, freeShip, callback) {
  const fee = (freeShip || data.tienSauGiam >= 5000000) ? 0 : shipFee;
  callback(null, { ...data, shipFee: fee, tienSauShip: data.tienSauGiam + fee });
}

function tinhThue(data, callback) {
  const tax = Math.round(data.tienSauShip * 0.08);
  callback(null, { ...data, tax, tongThanhToan: data.tienSauShip + tax });
}

// ── Main Pipeline ────────────────────────────────────
function runPipeline() {
  const items = Array.from(document.querySelectorAll('.product-row')).map((row, i) => ({
    name: row.querySelector('span').textContent,
    price: parseInt(row.querySelector('.price').dataset.price),
    qty: parseInt(row.querySelector('.qty').value) || 0
  })).filter(it => it.qty > 0);

  if (items.length === 0) { alert('Chưa có sản phẩm nào!'); return; }

  const promo    = document.getElementById('promoCode').value;
  const shipFee  = parseInt(document.getElementById('province').value);
  const freeShip = promo.toUpperCase() === 'FREESHIP';

  const log = []; const steps = [];

  tinhTienGoc(items, (err, tienGoc) => {
    log.push({ fn: 'tinhTienGoc', val: fmt(tienGoc) });
    steps.push({ label: '① Tiền gốc', val: fmt(tienGoc), color: '#6366f1' });

    apDungGiamGia(tienGoc, promo, (err, data1) => {
      log.push({ fn: 'apDungGiamGia', val: data1.pct > 0 ? `-${data1.pct}% = ${fmt(data1.tienSauGiam)}` : 'Không có mã' });
      steps.push({ label: '② Giảm giá', val: data1.pct ? `-${data1.pct}%` : 'Bỏ qua', color: '#f59e0b' });

      congPhiVanChuyen(data1, shipFee, freeShip, (err, data2) => {
        log.push({ fn: 'congPhiVanChuyen', val: data2.shipFee === 0 ? 'Miễn phí' : fmt(data2.shipFee) });
        steps.push({ label: '③ Phí ship', val: data2.shipFee === 0 ? 'Miễn phí' : fmt(data2.shipFee), color: '#10b981' });

        tinhThue(data2, (err, final) => {
          log.push({ fn: 'tinhThue', val: fmt(final.tax) + ' (8% VAT)' });
          steps.push({ label: '④ Thuế VAT', val: fmt(final.tax), color: '#ef4444' });

          renderResult(items, final, steps, log);
        });
      });
    });
  });
}

function renderResult(items, data, steps, log) {
  const pipeline = document.getElementById('pipeline');
  pipeline.classList.add('show');

  // Steps
  const stepsCont = document.getElementById('pipeSteps');
  stepsCont.innerHTML = '';
  steps.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'pipe-step';
    el.innerHTML = `<div class="dot" style="background:${s.color}"></div> <strong>${s.label}</strong>: ${s.val}`;
    stepsCont.appendChild(el);
    if (i < steps.length - 1) {
      const arr = document.createElement('span');
      arr.className = 'pipe-arrow';
      arr.textContent = '→';
      stepsCont.appendChild(arr);
    }
    setTimeout(() => el.classList.add('done'), i * 200);
  });

  // Receipt
  const rb = document.getElementById('receiptBody');
  const itemsHTML = items.map(it =>
    `<div class="r-row">
      <span>${it.name} × ${it.qty}</span>
      <span class="r-val">${(it.price * it.qty).toLocaleString('vi-VN')}₫</span>
    </div>`).join('');

  rb.innerHTML = `
    ${itemsHTML}
    <div class="r-row discount-row"><span class="r-label">Giảm giá (${data.pct || 0}%)</span><span class="r-val">-${(data.discount||0).toLocaleString('vi-VN')}₫</span></div>
    <div class="r-row"><span class="r-label">Phí vận chuyển</span><span class="r-val">${data.shipFee === 0 ? '🎉 Miễn phí' : (data.shipFee).toLocaleString('vi-VN') + '₫'}</span></div>
    <div class="r-row"><span class="r-label">Thuế VAT (8%)</span><span class="r-val">+${(data.tax).toLocaleString('vi-VN')}₫</span></div>
    <div class="r-row total-row"><span>Tổng thanh toán</span><span class="r-val">${data.tongThanhToan.toLocaleString('vi-VN')}₫</span></div>`;

  // Console-style log
  const cbLog = document.getElementById('cbLog');
  cbLog.innerHTML = log.map((l, i) =>
    `<div class="log-line" style="animation-delay:${i*0.15}s">
      <span class="cb-fn">${l.fn}</span>
      <span class="cb-arrow"> ──callback──▶ </span>
      <span class="cb-val">${l.val}</span>
    </div>`).join('');
}
</script>
</body>
</html>
