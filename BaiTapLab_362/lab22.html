<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 22 - Đăng nhập Hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .login-card {
            border-radius: 1.25rem;
            border: none;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center px-3">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card login-card shadow-lg p-4 bg-white">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark mb-1">Xin chào!</h2>
                    <p class="text-secondary small">Vui lòng đăng nhập tài khoản của bạn</p>
                </div>
                
                <form>
                    <div class="mb-3">
                        <label for="email" class="form-label small fw-semibold text-muted">Địa chỉ Email</label>
                        <input type="email" class="form-control form-control-lg fs-6" id="email" placeholder="name@example.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label small fw-semibold text-muted">Mật khẩu</label>
                        <input type="password" class="form-control form-control-lg fs-6" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-secondary small user-select-none" for="rememberMe">
                                Nhớ mật khẩu
                            </label>
                        </div>
                        <a href="#" class="text-decoration-none small fw-semibold text-primary">Quên mật khẩu?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 fs-6 fw-bold shadow-sm py-2">Đăng nhập</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
