<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 20 - Thêm dữ liệu biểu mẫu qua Ajax</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .form-card { background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); width: 100%; max-width: 440px; border: 1px solid #e2e8f0; }
        h3 { font-size: 22px; color: #0f172a; margin-bottom: 25px; text-align: center; font-weight: 700; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
        input { width: 100%; padding: 12px 14px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        input.error { border-color: #ef4444; background: #fef2f2; }
        
        button { width: 100%; padding: 12px; background: #10b981; color: white; font-size: 15px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #059669; }
        .toast { display: none; padding: 12px; border-radius: 8px; text-align: center; font-size: 14px; font-weight: 500; margin-bottom: 15px; }
        .toast-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .toast-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    </style>
</head>
<body>

<div class="form-card">
    <h3>✨ Thêm thành viên mới</h3>
    <div id="toastMsg" class="toast"></div>

    <form id="addMemberForm">
        <div class="form-group">
            <label>Họ và Tên</label>
            <input type="text" id="name" name="name" placeholder="Nhập tên thành viên...">
        </div>
        <div class="form-group">
            <label>Địa chỉ Email</label>
            <input type="email" id="email" name="email" placeholder="name@company.com">
        </div>
        <div class="form-group">
            <label>Chức vụ công tác</label>
            <input type="text" id="role" name="role" placeholder="VD: Trưởng nhóm, Thiết kế...">
        </div>
        <button type="submit">Xác nhận thêm mới</button>
    </form>
</div>

<script>
    $(document).ready(function() {
        const API_URL = "https://6650aa11ec9b4a5a7504bb52.mockapi.io/api/v1/members";

        $("#addMemberForm").submit(function(event) {
            event.preventDefault(); // Ngăn hành vi tải lại trang mặc định
            $("#toastMsg").hide();
            $("input").removeClass("error");

            let name = $("#name").val().trim();
            let email = $("#email").val().trim();
            let role = $("#role").val().trim();

            // Yêu cầu mở rộng: Kiểm tra dữ liệu rỗng trước khi gửi
            if (!name || !email || !role) {
                if(!name) $("#name").addClass("error");
                if(!email) $("#email").addClass("error");
                if(!role) $("#role").addClass("error");
                showToast("⚠️ Vui lòng hoàn thành tất cả các trường dữ liệu!", "error");
                return;
            }

            // Gói dữ liệu
            let payload = { name: name, email: email, role: role };

            // Gửi dữ liệu bằng Ajax POST
            $.ajax({
                url: API_URL,
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(payload),
                success: function(response) {
                    showToast("🎉 Đã thêm thành viên mới thành công!", "success");
                    // Yêu cầu mở rộng: Xóa trắng form sau khi tạo thành công
                    $("#addMemberForm")[0].reset();
                },
                error: function() {
                    showToast("❌ Lỗi hệ thống! Không thể gửi dữ liệu lên Server.", "error");
                }
            });
        });

        function showToast(text, status) {
            let cssClass = status === "success" ? "toast-success" : "toast-error";
            $("#toastMsg").removeClass("toast-success toast-error").addClass(cssClass).text(text).fadeIn(300);
        }
    });
</script>
</body>
</html>
