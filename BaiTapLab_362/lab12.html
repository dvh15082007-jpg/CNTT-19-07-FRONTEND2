<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 12 - Dashboard Quản Lý Sinh Viên</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f8fafc; color: #1e293b; padding: 40px; }
        .header-title { margin-bottom: 30px; }
        .header-title h2 { font-size: 26px; font-weight: 700; color: #0f172a; }
        .search-bar { width: 100%; max-width: 400px; padding: 10px 16px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 25px; outline: none; font-size: 14px; transition: 0.3s; }
        .search-bar:focus { border-color: #0ea5e9; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }
        
        .main-layout { display: flex; gap: 30px; }
        .form-container { background: #fff; width: 320px; padding: 24px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); height: fit-content; }
        .form-container h3 { font-size: 18px; margin-bottom: 16px; color: #334155; }
        label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 16px; outline: none; font-size: 14px; }
        input[type="text"]:focus { border-color: #0ea5e9; }
        
        button { padding: 10px 16px; font-size: 14px; font-weight: 600; border-radius: 6px; border: none; cursor: pointer; transition: all 0.2s ease; }
        .btn-save { background: #0ea5e9; color: white; width: 100%; }
        .btn-save:hover { background: #0284c7; }
        .btn-cancel { background: #94a3b8; color: white; width: 100%; margin-top: 8px; }

        /* Modern Table styling */
        .table-container { flex: 1; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #f8fafc; color: #64748b; font-weight: 600; padding: 14px 20px; border-bottom: 1px solid #e2e8f0; }
        td { padding: 14px 20px; border-bottom: 1px solid #f1f5f9; color: #334155; }
        tr:hover td { background: #f8fafc; }
        .actions-btns { display: flex; gap: 8px; }
        .btn-edit { background: #fef3c7; color: #d97706; padding: 6px 12px; }
        .btn-edit:hover { background: #fde68a; }
        .btn-del { background: #fee2e2; color: #dc2626; padding: 6px 12px; }
        .btn-del:hover { background: #fca5a5; }
    </style>
</head>
<body>

    <div class="header-title">
        <h2>🎓 Hệ Thống Quản Lý Sinh Viên</h2>
    </div>

    <input type="text" id="searchName" class="search-bar" placeholder="🔍 Tìm kiếm nhanh sinh viên..." oninput="loadStudents()">

    <div class="main-layout">
        <div class="form-container">
            <h3 id="formTitle">Thêm Sinh Viên</h3>
            <input type="hidden" id="studentId">
            
            <label>Họ và Tên</label>
            <input type="text" id="studentName" placeholder="VD: Nguyễn Văn Biển">
            
            <label>Lớp Học</label>
            <input type="text" id="studentClass" placeholder="VD: WD18301">
            
            <button id="btnSubmit" class="btn-save" onclick="saveStudent()">Lưu thông tin</button>
            <button id="btnCancel" class="btn-cancel" onclick="resetForm()" style="display:none;">Hủy bỏ</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th>Họ và Tên</th>
                        <th>Lớp Học</th>
                        <th style="width: 160px;">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://6650aa11ec9b4a5a7504bb52.mockapi.io/api/v1/students";

        async function loadStudents() {
            const tbody = document.getElementById("studentTableBody");
            const searchKeyword = document.getElementById("searchName").value.trim();
            let url = searchKeyword ? `${API_URL}?name=${searchKeyword}` : API_URL;

            try {
                let res = await fetch(url);
                let students = await res.json();
                tbody.innerHTML = "";

                students.forEach(st => {
                    tbody.innerHTML += `
                        <tr>
                            <td><b>#${st.id}</b></td>
                            <td style="font-weight: 500; color:#0f172a;">${st.name}</td>
                            <td><span style="background:#e0f2fe; color:#0369a1; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:600;">${st.class || 'N/A'}</span></td>
                            <td>
                                <div class="actions-btns">
                                    <button class="btn-edit" onclick="editStudent('${st.id}', '${st.name}', '${st.class}')">Sửa</button>
                                    <button class="btn-del" onclick="deleteStudent('${st.id}')">Xóa</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        async function saveStudent() {
            const id = document.getElementById("studentId").value;
            const name = document.getElementById("studentName").value.trim();
            const className = document.getElementById("studentClass").value.trim();

            if (!name || !className) { alert("Vui lòng nhập đầy đủ thông tin!"); return; }

            const studentData = { name, class: className };
            let method = id ? "PUT" : "POST";
            let url = id ? `${API_URL}/${id}` : API_URL;

            try {
                let res = await fetch(url, {
                    method: method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(studentData)
                });
                if(res.ok) { resetForm(); loadStudents(); }
            } catch (err) { alert("Xảy ra lỗi!"); }
        }

        async function deleteStudent(id) {
            if (!confirm("Xác nhận xóa sinh viên này khỏi hệ thống?")) return;
            try {
                let res = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
                if (res.ok) loadStudents();
            } catch (err) { alert("Lỗi hệ thống!"); }
        }

        function editStudent(id, name, className) {
            document.getElementById("studentId").value = id;
            document.getElementById("studentName").value = name;
            document.getElementById("studentClass").value = className;
            document.getElementById("formTitle").innerText = "📝 Sửa Thông Tin";
            document.getElementById("btnCancel").style.display = "block";
        }

        function resetForm() {
            document.getElementById("studentId").value = "";
            document.getElementById("studentName").value = "";
            document.getElementById("studentClass").value = "";
            document.getElementById("formTitle").innerText = "Thêm Sinh Viên";
            document.getElementById("btnCancel").style.display = "none";
        }

        window.onload = loadStudents;
    </script>
</body>
</html>
