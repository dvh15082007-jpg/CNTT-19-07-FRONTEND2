<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 15 - Biểu Mẫu Xác Thực Cao Cấp</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .form-card { background: white; width: 100%; max-width: 420px; padding: 35px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h3 { text-align: center; font-size: 24px; color: #1e293b; margin-bottom: 25px; font-weight: 700; }
        
        .form-group { margin-bottom: 18px; position: relative; }
        label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
        input { width: 100%; padding: 11px 14px; font-size: 14px; border: 2px solid #cbd5e1; border-radius: 8px; outline: none; transition: all 0.2s ease; }
        
        /* Màu trạng thái viền (Yêu cầu mở rộng) */
        input:focus { border-color: #4f46e5; }
        .input-valid { border-color: #10b981 !important; background: #f0fdf4; }
        .input-invalid { border-color: #ef4444 !important; background: #fef2f2; }
        
        .error-msg { color: #dc2626; font-size: 12px; margin-top: 5px; font-weight: 500; display: none; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; font-size: 15px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #4338ca; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
    </style>
</head>
<body>

    <div class="form-card">
        <h3>Tạo Tài Khoản</h3>
        <form id="registerForm" novalidate>
            <div class="form-group">
                <label>Họ và Tên</label>
                <input type="text" id="fullname" placeholder="Nhập đầy đủ họ tên...">
                <div class="error-msg" id="errFullname">⚠️ Họ tên không được bỏ trống!</div>
            </div>

            <div class="form-group">
                <label>Số Điện Thoại</label>
                <input type="text" id="phone" placeholder="VD: 0987654321">
                <div class="error-msg" id="errPhone">⚠️ Số điện thoại Việt Nam gồm 10 số (Đầu 03, 05, 07, 08, 09)!</div>
            </div>

            <div class="form-group">
                <label>Địa Chỉ Email</label>
                <input type="email" id="email" placeholder="name@company.com">
                <div class="error-msg" id="errEmail">⚠️ Định dạng Email chưa chính xác!</div>
            </div>

            <div class="form-group">
                <label>Mật Khẩu</label>
                <input type="password" id="password" placeholder="Tối thiểu 6 ký tự...">
                <div class="error-msg" id="errPassword">⚠️ Mật khẩu bắt buộc từ 6 ký tự trở lên!</div>
            </div>

            <div class="form-group">
                <label>Xác Nhận Mật Khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu...">
                <div class="error-msg" id="errConfirm">⚠️ Mật khẩu xác nhận chưa khớp nhau!</div>
            </div>

            <button type="submit">Đăng Ký Tài Khoản</button>
        </form>
    </div>

    <script>
        $(document).ready(function() {
            // Hàm xử lý UI đổi màu viền dựa theo tính hợp lệ
            function validateField(inputElement, condition, errorElement) {
                if (condition) {
                    $(inputElement).addClass("input-valid").removeClass("input-invalid");
                    $(errorElement).hide();
                    return true;
                } else {
                    $(inputElement).addClass("input-invalid").removeClass("input-valid");
                    $(errorElement).show();
                    return false;
                }
            }

            $("#registerForm").submit(function(event) {
                event.preventDefault(); 

                let fullname = $("#fullname").val().trim();
                let phone = $("#phone").val().trim();
                let email = $("#email").val().trim();
                let password = $("#password").val();
                let confirmPassword = $("#confirmPassword").val();

                let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                let phoneRegex = /^(0[3|5|7|8|9])+([0-9]{8})$/;

                let isNameValid = validateField("#fullname", fullname !== "", "#errFullname");
                let isPhoneValid = validateField("#phone", phoneRegex.test(phone), "#errPhone");
                let isEmailValid = validateField("#email", emailRegex.test(email), "#errEmail");
                let isPassValid = validateField("#password", password.length >= 6, "#errPassword");
                let isConfirmValid = validateField("#confirmPassword", (confirmPassword === password && confirmPassword !== ""), "#errConfirm");

                if (isNameValid && isPhoneValid && isEmailValid && isPassValid && isConfirmValid) {
                    alert("🎉 Hệ thống đã nhận biểu mẫu đăng ký thành công!");
                    $("#registerForm")[0].reset();
                    $("input").removeClass("input-valid input-invalid");
                }
            });

            // Yêu cầu mở rộng: Real-time Check màu viền ngay khi người dùng đang gõ
            $("#fullname").on("input", function() { validateField(this, $(this).val().trim() !== "", "#errFullname"); });
            $("#phone").on("input", function() { validateField(this, /^(0[3|5|7|8|9])+([0-9]{8})$/.test($(this).val().trim()), "#errPhone"); });
            $("#email").on("input", function() { validateField(this, /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test($(this).val().trim()), "#errEmail"); });
            $("#password").on("input", function() { validateField(this, $(this).val().length >= 6, "#errPassword"); });
            $("#confirmPassword").on("input", function() { validateField(this, $(this).val() === $("#password").val(), "#errConfirm"); });
        });
    </script>
</body>
</html>
