<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 01 - Tính BMI</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 300px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input, button { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        #result { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Máy tính BMI</h2>
        <label>Chiều cao (m):</label>
        <input type="number" id="height" step="0.01" placeholder="VD: 1.70">
        
        <label>Cân nặng (kg):</label>
        <input type="number" id="weight" step="0.1" placeholder="VD: 65">
        
        <button onclick="calculateBMI()">Tính BMI</button>
        
        <div id="result"></div>
    </div>

    <script>
        function calculateBMI() {
            let heightStr = document.getElementById('height').value;
            let weightStr = document.getElementById('weight').value;
            let resultDiv = document.getElementById('result');

            // Yêu cầu mở rộng: Kiểm tra dữ liệu rỗng
            if (!heightStr || !weightStr) {
                resultDiv.innerHTML = "<span style='color:red;'>Vui lòng nhập đầy đủ thông tin!</span>";
                return;
            }

            let height = Number(heightStr);
            let weight = Number(weightStr);

            // Yêu cầu mở rộng: Kiểm tra dữ liệu âm hoặc chiều cao bằng 0
            if (height <= 0 || weight <= 0) {
                resultDiv.innerHTML = "<span style='color:red;'>Dữ liệu không hợp lệ (phải > 0)!</span>";
                return;
            }

            // Tính BMI và làm tròn 2 chữ số
            let bmi = (weight / (height * height)).toFixed(2);
            let category = "";
            let color = "";

            // Phân loại và đổi màu (Yêu cầu mở rộng)
            if (bmi < 18.5) {
                category = "Gầy"; color = "blue";
            } else if (bmi >= 18.5 && bmi < 24.9) {
                category = "Bình thường"; color = "green";
            } else if (bmi >= 25 && bmi < 29.9) {
                category = "Thừa cân"; color = "orange";
            } else {
                category = "Béo phì"; color = "red";
            }

            // Hiển thị kết quả
            resultDiv.innerHTML = `Chỉ số BMI: ${bmi} <br> 
                                   Thể trạng: <span style='color:${color};'>${category}</span>`;
        }
    </script>
</body>
</html>
