<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài 10 – Fetch & Hiển Thị Dữ Liệu</title>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;800&family=Lora:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf8;
    --card: #fff;
    --accent: #3730a3;
    --accent2: #7c3aed;
    --text: #1e1b4b;
    --muted: #6b7280;
    --border: #e5e7eb;
    --success: #059669;
    --error: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Epilogue', sans-serif; min-height: 100vh; padding: 2rem; }
  .container { max-width: 800px; margin: 0 auto; }
  .tag { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.4rem; }
  h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.3rem; }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

  .api-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 0.8rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .api-bar label { font-size: 0.78rem; font-weight: 600; color: var(--muted); white-space: nowrap; }
  .api-bar select, .api-bar input {
    flex: 1;
    min-width: 200px;
    padding: 0.6rem 0.9rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Epilogue', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-bar select:focus, .api-bar input:focus { border-color: var(--accent); }
  .fetch-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0.65rem 1.4rem;
    font-family: 'Epilogue', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .fetch-btn:hover { opacity: 0.85; }

  /* Status */
  .status-bar {
    padding: 0.6rem 1rem;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 1.2rem;
    display: none;
    align-items: center;
    gap: 0.5rem;
  }
  .status-bar.loading { display: flex; background: #ede9fe; color: var(--accent2); }
  .status-bar.success { display: flex; background: #d1fae5; color: var(--success); }
  .status-bar.error   { display: flex; background: #fee2e2; color: var(--error); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* User cards */
  .user-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
  }
  .user-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem;
    transition: transform 0.2s, border-color 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .user-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  .user-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 1.2rem; font-weight: 700;
    margin-bottom: 0.8rem;
  }
  .user-name { font-weight: 700; font-size: 1rem; margin-bottom: 0.2rem; }
  .user-username { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.6rem; }
  .user-field { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; }
  .user-field span:first-child { font-size: 0.85rem; }

  /* Post cards */
  .post-list { display: flex; flex-direction: column; gap: 0.8rem; }
  .post-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    animation: fadeUp 0.3s ease both;
    transition: border-color 0.2s;
  }
  .post-card:hover { border-color: var(--accent); }
  .post-id { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.4rem; }
  .post-title { font-family: 'Lora', serif; font-size: 1rem; font-weight: 500; margin-bottom: 0.5rem; line-height: 1.4; }
  .post-body { font-size: 0.8rem; color: var(--muted); line-height: 1.6; }

  .empty { text-align: center; color: var(--muted); padding: 4rem; }
</style>
</head>
<body>
<div class="container">
  <div class="tag">Buổi 4 · Bài Lab 10</div>
  <h1>Fetch & Hiển Thị <span>Dữ Liệu</span></h1>
  <p class="sub">Lấy dữ liệu từ API công khai và hiển thị lên giao diện</p>

  <div class="api-bar">
    <label>Nguồn dữ liệu:</label>
    <select id="apiSource" onchange="updateEndpoint()">
      <option value="users">👤 Người dùng (JSONPlaceholder)</option>
      <option value="posts">📝 Bài viết (JSONPlaceholder)</option>
    </select>
    <input type="text" id="apiUrl" value="https://jsonplaceholder.typicode.com/users" readonly style="font-size:0.78rem;color:var(--muted);background:#f9f9f9">
    <button class="fetch-btn" onclick="fetchData()">📡 Tải dữ liệu</button>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner" id="spinner"></div>
    <span id="statusMsg">Đang tải...</span>
  </div>

  <div id="output"></div>
</div>

<script>
const apis = {
  users: 'https://jsonplaceholder.typicode.com/users',
  posts: 'https://jsonplaceholder.typicode.com/posts?_limit=10',
};

function updateEndpoint() {
  const src = document.getElementById('apiSource').value;
  document.getElementById('apiUrl').value = apis[src];
}

function setStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  const spinner = document.getElementById('spinner');
  bar.className = 'status-bar ' + type;
  document.getElementById('statusMsg').textContent = msg;
  spinner.style.display = type === 'loading' ? 'block' : 'none';
}

async function fetchData() {
  const src = document.getElementById('apiSource').value;
  const url = apis[src];
  setStatus('loading', 'Đang tải dữ liệu từ server...');
  document.getElementById('output').innerHTML = '';

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    setStatus('success', `✅ Tải thành công — ${data.length} bản ghi`);
    if (src === 'users') renderUsers(data);
    else renderPosts(data);
  } catch (err) {
    setStatus('error', `❌ Lỗi: ${err.message}`);
    document.getElementById('output').innerHTML = '<div class="empty">Không thể tải dữ liệu. Kiểm tra kết nối mạng.</div>';
  }
}

function renderUsers(users) {
  const grid = document.createElement('div');
  grid.className = 'user-grid';
  grid.innerHTML = users.map((u, i) => `
    <div class="user-card" style="animation-delay:${i*0.05}s">
      <div class="user-avatar">${u.name.charAt(0)}</div>
      <div class="user-name">${u.name}</div>
      <div class="user-username">@${u.username}</div>
      <div class="user-field"><span>✉️</span> ${u.email}</div>
      <div class="user-field"><span>📞</span> ${u.phone}</div>
      <div class="user-field"><span>🌐</span> ${u.website}</div>
      <div class="user-field"><span>🏢</span> ${u.company.name}</div>
    </div>`).join('');
  document.getElementById('output').appendChild(grid);
}

function renderPosts(posts) {
  const list = document.createElement('div');
  list.className = 'post-list';
  list.innerHTML = posts.map((p, i) => `
    <div class="post-card" style="animation-delay:${i*0.04}s">
      <div class="post-id">Bài #${p.id} · Người dùng ${p.userId}</div>
      <div class="post-title">${p.title.charAt(0).toUpperCase() + p.title.slice(1)}</div>
      <div class="post-body">${p.body}</div>
    </div>`).join('');
  document.getElementById('output').appendChild(list);
}

fetchData();
</script>
</body>
</html>
