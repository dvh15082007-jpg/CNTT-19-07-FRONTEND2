<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài 05 – Quản Lý Sản Phẩm</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --accent: #f59e0b;
    --text: #f4f4f5;
    --muted: #6b7280;
    --surface: #1a1a28;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }
  .container { max-width: 900px; margin: 0 auto; }
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
  .header-left .mini { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.3rem; }
  h1 { font-family: 'Fraunces', serif; font-size: 2.8rem; font-weight: 900; line-height: 1; }
  h1 em { font-style: italic; color: var(--accent); }
  .controls {
    display: flex;
    gap: 0.7rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 0.7rem 0.7rem 2.4rem;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; }
  .filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
  }
  .sort-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .sort-btn:hover, .sort-btn.active { border-color: var(--accent); color: var(--accent); }

  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }
  .sum-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
  }
  .sum-box .s-val { font-family: 'Fraunces', serif; font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .sum-box .s-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1rem;
  }
  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  .product-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .p-cat {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .p-name {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 0.8rem;
    line-height: 1.3;
  }
  .p-footer { display: flex; justify-content: space-between; align-items: flex-end; }
  .p-price { font-size: 1.15rem; font-weight: 600; color: var(--accent); }
  .p-qty {
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface);
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
  }
  .p-qty.low { color: #ef4444; background: rgba(239,68,68,0.1); }
  .no-result { text-align: center; color: var(--muted); padding: 3rem; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="mini">Buổi 2 · Bài Lab 05</div>
      <h1>Danh Sách <em>Sản Phẩm</em></h1>
    </div>
  </div>

  <div class="controls" style="margin-bottom:1.2rem">
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Tìm tên sản phẩm..." oninput="render()">
    </div>
    <select class="filter-select" id="priceFilter" onchange="render()">
      <option value="0">Tất cả giá</option>
      <option value="1">Dưới 200K</option>
      <option value="2">200K – 500K</option>
      <option value="3">Trên 500K</option>
    </select>
    <button class="sort-btn" id="sortBtn" onclick="toggleSort()">↑↓ Sắp xếp giá</button>
  </div>

  <div class="summary">
    <div class="sum-box"><div class="s-val" id="smCount">0</div><div class="s-label">Sản phẩm</div></div>
    <div class="sum-box"><div class="s-val" id="smInventory">0₫</div><div class="s-label">Tổng tồn kho</div></div>
    <div class="sum-box"><div class="s-val" id="smAvg">0₫</div><div class="s-label">Giá trung bình</div></div>
  </div>

  <div class="product-grid" id="productGrid"></div>
</div>

<script>
const products = [
  { name: 'Cà phê hảo hảo', category: 'Đồ uống',   price: 45000,  qty: 120 },
  { name: 'Tai nghe Sony',   category: 'Điện tử',    price: 890000, qty: 15 },
  { name: 'Sách Lập trình',  category: 'Sách vở',    price: 185000, qty: 60 },
  { name: 'Bàn phím cơ',     category: 'Điện tử',    price: 1250000,qty: 8 },
  { name: 'Áo thun trắng',   category: 'Thời trang',  price: 120000, qty: 200 },
  { name: 'Chuột Logitech',  category: 'Điện tử',    price: 450000, qty: 25 },
  { name: 'Nước suối Lavie', category: 'Đồ uống',   price: 8000,   qty: 500 },
  { name: 'Ví da nam',       category: 'Phụ kiện',   price: 350000, qty: 5 },
];

let sortDir = null;

function fmt(n) { return n.toLocaleString('vi-VN') + '₫'; }

function toggleSort() {
  sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  document.getElementById('sortBtn').classList.add('active');
  document.getElementById('sortBtn').textContent = sortDir === 'asc' ? '↑ Giá tăng dần' : '↓ Giá giảm dần';
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const pf = parseInt(document.getElementById('priceFilter').value);

  let list = products.filter(p => {
    if (q && !p.name.toLowerCase().includes(q)) return false;
    if (pf === 1 && p.price >= 200000) return false;
    if (pf === 2 && (p.price < 200000 || p.price > 500000)) return false;
    if (pf === 3 && p.price <= 500000) return false;
    return true;
  });

  if (sortDir) {
    list = [...list].sort((a, b) => sortDir === 'asc' ? a.price - b.price : b.price - a.price);
  }

  const grid = document.getElementById('productGrid');
  if (list.length === 0) {
    grid.innerHTML = '<div class="no-result">😔 Không tìm thấy sản phẩm phù hợp</div>';
  } else {
    grid.innerHTML = list.map(p => `
      <div class="product-card">
        <div class="p-cat">${p.category}</div>
        <div class="p-name">${p.name}</div>
        <div class="p-footer">
          <div class="p-price">${fmt(p.price)}</div>
          <div class="p-qty ${p.qty <= 10 ? 'low' : ''}">Còn ${p.qty}</div>
        </div>
      </div>`).join('');
  }

  const inventory = products.reduce((s, p) => s + p.price * p.qty, 0);
  const avgPrice  = products.reduce((s, p) => s + p.price, 0) / products.length;
  document.getElementById('smCount').textContent = list.length;
  document.getElementById('smInventory').textContent = fmt(inventory);
  document.getElementById('smAvg').textContent = fmt(Math.round(avgPrice));
}

render();
</script>
</body>
</html>
