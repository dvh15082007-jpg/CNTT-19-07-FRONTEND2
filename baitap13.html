<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 13 - Thao Tác Ẩn Hiện jQuery</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; }
        .content-box { padding: 20px; background-color: #d4edda; border: 1px solid #c3e6cb; margin-top: 15px; border-radius: 4px; max-width: 400px; }
        button { padding: 8px 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Thao Tác Điều Khiển Phần Tử Bằng Thư Viện jQuery</h2>
    
    <div>
        <button id="btnHide">Ẩn Đi</button>
        <button id="btnShow">Hiện Lên</button>
        <button id="btnToggle" style="background:#007bff; color:white; border:none;">Chuyển Đổi Trạng Thái</button>
    </div>

    <div class="content-box" id="infoBox">
        <h4>Chào mừng bạn đến với thế giới jQuery!</h4>
        <p>Hộp nội dung này sẽ được quản lý ẩn giấu hoặc phơi bày ra giao diện thông qua sức mạnh tối giản hóa cú pháp viết code của thư viện jQuery.</p>
    </div>

    <script>
        // Kích hoạt môi trường sẵn sàng Document Ready an toàn của jQuery
        $(document).ready(function() {
            
            // Xử lý sự kiện nút ẩn nội dung cụ thể
            $('#btnHide').click(function() {
                $('#infoBox').hide(300); // Ẩn phần tử với thời gian hiệu ứng 300 mili giây
            });

            // Xử lý sự kiện nút hiện nội dung cụ thể
            $('#btnShow').click(function() {
                $('#infoBox').show(300);
            });

            // Yêu cầu mở rộng: Ứng dụng hàm chuyển đổi trạng thái Toggle và hoán đổi nhãn Text linh động
            $('#btnToggle').click(function() {
                $('#infoBox').toggle(400, function() {
                    // Hàm callback này thực thi ngay khi hiệu ứng kết thúc để rà soát trạng thái hiển thị thực tế
                    if ($('#infoBox').is(':visible')) {
                        $('#btnToggle').text("Đóng Khối Nội Dung");
                    } else {
                        $('#btnToggle').text("Mở Khối Nội Dung");
                    }
                });
            });
        });
    </script>
</body>
</html>
