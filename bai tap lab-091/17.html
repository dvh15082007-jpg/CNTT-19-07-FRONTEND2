<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng - jQuery</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 20px;
        }
        
        .cart-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        h1 {
            text-align: center;
            background: #2c3e50;
            color: white;
            margin: 0;
            padding: 20px;
        }
        
        .product {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }
        
        .product:last-child {
            border-bottom: none;
        }
        
        .product img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 20px;
        }
        
        .product-info {
            flex: 1;
        }
        
        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0;
        }
        
        .product-price {
            color: #e74c3c;
            font-size: 1.1rem;
        }
        
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .quantity-control button {
            width: 35px;
            height: 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }
        
        #btn-minus {
            background: #e74c3c;
            color: white;
        }
        
        #btn-plus {
            background: #27ae60;
            color: white;
        }
        
        .quantity {
            width: 50px;
            text-align: center;
            font-size: 1.2rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .subtotal {
            font-weight: bold;
            color: #2c3e50;
            min-width: 120px;
            text-align: right;
        }
        
        .total {
            text-align: right;
            padding: 20px;
            background: #f8f9fa;
            font-size: 1.4rem;
            border-top: 2px solid #2c3e50;
        }
        
        .total span {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="cart-container">
        <h1>🛒 Giỏ Hàng Của Bạn</h1>

        <!-- Sản phẩm 1 -->
        <div class="product" data-price="250000">
            <img src="https://bizweb.dktcdn.net/100/446/974/products/ao-thun-mlb-new-era-heavy-cotton-new-york-yankees-black-13086578-1.jpg?v=1691318321487" alt="Áo thun">
            <div class="product-info">
                <h3 class="product-name">Áo Thun Nam Basic</h3>
                <p class="product-price">250.000 ₫</p>
            </div>
            <div class="quantity-control">
                <button id="btn-minus1">-</button>
                <input type="text" class="quantity" value="1" readonly>
                <button id="btn-plus1">+</button>
            </div>
            <div class="subtotal">250.000 ₫</div>
        </div>
        <!-- Sản phẩm 2 -->
        <div class="product" data-price="1200000">
            <img src="https://encrypted-tbn0.gstatic.com/shopping?q=tbn:ANd9GcSsA8VvbEkThLtP88FRX3pIbCA15-VmTB5dhkqF-qYfbZXYFUHqRsZhEM1X2aBggO1zjthV9g_Tc7Tc8eUCE2oX_BQuLbQEK6IGJtuIB7u0ShJnkAIwjXAQEOcv67Xmc4DKbvtODog&usqp=CAc" alt="Giày">
            <div class="product-info">
                <h3 class="product-name">Giày Sneaker Trắng</h3>
                <p class="product-price">1.200.000 ₫</p>
            </div>
            <div class="quantity-control">
                <button id="btn-minus3">-</button>
                <input type="text" class="quantity" value="1" readonly>
                <button id="btn-plus3">+</button>
            </div>
            <div class="subtotal">1.200.000 ₫</div>
        </div>

        <div class="total">
            Tổng tiền: <span id="grand-total">1.900.000 ₫</span>
        </div>
    </div>

    <script>
        $(document).ready(function() {

            function formatCurrency(num) {
                return num.toLocaleString('vi-VN') + ' ₫';
            }

            function updateTotal() {
                let grandTotal = 0;

                $('.product').each(function() {
                    const price = parseInt($(this).data('price'));
                    const qty = parseInt($(this).find('.quantity').val()) || 0;
                    const subtotal = price * qty;

                    $(this).find('.subtotal').text(formatCurrency(subtotal));
                    grandTotal += subtotal;
                });

                $('#grand-total').text(formatCurrency(grandTotal));
            }

            // Xử lý cho từng sản phẩm
            $('.product').each(function() {
                const $product = $(this);
                const $qtyInput = $product.find('.quantity');

                // Nút Tăng
                $product.find('button[id^="btn-plus"]').on('click', function() {
                    let qty = parseInt($qtyInput.val()) || 0;
                    $qtyInput.val(qty + 1);
                    updateTotal();
                });

                // Nút Giảm - CHO PHÉP GIẢM VỀ 0
                $product.find('button[id^="btn-minus"]').on('click', function() {
                    let qty = parseInt($qtyInput.val()) || 0;
                    if (qty > 0) { // Chỉ thay đổi ở đây
                        $qtyInput.val(qty - 1);
                        updateTotal();
                    }
                });

                // Cho phép nhập trực tiếp số lượng (tùy chọn)
                $qtyInput.on('input', function() {
                    let qty = parseInt($(this).val());
                    if (isNaN(qty) || qty < 0) {
                        $(this).val(0);
                    }
                    updateTotal();
                });
            });

            // Khởi tạo
            updateTotal();
        });
    </script>
</body>

</html>
