<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài 04 – Xử Lý Điểm Sinh Viên</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --card: #fff;
    --accent: #2563eb;
    --accent2: #7c3aed;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --pass: #16a34a;
    --warn: #ca8a04;
    --fail: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }
  .container { max-width: 700px; margin: 0 auto; }
  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: var(--text);
  }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-weight: 300; margin-bottom: 2rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1.2rem; }
  @media(max-width:600px){ .grid { grid-template-columns: 1fr; } }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    box-shadow: 0 1px 8px rgba(0,0,0,0.04);
  }
  .card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .score-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .score-pill {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: #f1f5f9;
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 0.3rem 0.7rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    font-weight: 600;
  }
  .score-pill .rm {
    cursor: pointer;
    color: #94a3b8;
    font-size: 0.8rem;
    line-height: 1;
  }
  .score-pill .rm:hover { color: var(--fail); }
  .add-row {
    display: flex;
    gap: 0.5rem;
  }
  .add-row input {
    flex: 1;
    padding: 0.6rem 0.8rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-row input:focus { border-color: var(--accent); }
  .add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
    transition: opacity 0.2s;
  }
  .add-btn:hover { opacity: 0.85; }
  .calc-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0.9rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 1.2rem;
    transition: opacity 0.2s;
  }
  .calc-btn:hover { opacity: 0.9; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; }
  .stat-box {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .stat-box .s-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--accent);
  }
  .stat-box .s-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .rank-badge {
    display: inline-block;
    padding: 0.3rem 1rem;
    border-radius: 99px;
    font-weight: 700;
    font-size: 0.95rem;
    margin-top: 0.8rem;
  }
  .bar-chart { margin-top: 1rem; }
  .bar-item { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.5rem; }
  .bar-name { font-size: 0.75rem; color: var(--muted); width: 80px; text-align: right; font-family: 'IBM Plex Mono', monospace; }
  .bar-track { flex: 1; background: #f1f5f9; border-radius: 99px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
  .bar-val { font-size: 0.75rem; font-family: 'IBM Plex Mono', monospace; font-weight: 600; width: 28px; }
</style>
</head>
<body>
<div class="container">
  <div class="tag">// Buổi 2 · Bài Lab 04</div>
  <h1>Xử Lý <span>Điểm</span> Sinh Viên</h1>
  <p class="sub">Tính toán và phân loại kết quả học tập từ danh sách điểm</p>

  <div class="grid">
    <div class="card">
      <div class="card-label">Danh sách điểm</div>
      <div class="score-list" id="scoreList"></div>
      <div class="add-row">
        <input type="number" id="newScore" placeholder="Nhập điểm (0–10)" min="0" max="10" step="0.1">
        <button class="add-btn" onclick="addScore()">+ Thêm</button>
      </div>
    </div>

    <div class="card" id="resultCard" style="display:none">
      <div class="card-label">Thống kê</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="s-val" id="sAvg">0</div>
          <div class="s-label">Trung bình</div>
        </div>
        <div class="stat-box">
          <div class="s-val" id="sMax">0</div>
          <div class="s-label">Cao nhất</div>
        </div>
        <div class="stat-box">
          <div class="s-val" id="sMin">0</div>
          <div class="s-label">Thấp nhất</div>
        </div>
      </div>
      <div id="rankBadge" style="text-align:center"></div>
    </div>
  </div>

  <button class="calc-btn" onclick="calculate()">📊 Tính & Phân Loại</button>

  <div class="card" id="chartCard" style="display:none">
    <div class="card-label">Biểu đồ điểm</div>
    <div class="bar-chart" id="barChart"></div>
  </div>
</div>

<script>
let scores = [8.5, 7.0, 9.2, 6.5, 8.0];
const COLORS = ['#2563eb','#7c3aed','#0891b2','#16a34a','#ca8a04','#dc2626','#db2777'];

function renderPills() {
  const list = document.getElementById('scoreList');
  list.innerHTML = '';
  scores.forEach((s, i) => {
    const p = document.createElement('div');
    p.className = 'score-pill';
    p.innerHTML = `${s.toFixed(1)} <span class="rm" onclick="removeScore(${i})">✕</span>`;
    list.appendChild(p);
  });
}

function addScore() {
  const input = document.getElementById('newScore');
  const val = parseFloat(input.value);
  if (isNaN(val) || val < 0 || val > 10) { alert('Điểm phải từ 0 đến 10'); return; }
  scores.push(val);
  input.value = '';
  renderPills();
}

function removeScore(i) {
  scores.splice(i, 1);
  renderPills();
}

function classify(avg) {
  if (avg >= 9)    return { label: '🏆 Xuất sắc',    bg: '#dcfce7', color: '#16a34a' };
  if (avg >= 8)    return { label: '🌟 Giỏi',         bg: '#dbeafe', color: '#2563eb' };
  if (avg >= 7)    return { label: '👍 Khá',           bg: '#ede9fe', color: '#7c3aed' };
  if (avg >= 5)    return { label: '📚 Trung bình',   bg: '#fef9c3', color: '#ca8a04' };
  return           { label: '⚠️ Yếu',               bg: '#fee2e2', color: '#dc2626' };
}

function calculate() {
  if (scores.length === 0) { alert('Chưa có điểm nào!'); return; }
  const sum = scores.reduce((a, b) => a + b, 0);
  const avg = sum / scores.length;
  const max = Math.max(...scores);
  const min = Math.min(...scores);
  const rank = classify(avg);

  document.getElementById('sAvg').textContent = avg.toFixed(2);
  document.getElementById('sMax').textContent = max.toFixed(1);
  document.getElementById('sMin').textContent = min.toFixed(1);
  document.getElementById('rankBadge').innerHTML =
    `<span class="rank-badge" style="background:${rank.bg};color:${rank.color}">${rank.label}</span>`;
  document.getElementById('resultCard').style.display = 'block';

  // Bar chart
  const chart = document.getElementById('barChart');
  chart.innerHTML = '';
  scores.forEach((s, i) => {
    const pct = (s / 10 * 100).toFixed(0);
    chart.innerHTML += `
      <div class="bar-item">
        <div class="bar-name">SV ${i+1}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${COLORS[i % COLORS.length]}"></div>
        </div>
        <div class="bar-val" style="color:${COLORS[i % COLORS.length]}">${s.toFixed(1)}</div>
      </div>`;
  });
  document.getElementById('chartCard').style.display = 'block';
}

renderPills();
</script>
</body>
</html>
