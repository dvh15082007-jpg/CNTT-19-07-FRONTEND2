<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài 07 – Thao Tác DOM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1412;
    --card: #221e1b;
    --border: #3a322d;
    --accent: #e8956d;
    --gold: #d4a85a;
    --text: #f5ede6;
    --muted: #8a7a72;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Mulish', sans-serif;
    min-height: 100vh;
    padding: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container { max-width: 600px; width: 100%; }
  .tag { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }

  /* Display card */
  .display-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 1.5rem;
    transition: all 0.4s ease;
  }
  .card-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    transition: all 0.5s ease;
    background: linear-gradient(135deg, #2a2420, #3d342e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
  }
  .card-body { padding: 1.8rem; }
  .card-badge {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.25rem 0.7rem;
    border-radius: 99px;
    background: rgba(232,149,109,0.15);
    color: var(--accent);
    border: 1px solid rgba(232,149,109,0.3);
    margin-bottom: 0.8rem;
    transition: all 0.3s;
  }
  #mainTitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0.8rem;
    transition: all 0.3s ease;
  }
  #mainDesc {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.7;
    font-weight: 300;
    transition: all 0.3s ease;
  }

  /* Controls */
  .control-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
  }
  .ctrl-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1rem; }
  .theme-btn {
    padding: 0.7rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #2a2420;
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'Mulish', sans-serif;
    text-align: center;
    transition: all 0.2s;
  }
  .theme-btn:hover { border-color: var(--accent); }
  .theme-btn.active { border-color: var(--accent); background: rgba(232,149,109,0.1); color: var(--accent); }
  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 0.7rem;
    font-family: 'Mulish', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--gold); color: var(--gold); }

  .theme-transition { transition: background 0.4s, color 0.4s; }
</style>
</head>
<body>
<div class="container">
  <div class="tag">Buổi 3 · Bài Lab 07 — DOM Manipulation</div>

  <div class="display-card" id="displayCard">
    <div class="card-img" id="cardEmoji">🌿</div>
    <div class="card-body">
      <div class="card-badge" id="cardBadge">Thiên nhiên</div>
      <div id="mainTitle">Khu rừng yên tĩnh</div>
      <div id="mainDesc">Nơi những tán cây xanh mướt che phủ bầu trời, tiếng chim hót vang lên trong không khí trong lành. Đây là nơi để tâm hồn tìm lại sự bình yên.</div>
    </div>
  </div>

  <div class="control-panel">
    <div class="ctrl-label">Chọn chủ đề để thay đổi nội dung</div>
    <div class="theme-grid">
      <button class="theme-btn active" onclick="changeTheme('nature', this)">🌿 Thiên Nhiên</button>
      <button class="theme-btn" onclick="changeTheme('space', this)">🚀 Vũ Trụ</button>
      <button class="theme-btn" onclick="changeTheme('ocean', this)">🌊 Đại Dương</button>
      <button class="theme-btn" onclick="changeTheme('city', this)">🌆 Đô Thị</button>
      <button class="theme-btn" onclick="changeTheme('mountain', this)">🏔️ Núi Cao</button>
      <button class="theme-btn" onclick="changeTheme('sakura', this)">🌸 Hoa Anh Đào</button>
    </div>
    <button class="reset-btn" onclick="resetAll()">↺ Khôi phục ban đầu</button>
  </div>
</div>

<script>
const themes = {
  nature:   { emoji: '🌿', badge: 'Thiên nhiên', title: 'Khu rừng yên tĩnh', desc: 'Nơi những tán cây xanh mướt che phủ bầu trời, tiếng chim hót vang lên trong không khí trong lành. Đây là nơi để tâm hồn tìm lại sự bình yên.', bg: '#1a1412', accent: '#7cb87a' },
  space:    { emoji: '🚀', badge: 'Vũ trụ', title: 'Hành trình đến vì sao', desc: 'Bầu trời đêm trải rộng với hàng triệu ngôi sao lấp lánh. Mỗi điểm sáng là một mặt trời, mỗi mặt trời là một câu chuyện chưa được kể.', bg: '#08080f', accent: '#6b8af5' },
  ocean:    { emoji: '🌊', badge: 'Đại dương', title: 'Sâu thẳm đại dương xanh', desc: 'Dưới những lớp sóng xanh biếc là cả một thế giới đa dạng, kỳ bí. Sinh vật biển bơi lội trong ánh sáng lọc qua từng tầng nước trong vắt.', bg: '#060f1a', accent: '#38b2ca' },
  city:     { emoji: '🌆', badge: 'Đô thị', title: 'Thành phố không ngủ', desc: 'Ánh đèn neon rực rỡ, tiếng còi xe, những toà nhà chọc trời — đô thị là bức tranh của sự chuyển động không ngừng, nơi ước mơ và hiện thực giao nhau.', bg: '#0a0a12', accent: '#f5b84a' },
  mountain: { emoji: '🏔️', badge: 'Núi cao', title: 'Đỉnh mây mù bao phủ', desc: 'Trên độ cao hàng nghìn mét, gió thổi lạnh giá xuyên qua trang phục. Nhưng từ đây, toàn bộ thung lũng bên dưới hiện ra như một bức tranh thu nhỏ hoàn hảo.', bg: '#0d0e0f', accent: '#b0c4de' },
  sakura:   { emoji: '🌸', badge: 'Hoa anh đào', title: 'Mùa hoa nở rộ', desc: 'Những cánh hoa hồng nhạt xoay tròn trong gió xuân, rải thảm khắp con đường. Nhật Bản trong mùa anh đào là bài thơ viết bằng màu sắc và hương thơm dịu dàng.', bg: '#1a1015', accent: '#e88fb5' },
};

const defaults = { ...themes.nature };

function changeTheme(key, btn) {
  const t = themes[key];
  document.getElementById('cardEmoji').textContent = t.emoji;
  document.getElementById('cardBadge').textContent = t.badge;
  document.getElementById('mainTitle').textContent = t.title;
  document.getElementById('mainDesc').textContent = t.desc;
  document.body.style.background = t.bg;
  document.getElementById('cardBadge').style.color = t.accent;
  document.getElementById('cardBadge').style.borderColor = t.accent + '55';
  document.getElementById('cardBadge').style.background = t.accent + '20';

  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function resetAll() {
  changeTheme('nature', document.querySelector('.theme-btn'));
}
</script>
</body>
</html>
