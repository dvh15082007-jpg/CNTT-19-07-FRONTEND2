<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 14 - Hiệu Ứng Giao Diện Mượt Mà</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; }
        .alert-panel { width: 350px; padding: 25px; background: #fff3cd; border: 2px solid #ffeeba; color: #856404; margin-top: 20px; border-radius: 6px; font-weight: bold; }
        .highlight { border-color: #dc3545 !important; box-shadow: 0 0 12px rgba(220,53,69,0.6); background: #f8d7da !important; color: #721c24 !important; }
        button { padding: 10px 14px; margin-right: 5px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h2>Hệ Thống Kiểm Soát Diễn Hoạt Khối Thông Báo</h2>
    
    <button id="btnFade">Mờ Dần (Fade)</button>
    <button id="btnSlide">Trượt Lên/Xuống (Slide)</button>
    <button id="btnCombo">Hiệu Ứng Phức Hợp Chuyên Sâu</button>

    <div class="alert-panel" id="targetPanel">
        📢 THÔNG BÁO QUAN TRỌNG HỆ THỐNG<br>
        <span style="font-weight:normal; font-size:0.9em;">Nội dung thông điệp này sẽ trải qua các bài kiểm định hiệu ứng chuyển động mượt mà của thư viện jQuery.</span>
    </div>

    <script>
        $(document).ready(function() {
            
            // 1. Áp dụng nhóm hiệu ứng dạng biến đổi độ mờ đục alpha Fade
            $('#btnFade').click(function() {
                $('#targetPanel').fadeToggle('slow');
            });

            // 2. Áp dụng nhóm hiệu ứng dạng co giãn thay đổi kích thước chiều cao Slide
            $('#btnSlide').click(function() {
                $('#targetPanel').slideToggle('fast');
            });

            // 3. Yêu cầu mở rộng: Tạo dựng chuỗi chuyển động phức hợp nối đuôi nhau kèm gán class CSS highlight nổi bật
            $('#btnCombo').click(function() {
                // Thực hiện cấu trúc xếp hàng hàng đợi hiệu ứng (jQuery Effects Queueing) Chạy tuần tự khoa học
                $('#targetPanel')
                    .slideUp(400)
                    .delay(200)
                    .slideDown(400, function() {
                        // Khi trượt xuống thành công lập tức kích hoạt hoán đổi lớp định dạng bổ trợ Highlight CSS
                        $(this).toggleClass('highlight');
                    });
            });
        });
    </script>
</body>
</html>
