<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài 01 – Tính Chỉ Số BMI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: #2a2a2a;
    --accent: #c8f135;
    --text: #f0f0f0;
    --muted: #888;
    --thin: #444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container {
    width: 100%;
    max-width: 480px;
  }
  .label-tag {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 0.4rem;
  }
  h1 span { color: var(--accent); }
  .sub {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2.5rem;
    font-weight: 300;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .input-group {
    margin-bottom: 1.4rem;
  }
  .input-group label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .input-wrap {
    display: flex;
    align-items: center;
    background: #1f1f1f;
    border: 1px solid var(--thin);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  .input-wrap input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.2rem;
    padding: 0.85rem 1rem;
  }
  .unit {
    padding: 0 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    border-left: 1px solid var(--thin);
    height: 100%;
    display: flex;
    align-items: center;
  }
  button {
    width: 100%;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: 10px;
    padding: 1rem;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: transform 0.15s, opacity 0.15s;
  }
  button:hover { opacity: 0.9; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  .result { display: none; }
  .result.show { display: block; }
  .bmi-number {
    font-family: 'Syne', sans-serif;
    font-size: 5rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .bmi-label {
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
  }
  .scale {
    display: flex;
    gap: 4px;
    margin-bottom: 0.6rem;
  }
  .scale-item {
    flex: 1;
    height: 6px;
    border-radius: 99px;
    opacity: 0.3;
    transition: opacity 0.3s;
  }
  .scale-item.active { opacity: 1; }
  .s1 { background: #60b8f5; }
  .s2 { background: var(--accent); }
  .s3 { background: #f5a623; }
  .s4 { background: #f55e5e; }
  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .error {
    background: rgba(245,94,94,0.1);
    border: 1px solid rgba(245,94,94,0.3);
    color: #f55e5e;
    border-radius: 10px;
    padding: 0.8rem 1rem;
    font-size: 0.9rem;
    margin-top: 1rem;
    display: none;
  }
</style>
</head>
<body>
<div class="container">
  <div class="label-tag">Buổi 1 · Bài Lab 01</div>
  <h1>Tính Chỉ Số <span>BMI</span></h1>
  <p class="sub">Body Mass Index — đánh giá thể trạng cơ thể của bạn</p>

  <div class="card">
    <div class="input-group">
      <label>Chiều cao</label>
      <div class="input-wrap">
        <input type="number" id="height" placeholder="1.70" step="0.01" min="0.5" max="3">
        <span class="unit">m</span>
      </div>
    </div>
    <div class="input-group">
      <label>Cân nặng</label>
      <div class="input-wrap">
        <input type="number" id="weight" placeholder="65" step="0.1" min="1" max="500">
        <span class="unit">kg</span>
      </div>
    </div>
    <button onclick="calcBMI()">Tính BMI →</button>
    <div class="error" id="error"></div>
  </div>

  <div class="card result" id="result">
    <div class="label-tag">Kết quả</div>
    <div class="bmi-number" id="bmiVal"></div>
    <div class="bmi-label" id="bmiCat"></div>
    <div class="scale">
      <div class="scale-item s1" id="s1"></div>
      <div class="scale-item s2" id="s2"></div>
      <div class="scale-item s3" id="s3"></div>
      <div class="scale-item s4" id="s4"></div>
    </div>
    <div class="scale-labels">
      <span>Gầy</span>
      <span>Bình thường</span>
      <span>Thừa cân</span>
      <span>Béo phì</span>
    </div>
  </div>
</div>

<script>
function calcBMI() {
  const h = parseFloat(document.getElementById('height').value);
  const w = parseFloat(document.getElementById('weight').value);
  const err = document.getElementById('error');
  const res = document.getElementById('result');

  err.style.display = 'none';

  if (!h || !w || h <= 0 || w <= 0) {
    err.textContent = 'Vui lòng nhập đầy đủ chiều cao và cân nặng hợp lệ.';
    err.style.display = 'block';
    res.classList.remove('show');
    return;
  }

  const bmi = (w / (h * h)).toFixed(2);
  let cat, color, idx;

  if (bmi < 18.5)      { cat = '🌿 Gầy — Dưới mức bình thường';    color = '#60b8f5'; idx = 1; }
  else if (bmi < 25)   { cat = '✅ Bình thường — Thể trạng lý tưởng'; color = '#c8f135'; idx = 2; }
  else if (bmi < 30)   { cat = '⚠️ Thừa cân — Cần chú ý chế độ ăn'; color = '#f5a623'; idx = 3; }
  else                  { cat = '🔴 Béo phì — Cần tư vấn y tế';       color = '#f55e5e'; idx = 4; }

  document.getElementById('bmiVal').textContent = bmi;
  document.getElementById('bmiVal').style.color = color;
  document.getElementById('bmiCat').textContent = cat;
  document.getElementById('bmiCat').style.color = color;

  ['s1','s2','s3','s4'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i + 1 === idx);
  });

  res.classList.add('show');
}
</script>
</body>
</html>
