<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 18 - Quản Lý Thành Viên Giao Diện</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; }
        .input-box { margin-bottom: 20px; }
        table { width: 100%; max-width: 600px; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f2f2f2; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 4px 8px; cursor: pointer; }
        .btn-edit { background: #3498db; color: white; border: none; padding: 4px 8px; cursor: pointer; margin-right: 4px; }
    </style>
</head>
<body>
    <h2>Quản Lý Danh Sách Thành Viên Lớp</h2>
    
    <div class="input-box">
        <input type="text" id="memberNameInput" placeholder="Nhập tên thành viên mới...">
        <button id="btnAddMember" style="padding: 5px 12px; background:#2ecc71; color:white; border:none; cursor:pointer;">Thêm Mới</button>
    </div>

    <table>
        <thead>
            <tr><th style="width: 60px;">STT</th><th>Họ và Tên Thành Viên</th><th style="width: 150px;">Hành Động</th></tr>
        </thead>
        <tbody id="memberTableBody">
            <tr><td class="stt-cell">1</td><td class="name-cell">Nguyễn Văn Thuận</td><td><button class="btn-edit">Sửa</button><button class="btn-del">Xóa</button></td></tr>
            <tr><td class="stt-cell">2</td><td class="name-cell">Trần Thị Thảo</td><td><button class="btn-edit">Sửa</button><button class="btn-del">Xóa</button></td></tr>
        </tbody>
    </table>

    <script>
        $(document).ready(function() {

            // Yêu cầu mở rộng: Hàm tự động quét rà soát và đánh lại chỉ số Số Thứ Tự (STT) đảm bảo tính chính xác liên tục
            function reIndexTable() {
                $('.stt-cell').each(function(index) {
                    $(this).text(index + 1);
                });
            }

            // 1. Chức năng Thêm mới thành viên: Vận dụng hàm append để chèn cấu trúc cây mã phần tử động
            $('#btnAddMember').click(function() {
                const nameText = $('#memberNameInput').val().trim();
                if (nameText === "") return;

                const newRow = `
                    <tr>
                        <td class="stt-cell"></td>
                        <td class="name-cell">${nameText}</td>
                        <td>
                            <button class="btn-edit">Sửa</button>
                            <button class="btn-del">Xóa</button>
                        </td>
                    </tr>
                `;
                
                $('#memberTableBody').append(newRow);
                $('#memberNameInput').val(""); // Xóa sạch ô nhập liệu văn bản
                reIndexTable();
            });

            // 2. Chức năng Xóa thành viên: Vận dụng mô hình Kỹ thuật ủy quyền sự kiện (Event Delegation) thông qua hàm .on()
            $('#memberTableBody').on('click', '.btn-del', function() {
                if (confirm("Xác nhận loại bỏ thành viên này khỏi danh sách?")) {
                    // Dùng hàm closest để truy tìm ngược lên thẻ tr cha gần nhất chứa nút bấm hiện thời và triệt tiêu nó
                    $(this).closest('tr').remove();
                    reIndexTable();
                }
            });

            // 3. Yêu cầu mở rộng: Tính năng sửa thông tin trực tiếp tại chỗ (Inline Editing) cực kỳ trực quan linh hoạt
            $('#memberTableBody').on('click', '.btn-edit', function() {
                const currentRow = $(this).closest('tr');
                const nameCell = currentRow.find('.name-cell');
                
                if ($(this).text() === "Sửa") {
                    // Bước sang trạng thái hiệu chỉnh: Thay thế chuỗi văn bản thuần thành một thẻ input nhập liệu
                    const currentName = nameCell.text();
                    nameCell.innerHTML = `<input type="text" class="edit-input" value="${currentName}" style="width:90%; padding:4px;">`;
                    $(this).text("Lưu").css('background', '#27ae60');
                } else {
                    // Bước thực thi Lưu kết quả: Đọc dữ liệu từ thẻ input tạm thời gán trả lại cho ô text thuần tuý
                    const updatedName = nameCell.find('.edit-input').val().trim();
                    if (updatedName === "") {
                        alert("Tên thành viên không được bỏ trống!");
                        return;
                    }
                    nameCell.text(updatedName);
                    $(this).text("Sửa").css('background', '#3498db');
                }
            });
        });
    </script>
</body>
</html>
