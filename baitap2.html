<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài 02 – Tính Khuyến Mãi Đơn Hàng</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --card: #fff;
    --accent: #d4500a;
    --gold: #c9963a;
    --text: #1a1a1a;
    --muted: #888;
    --border: #e8e0d5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container { width: 100%; max-width: 520px; }
  .tag {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    border-radius: 99px;
    margin-bottom: 1rem;
    font-weight: 700;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 0.4rem;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; font-weight: 300; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.8rem;
    margin-bottom: 1.2rem;
    box-shadow: 0 2px 20px rgba(0,0,0,0.05);
  }
  .card-title {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }
  .input-group { margin-bottom: 1.2rem; }
  .input-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.4rem;
  }
  .input-group input,
  .input-group select {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Lato', sans-serif;
    font-size: 1rem;
    background: #faf7f2;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus,
  .input-group select:focus { border-color: var(--accent); }

  .promo-table {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
  }
  .promo-cell {
    background: #faf7f2;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem;
    text-align: center;
    font-size: 0.75rem;
  }
  .promo-cell .p-val { font-weight: 700; color: var(--accent); font-size: 1rem; }
  .promo-cell .p-label { color: var(--muted); font-size: 0.7rem; margin-top: 2px; }

  button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 1rem;
    font-family: 'Lato', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s, transform 0.15s;
  }
  button:hover { background: #b8440a; transform: translateY(-1px); }

  .result { display: none; }
  .result.show { display: block; }
  .receipt {
    border-top: 1px dashed var(--border);
    padding-top: 1.2rem;
    margin-top: 1.2rem;
  }
  .receipt-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.45rem 0;
    font-size: 0.95rem;
  }
  .receipt-row.total {
    border-top: 2px solid var(--text);
    margin-top: 0.5rem;
    padding-top: 0.8rem;
    font-size: 1.15rem;
    font-weight: 700;
  }
  .receipt-row .lbl { color: var(--muted); }
  .receipt-row .val { font-weight: 700; }
  .discount-val { color: var(--accent); }
  .total-val { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--accent); }
  .badge {
    display: inline-block;
    background: rgba(212,80,10,0.1);
    color: var(--accent);
    border-radius: 6px;
    padding: 0.2rem 0.6rem;
    font-size: 0.8rem;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="container">
  <div class="tag">Buổi 1 · Bài Lab 02</div>
  <h1>Tính <em>Khuyến Mãi</em><br>Đơn Hàng</h1>
  <p class="sub">Áp dụng ưu đãi theo hạng thành viên và giá trị đơn</p>

  <div class="card">
    <div class="card-title">Bảng ưu đãi</div>
    <div class="promo-table">
      <div class="promo-cell"><div class="p-val">5%</div><div class="p-label">&lt; 500K</div></div>
      <div class="promo-cell"><div class="p-val">10%</div><div class="p-label">500K–2TR</div></div>
      <div class="promo-cell"><div class="p-val">15%</div><div class="p-label">&gt; 2TR</div></div>
    </div>
    <div class="card-title" style="margin-top:0.5rem">Thành viên VIP +5% · Premium +10%</div>

    <div class="input-group">
      <label>Giá trị đơn hàng (VNĐ)</label>
      <input type="number" id="orderVal" placeholder="1500000" min="0">
    </div>
    <div class="input-group">
      <label>Hạng thành viên</label>
      <select id="memberType">
        <option value="normal">Thường</option>
        <option value="vip">VIP (+5%)</option>
        <option value="premium">Premium (+10%)</option>
      </select>
    </div>
    <button onclick="calcDiscount()">Tính ngay →</button>
  </div>

  <div class="card result" id="result">
    <div class="card-title">Hoá đơn chi tiết</div>
    <div class="receipt">
      <div class="receipt-row">
        <span class="lbl">Tiền gốc</span>
        <span class="val" id="r-original"></span>
      </div>
      <div class="receipt-row">
        <span class="lbl">Giảm giá <span class="badge" id="r-pct"></span></span>
        <span class="val discount-val" id="r-discount"></span>
      </div>
      <div class="receipt-row" id="r-ship-row">
        <span class="lbl">Phí vận chuyển</span>
        <span class="val" id="r-ship"></span>
      </div>
      <div class="receipt-row total">
        <span>Tổng thanh toán</span>
        <span class="total-val" id="r-total"></span>
      </div>
    </div>
  </div>
</div>

<script>
function fmt(n) {
  return n.toLocaleString('vi-VN') + '₫';
}

function calcDiscount() {
  const order = parseFloat(document.getElementById('orderVal').value);
  const member = document.getElementById('memberType').value;

  if (!order || order <= 0) {
    alert('Vui lòng nhập giá trị đơn hàng hợp lệ.');
    return;
  }

  let baseDiscount = 0;
  if (order < 500000)       baseDiscount = 5;
  else if (order <= 2000000) baseDiscount = 10;
  else                       baseDiscount = 15;

  const memberBonus = member === 'vip' ? 5 : member === 'premium' ? 10 : 0;
  const totalPct = Math.min(baseDiscount + memberBonus, 50);

  const discountAmt = order * totalPct / 100;
  const shipping = order >= 2000000 ? 0 : 30000;
  const total = order - discountAmt + shipping;

  document.getElementById('r-original').textContent = fmt(order);
  document.getElementById('r-pct').textContent = `-${totalPct}%`;
  document.getElementById('r-discount').textContent = `-${fmt(discountAmt)}`;
  document.getElementById('r-ship').textContent = shipping === 0 ? 'Miễn phí 🎉' : fmt(shipping);
  document.getElementById('r-total').textContent = fmt(total);
  document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
